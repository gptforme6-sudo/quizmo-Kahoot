<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        .animate-bounce-short { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .correct-bg { background-color: #26890c; }
        .wrong-bg { background-color: #e21b3c; }
    </style>
</head>
<body class="bg-[#f2f2f2] text-gray-900 overflow-x-hidden">

    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="min-h-screen flex items-center justify-center bg-[#46178f] text-white">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-t-transparent border-white mb-4"></div>
                <h1 class="text-2xl font-bold">מתחבר ל-Quizmo...</h1>
            </div>
        </div>

        <!-- Mute Toggle -->
        <button onclick="toggleMute()" class="fixed top-4 left-4 z-50 p-2 bg-white rounded-full shadow hover:bg-gray-100 transition">
            <i id="mute-icon" data-lucide="volume-2"></i>
        </button>

        <!-- Main Content Area -->
        <div id="main-content" class="hidden"></div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-html-v1';

        // --- State Management ---
        let user = null;
        let currentView = 'home';
        let gamePin = '';
        let nickname = '';
        let isMuted = false;
        let gameState = null;
        let players = [];

        // --- Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol=0.1) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSound(sound) {
            switch(sound) {
                case 'join': playTone(440, 'sine', 0.1); break;
                case 'start': playTone(880, 'square', 0.4); break;
                case 'correct': playTone(783, 'triangle', 0.3); break;
                case 'wrong': playTone(250, 'sawtooth', 0.4); break;
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        // --- Auth & Init ---
        auth.onAuthStateChanged(async (u) => {
            if (!u) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } else {
                user = u;
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                renderView('home');
            }
        });

        // --- Navigation & Rendering ---
        function renderView(view) {
            currentView = view;
            const container = document.getElementById('main-content');
            
            if (view === 'home') {
                container.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center bg-[#46178f] text-white">
                        <h1 class="text-8xl font-black mb-12 drop-shadow-xl animate-bounce-short italic">Quizmo!</h1>
                        <div class="flex flex-col gap-4 w-72">
                            <button onclick="renderView('join')" class="bg-white text-black py-4 rounded-lg font-bold text-2xl shadow-[0_6px_0_#ccc] hover:translate-y-1 hover:shadow-[0_4px_0_#ccc] transition-all">הצטרף</button>
                            <button onclick="renderView('create')" class="bg-[#1368ce] text-white py-4 rounded-lg font-bold text-2xl shadow-[0_6px_0_#0c4891] hover:translate-y-1 hover:shadow-[0_4px_0_#0c4891] transition-all">צור משחק</button>
                        </div>
                    </div>
                `;
            } else if (view === 'join') {
                container.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center bg-[#46178f] p-4">
                        <div class="bg-white p-8 rounded-xl w-full max-w-sm flex flex-col gap-4 shadow-2xl">
                            <h2 class="text-2xl font-bold text-center">הצטרפות</h2>
                            <input id="pin-input" class="p-3 border-2 border-gray-300 rounded text-center text-2xl font-bold uppercase" placeholder="קוד PIN">
                            <input id="nick-input" class="p-3 border-2 border-gray-300 rounded text-center text-xl font-bold" placeholder="כינוי">
                            <button onclick="handleJoin()" class="bg-black text-white py-4 rounded font-bold text-xl hover:bg-gray-800">כנס למשחק</button>
                            <button onclick="renderView('home')" class="text-gray-500 underline text-sm">ביטול</button>
                        </div>
                    </div>
                `;
            } else if (view === 'create') {
                container.innerHTML = `
                    <div class="p-6 max-w-4xl mx-auto">
                        <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-lg shadow">
                            <h2 class="text-3xl font-black text-[#46178f]">בונה החידון</h2>
                            <button onclick="handleCreateGame()" class="px-6 py-2 bg-[#26890c] text-white rounded font-bold shadow-[0_4px_0_#195c08] hover:translate-y-1">שמור ופתח חדר</button>
                        </div>
                        <input id="quiz-title" class="w-full text-4xl font-bold mb-8 p-4 border-b-4 border-[#46178f] outline-none bg-transparent" placeholder="שם החידון שלי...">
                        <div id="questions-list" class="space-y-6">
                            <div class="bg-white p-6 rounded-xl shadow-lg border-2 border-gray-100">
                                <input class="q-text w-full p-4 text-xl border-2 rounded-lg mb-4 font-bold" placeholder="שאלה...">
                                <div class="grid grid-cols-2 gap-4">
                                    <input class="opt-0 p-3 border-2 rounded" placeholder="תשובה 1">
                                    <input class="opt-1 p-3 border-2 rounded" placeholder="תשובה 2">
                                    <input class="opt-2 p-3 border-2 rounded" placeholder="תשובה 3">
                                    <input class="opt-3 p-3 border-2 rounded" placeholder="תשובה 4">
                                </div>
                                <div class="mt-4 flex items-center gap-2">
                                    <span class="font-bold">תשובה נכונה:</span>
                                    <select class="q-correct p-2 border rounded">
                                        <option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            lucide.createIcons();
        }

        // --- Game Logic ---
        async function handleJoin() {
            const p = document.getElementById('pin-input').value;
            const n = document.getElementById('nick-input').value;
            if(!p || !n) return alert("מלא פרטים!");

            const gameSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_games').doc(p).get();
            if(!gameSnap.exists()) return alert("משחק לא קיים!");

            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_players').doc(user.uid).set({
                pin: p, name: n, score: 0, joinedAt: Date.now(), hasAnswered: false
            });

            gamePin = p;
            nickname = n;
            playSound('join');
            startSync(p);
            renderPlayerLobby();
        }

        async function handleCreateGame() {
            const title = document.getElementById('quiz-title').value;
            const qText = document.querySelector('.q-text').value;
            const opts = [
                document.querySelector('.opt-0').value,
                document.querySelector('.opt-1').value,
                document.querySelector('.opt-2').value,
                document.querySelector('.opt-3').value
            ];
            const correct = parseInt(document.querySelector('.q-correct').value);

            if(!title || !qText) return alert("מלא את השדות");

            const pin = Math.floor(100000 + Math.random() * 900000).toString();
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_games').doc(pin).set({
                hostId: user.uid,
                status: 'lobby',
                quiz: { title, questions: [{ text: qText, opts, correct, time: 20 }] },
                currentQuestion: 0
            });

            gamePin = pin;
            startSync(pin);
            renderHostLobby();
        }

        function startSync(pin) {
            // Sync Game
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_games').doc(pin).onSnapshot(snap => {
                if(snap.exists()) {
                    gameState = snap.data();
                    updateUIBasedOnGameState();
                }
            });

            // Sync Players
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_players').where('pin', '==', pin).onSnapshot(snap => {
                players = snap.docs.map(d => ({id: d.id, ...d.data()}));
                updatePlayersList();
            });
        }

        function renderHostLobby() {
            document.getElementById('main-content').innerHTML = `
                <div class="min-h-screen flex flex-col bg-[#46178f] text-white">
                    <div class="bg-white text-black p-10 text-center shadow-2xl">
                        <p class="text-xl font-bold text-gray-400">הצטרפו ב-Quizmo עם הקוד:</p>
                        <h1 class="text-9xl font-black">${gamePin}</h1>
                    </div>
                    <div class="p-10 flex-1 flex flex-col items-center">
                        <div id="player-count" class="bg-black bg-opacity-30 px-6 py-2 rounded-full mb-8 font-bold">0 שחקנים</div>
                        <div id="lobby-players" class="flex flex-wrap gap-4 justify-center"></div>
                        <button onclick="startGame()" class="mt-auto bg-[#1368ce] px-20 py-4 rounded-xl text-3xl font-black shadow-[0_6px_0_#0c4891] hover:translate-y-1">התחל!</button>
                    </div>
                </div>
            `;
        }

        function renderPlayerLobby() {
            document.getElementById('main-content').innerHTML = `
                <div class="min-h-screen bg-[#26890c] flex flex-col items-center justify-center text-white">
                    <h1 class="text-4xl font-black mb-4 animate-pulse">אתה בפנים!</h1>
                    <div class="text-3xl font-bold bg-black bg-opacity-20 px-8 py-4 rounded-lg">${nickname}</div>
                </div>
            `;
        }

        function updatePlayersList() {
            const countEl = document.getElementById('player-count');
            const listEl = document.getElementById('lobby-players');
            if(countEl) countEl.innerText = `${players.length} שחקנים`;
            if(listEl) {
                listEl.innerHTML = players.map(p => `<div class="bg-white text-black px-6 py-3 rounded-lg font-bold text-2xl shadow animate-bounce-short">${p.name}</div>`).join('');
            }
        }

        async function startGame() {
            playSound('start');
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_games').doc(gamePin).update({
                status: 'question',
                startTime: Date.now()
            });
        }

        function updateUIBasedOnGameState() {
            if(!gameState) return;
            const container = document.getElementById('main-content');

            if(gameState.status === 'question') {
                if(user.uid === gameState.hostId) {
                    const q = gameState.quiz.questions[gameState.currentQuestion];
                    container.innerHTML = `
                        <div class="min-h-screen flex flex-col">
                            <div class="bg-white p-12 text-center shadow-lg"><h2 class="text-5xl font-black">${q.text}</h2></div>
                            <div class="flex-1 flex items-center justify-center">
                                <div class="text-center">
                                    <div class="text-9xl font-black text-[#46178f]">${players.filter(p=>p.hasAnswered).length}</div>
                                    <div class="text-2xl font-bold">תשובות</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const player = players.find(p => p.id === user.uid);
                    if(player && player.hasAnswered) {
                        container.innerHTML = `<div class="min-h-screen bg-[#46178f] flex items-center justify-center text-white text-3xl font-bold">נשלח! ממתין...</div>`;
                    } else {
                        container.innerHTML = `
                            <div class="min-h-screen grid grid-cols-2 grid-rows-2 gap-2 p-2">
                                <button onclick="sendAnswer(0)" class="bg-[#e21b3c] rounded flex items-center justify-center text-white text-9xl">▲</button>
                                <button onclick="sendAnswer(1)" class="bg-[#1368ce] rounded flex items-center justify-center text-white text-9xl">◆</button>
                                <button onclick="sendAnswer(2)" class="bg-[#d89e00] rounded flex items-center justify-center text-white text-9xl">●</button>
                                <button onclick="sendAnswer(3)" class="bg-[#26890c] rounded flex items-center justify-center text-white text-9xl">■</button>
                            </div>
                        `;
                    }
                }
            }
        }

        async function sendAnswer(idx) {
            const q = gameState.quiz.questions[gameState.currentQuestion];
            const isCorrect = idx === q.correct;
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quizmo_players').doc(user.uid).update({
                hasAnswered: true,
                isCorrect: isCorrect,
                score: firebase.firestore.FieldValue.increment(isCorrect ? 1000 : 0)
            });
            if(isCorrect) playSound('correct'); else playSound('wrong');
        }

        window.onload = () => lucide.createIcons();

    </script>
</body>
</html>
