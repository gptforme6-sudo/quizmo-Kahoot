<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Mega Edition</title>
    
    <!-- Load Tailwind and Icons first -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
        
        :root {
            --k-purple: #46178f;
            --k-red: #e21b3c;
            --k-blue: #1368ce;
            --k-green: #26890c;
            --k-yellow: #d89e00;
        }

        body { 
            font-family: 'Heebo', sans-serif; 
            background: var(--k-purple);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .bg-animated {
            background: linear-gradient(125deg, #46178f, #250a4d, #6a2cc9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
        }

        .k-btn {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .k-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.2);
        }

        .ans-grid-btn {
            height: clamp(80px, 15vh, 150px);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2rem;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 0.75rem;
            position: relative;
        }

        /* Custom Spinner */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* RTL tweaks */
        input, textarea { text-align: right; }
        
        .sidebar-item {
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-item.active {
            background: rgba(70, 23, 143, 0.1);
            border-left: 4px solid var(--k-purple);
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>
    
    <!-- Main Application Container -->
    <div id="app" class="relative z-10 min-h-screen">
        <!-- Initial Loading State (Pure HTML/CSS) -->
        <div id="boot-loader" class="h-screen flex flex-col items-center justify-center">
            <div class="loader mb-6"></div>
            <h1 class="text-3xl font-black tracking-widest animate-pulse">QUIZMO IS LOADING</h1>
            <p id="boot-status" class="mt-4 opacity-60">Checking connection...</p>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "firebase/auth";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc, serverTimestamp } from "firebase/firestore";

        // --- Config & Init ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo_pro_v1';
        
        let app, auth, db;
        let currentUser = null;
        let quizzes = [];
        let currentState = 'home'; // home, auth, dash, editor, play, results
        
        // Editor State
        let editingQuiz = null;
        let currentEditIdx = 0;

        // Play State
        let activeQuiz = null;
        let activeQIdx = 0;
        let score = 0;
        let streak = 0;

        const bootStatus = document.getElementById('boot-status');

        async function init() {
            try {
                bootStatus.innerText = "Initializing Firebase...";
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                bootStatus.innerText = "Authenticating...";
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        bootStatus.innerText = "Syncing data...";
                        startDataSync();
                    }
                });

            } catch (error) {
                console.error(error);
                document.getElementById('app').innerHTML = `
                    <div class="h-screen flex flex-col items-center justify-center p-10 text-center">
                        <i class="fas fa-exclamation-triangle text-6xl text-yellow-400 mb-6"></i>
                        <h1 class="text-2xl font-bold">שגיאת חיבור</h1>
                        <p class="mt-2 opacity-70">${error.message}</p>
                        <button onclick="location.reload()" class="mt-6 bg-white text-purple-900 px-6 py-2 rounded-full font-bold">נסה שוב</button>
                    </div>
                `;
            }
        }

        function startDataSync() {
            const qRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'quizzes');
            onSnapshot(qRef, (snapshot) => {
                quizzes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentState === 'home' || currentState === 'loading') {
                    render('home');
                } else {
                    render(currentState);
                }
            }, (err) => {
                console.error("Sync Error:", err);
            });
        }

        // --- UI Rendering Engine ---
        function render(state) {
            currentState = state;
            const container = document.getElementById('app');
            
            let html = "";
            switch(state) {
                case 'home': html = viewHome(); break;
                case 'auth': html = viewAuth(); break;
                case 'dash': html = viewDash(); break;
                case 'editor': html = viewEditor(); break;
                case 'play': html = viewPlay(); break;
                case 'results': html = viewResults(); break;
            }
            
            container.innerHTML = html;
            window.scrollTo(0, 0);
        }

        // --- View Generators ---

        function viewHome() {
            return `
                <div class="h-screen flex flex-col items-center justify-center p-6 animate__animated animate__fadeIn">
                    <div class="text-center mb-16">
                        <h1 class="text-8xl font-black italic tracking-tighter drop-shadow-2xl mb-4">Quizmo!</h1>
                        <div class="bg-white text-purple-900 px-4 py-1 inline-block font-black rounded-lg transform -rotate-2">ULTIMATE V9</div>
                    </div>
                    
                    <div class="w-full max-w-sm space-y-4">
                        <button onclick="window.navigate('auth')" class="k-btn w-full bg-white text-purple-900 py-6 rounded-2xl text-2xl font-black shadow-xl">
                            ניהול חידונים
                        </button>
                        <button onclick="window.navigate('play_first')" class="k-btn w-full bg-black/30 hover:bg-black/50 border-2 border-white/20 py-4 rounded-2xl text-xl font-bold">
                            שחק עכשיו
                        </button>
                    </div>
                </div>
            `;
        }

        function viewAuth() {
            return `
                <div class="h-screen flex items-center justify-center p-4 animate__animated animate__zoomIn">
                    <div class="glass-card p-10 w-full max-w-md text-center">
                        <i class="fas fa-lock text-4xl mb-6 opacity-50"></i>
                        <h2 class="text-3xl font-black mb-8">אימות מנהל</h2>
                        <input id="pin-input" type="password" maxlength="4" placeholder="קוד PIN" 
                            class="w-full bg-white/10 border-2 border-white/20 p-5 rounded-2xl text-center text-4xl font-black tracking-[0.5em] outline-none focus:border-white transition-all">
                        <button onclick="window.verifyPin()" class="w-full bg-white text-purple-900 py-4 rounded-2xl font-black text-xl mt-8 shadow-lg k-btn">כניסה</button>
                        <button onclick="window.navigate('home')" class="mt-6 text-white/50 hover:text-white block w-full">חזרה</button>
                    </div>
                </div>
            `;
        }

        function viewDash() {
            return `
                <div class="min-h-screen p-6 md:p-12 animate__animated animate__fadeIn">
                    <div class="max-w-6xl mx-auto">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
                            <div>
                                <h2 class="text-5xl font-black">הספריה שלי</h2>
                                <p class="opacity-60 text-lg mt-2">נהל את החידונים שיצרת</p>
                            </div>
                            <button onclick="window.createQuiz()" class="k-btn bg-green-500 hover:bg-green-400 px-10 py-5 rounded-2xl font-black text-2xl shadow-xl flex items-center gap-3">
                                <i class="fas fa-plus"></i> חידון חדש
                            </button>
                        </div>

                        ${quizzes.length === 0 ? `
                            <div class="glass-card py-24 text-center border-dashed">
                                <i class="fas fa-ghost text-6xl mb-4 opacity-20"></i>
                                <p class="text-xl opacity-50 font-bold">הספריה ריקה... בנתיים</p>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                ${quizzes.map(q => `
                                    <div class="glass-card group overflow-hidden flex flex-col hover:bg-white/20 transition-all">
                                        <div class="h-32 bg-gradient-to-r from-blue-600 to-purple-600 flex items-center justify-center">
                                            <i class="fas fa-question-circle text-5xl text-white/20"></i>
                                        </div>
                                        <div class="p-6 flex flex-col flex-1">
                                            <h3 class="text-2xl font-black mb-1 truncate">${q.title}</h3>
                                            <p class="text-sm opacity-50 mb-6">${q.questions.length} שאלות</p>
                                            <div class="mt-auto space-y-3">
                                                <button onclick="window.playQuiz('${q.id}')" class="w-full bg-blue-500 hover:bg-blue-400 py-3 rounded-xl font-black k-btn">שחק</button>
                                                <div class="flex gap-2">
                                                    <button onclick="window.editQuiz('${q.id}')" class="flex-1 bg-white/10 hover:bg-white/20 py-2 rounded-lg font-bold text-sm">עריכה</button>
                                                    <button onclick="window.deleteQuiz('${q.id}')" class="flex-1 bg-red-500/10 hover:bg-red-500/30 text-red-400 py-2 rounded-lg font-bold text-sm">מחק</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function viewEditor() {
            const q = editingQuiz.questions[currentEditIdx];
            return `
                <div class="h-screen flex flex-col bg-gray-50 text-gray-900 overflow-hidden">
                    <!-- Editor Header -->
                    <header class="bg-[#46178f] p-4 text-white flex justify-between items-center shadow-md">
                        <div class="flex items-center gap-4">
                            <button onclick="window.saveQuiz()" class="bg-green-500 hover:bg-green-400 px-8 py-2 rounded-lg font-black text-lg k-btn">שמור</button>
                            <button onclick="window.navigate('dash')" class="bg-white/10 px-4 py-2 rounded-lg">ביטול</button>
                        </div>
                        <input oninput="window.updateQuizTitle(this.value)" value="${editingQuiz.title}" 
                            class="bg-transparent border-b-2 border-white/30 text-center text-xl font-black py-1 focus:border-white outline-none w-64" placeholder="שם החידון">
                        <div class="text-xl font-black italic">QUIZMO</div>
                    </header>

                    <div class="flex flex-1 overflow-hidden">
                        <!-- Left Sidebar (Steps) -->
                        <div class="w-64 bg-white border-l border-gray-200 flex flex-col overflow-hidden">
                            <div class="flex-1 overflow-y-auto">
                                ${editingQuiz.questions.map((ques, idx) => `
                                    <div onclick="window.selectQuestion(${idx})" class="sidebar-item p-4 border-b border-gray-100 ${currentEditIdx === idx ? 'active' : ''}">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${idx + 1}. ${ques.type === 'tf' ? 'אמת/שקר' : 'אמריקאי'}</span>
                                            <i onclick="event.stopPropagation(); window.removeQuestion(${idx})" class="fas fa-trash text-gray-300 hover:text-red-500 text-xs"></i>
                                        </div>
                                        <div class="text-sm font-bold truncate">${ques.text || 'ללא כותרת'}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="p-4 bg-gray-50 flex flex-col gap-2">
                                <button onclick="window.addQuestion('multi')" class="bg-purple-600 text-white py-2 rounded-lg font-bold">+ שאלה אמריקאית</button>
                                <button onclick="window.addQuestion('tf')" class="bg-blue-600 text-white py-2 rounded-lg font-bold">+ אמת או שקר</button>
                            </div>
                        </div>

                        <!-- Main Canvas -->
                        <div class="flex-1 bg-gray-200 p-8 overflow-y-auto">
                            <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl p-10">
                                <textarea oninput="window.updateQField('text', this.value)" 
                                    class="w-full text-center text-3xl font-black p-6 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-purple-300 outline-none resize-none mb-8"
                                    placeholder="הקלד כאן את השאלה שלך...">${q.text}</textarea>

                                <div class="flex flex-col items-center mb-12">
                                    <div class="w-full max-w-lg aspect-video bg-gray-50 border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center p-4">
                                        ${q.image ? `
                                            <img src="${q.image}" class="h-full w-full object-contain rounded-xl">
                                            <button onclick="window.updateQField('image', '')" class="mt-2 text-red-500 font-bold">הסר תמונה</button>
                                        ` : `
                                            <i class="fas fa-image text-5xl text-gray-200 mb-4"></i>
                                            <input onchange="window.updateQField('image', this.value)" placeholder="הדבק URL של תמונה כאן..." class="w-full text-center text-sm p-2 border rounded">
                                        `}
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${q.opts.map((opt, oi) => `
                                        <div class="relative flex items-center p-4 rounded-xl border-2 transition-all ${q.correct === oi ? 'border-green-500 bg-green-50' : 'border-gray-100 bg-gray-50'}">
                                            <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white font-black text-xl mr-4" 
                                                style="background-color: var(--k-${['red','blue','yellow','green'][oi]})">
                                                ${['▲','◆','●','■'][oi]}
                                            </div>
                                            <input oninput="window.updateQOpt(${oi}, this.value)" value="${opt}" 
                                                class="flex-1 bg-transparent text-xl font-bold outline-none border-b border-transparent focus:border-gray-300" placeholder="הקלד תשובה...">
                                            <div onclick="window.updateQField('correct', ${oi})" class="cursor-pointer ml-4 w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center ${q.correct === oi ? 'bg-green-500 border-green-500 text-white' : 'text-transparent'}">
                                                <i class="fas fa-check"></i>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function viewPlay() {
            const q = activeQuiz.questions[activeQIdx];
            const colors = ['red', 'blue', 'yellow', 'green'];
            const icons = ['triangle', 'diamond', 'circle', 'square'];
            const sym = ['▲', '◆', '●', '■'];

            return `
                <div class="h-screen flex flex-col animate__animated animate__fadeIn">
                    <header class="p-6 flex justify-between items-center text-2xl font-black bg-black/20">
                        <div class="flex items-center gap-4">
                            <span class="bg-white/10 px-6 py-1 rounded-full text-sm">שאלה ${activeQIdx + 1} מתוך ${activeQuiz.questions.length}</span>
                        </div>
                        <div class="text-center flex-1">
                            <span class="text-yellow-400">Streak: 🔥 ${streak}</span>
                        </div>
                        <div>Score: ${score}</div>
                    </header>

                    <main class="flex-1 flex flex-col items-center justify-center p-8 max-w-7xl mx-auto w-full">
                        <h2 class="text-4xl md:text-6xl font-black mb-12 text-center drop-shadow-lg">${q.text}</h2>
                        
                        ${q.image ? `
                            <div class="w-full max-w-2xl aspect-video bg-white/10 rounded-3xl p-4 shadow-2xl mb-12 animate__animated animate__zoomIn">
                                <img src="${q.image}" class="w-full h-full object-contain">
                            </div>
                        ` : ''}

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mt-auto">
                            ${q.opts.map((opt, i) => opt ? `
                                <button onclick="window.submitAnswer(${i})" 
                                    class="ans-grid-btn k-btn text-white" style="background-color: var(--k-${colors[i]})">
                                    <span class="text-4xl opacity-30 mr-6">${sym[i]}</span>
                                    <span>${opt}</span>
                                </button>
                            ` : '').join('')}
                        </div>
                    </main>
                </div>
            `;
        }

        function viewResults() {
            const maxScore = activeQuiz.questions.length * 1000;
            const rank = score === maxScore ? 'גאון!' : score > maxScore/2 ? 'כל הכבוד!' : 'אולי בפעם הבאה...';
            
            return `
                <div class="h-screen flex flex-col items-center justify-center p-6 text-center animate__animated animate__bounceIn">
                    <h1 class="text-6xl font-black mb-4 italic">${rank}</h1>
                    <div class="glass-card p-12 w-full max-w-lg mb-12 shadow-2xl">
                        <p class="text-xl opacity-60 font-bold mb-2 uppercase tracking-widest">Final Score</p>
                        <div class="text-9xl font-black text-white drop-shadow-lg">${score}</div>
                        <div class="mt-8 flex justify-center gap-12 border-t border-white/10 pt-8">
                             <div>
                                <p class="text-3xl font-black">${streak}</p>
                                <p class="text-xs opacity-50">MAX STREAK</p>
                             </div>
                             <div>
                                <p class="text-3xl font-black">${Math.round((score/maxScore)*100)}%</p>
                                <p class="text-xs opacity-50">ACCURACY</p>
                             </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-4 w-full max-w-md">
                        <button onclick="window.navigate('dash')" class="flex-1 k-btn bg-white text-purple-900 py-4 rounded-2xl font-black text-xl">ספריה</button>
                        <button onclick="window.playQuiz('${activeQuiz.id}')" class="flex-1 k-btn bg-green-500 py-4 rounded-2xl font-black text-xl">שחק שוב</button>
                    </div>
                </div>
            `;
        }

        // --- Global Controller Actions ---

        window.navigate = (target) => {
            if (target === 'play_first') {
                if (quizzes.length > 0) window.playQuiz(quizzes[0].id);
                else alert("אין חידונים זמינים. צור אחד קודם!");
                return;
            }
            render(target);
        };

        window.verifyPin = () => {
            const pin = document.getElementById('pin-input').value;
            if (pin === '2160') render('dash');
            else alert('PIN שגוי!');
        };

        window.createQuiz = () => {
            editingQuiz = {
                id: 'q_' + Math.random().toString(36).substr(2, 9),
                title: 'חידון חדש',
                questions: [{
                    type: 'multi',
                    text: '',
                    image: '',
                    opts: ['', '', '', ''],
                    correct: 0
                }],
                createdAt: serverTimestamp()
            };
            currentEditIdx = 0;
            render('editor');
        };

        window.editQuiz = (id) => {
            const q = quizzes.find(item => item.id === id);
            editingQuiz = JSON.parse(JSON.stringify(q));
            currentEditIdx = 0;
            render('editor');
        };

        window.deleteQuiz = async (id) => {
            if (confirm('בטוח שברצונך למחוק?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'quizzes', id));
            }
        };

        window.saveQuiz = async () => {
            try {
                const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'quizzes', editingQuiz.id);
                await setDoc(ref, editingQuiz);
                render('dash');
            } catch (e) {
                alert("Error saving: " + e.message);
            }
        };

        window.addQuestion = (type) => {
            editingQuiz.questions.push({
                type: type,
                text: '',
                image: '',
                opts: type === 'tf' ? ['אמת', 'שקר'] : ['', '', '', ''],
                correct: 0
            });
            currentEditIdx = editingQuiz.questions.length - 1;
            render('editor');
        };

        window.removeQuestion = (idx) => {
            if (editingQuiz.questions.length > 1) {
                editingQuiz.questions.splice(idx, 1);
                currentEditIdx = Math.max(0, currentEditIdx - 1);
                render('editor');
            }
        };

        window.selectQuestion = (idx) => {
            currentEditIdx = idx;
            render('editor');
        };

        window.updateQuizTitle = (v) => editingQuiz.title = v;
        window.updateQField = (field, val) => {
            editingQuiz.questions[currentEditIdx][field] = val;
            render('editor');
        };
        window.updateQOpt = (idx, val) => editingQuiz.questions[currentEditIdx].opts[idx] = val;

        window.playQuiz = (id) => {
            activeQuiz = quizzes.find(q => q.id === id);
            activeQIdx = 0;
            score = 0;
            streak = 0;
            render('play');
        };

        window.submitAnswer = (idx) => {
            const correct = activeQuiz.questions[activeQIdx].correct;
            if (idx === correct) {
                streak++;
                score += (1000 + (streak * 100));
            } else {
                streak = 0;
            }

            if (activeQIdx + 1 < activeQuiz.questions.length) {
                activeQIdx++;
                render('play');
            } else {
                render('results');
            }
        };

        // Start everything
        init();

    </script>
</body>
</html>
