<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate V7 - Full Features</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #f4f4f9; margin: 0; }
        
        .kahoot-purple { background: linear-gradient(135deg, #46178f 0%, #33116d 100%); }
        .kahoot-red { background-color: #e21b3c; }
        .kahoot-blue { background-color: #1368ce; }
        .kahoot-green { background-color: #26890c; }
        .kahoot-yellow { background-color: #d89e00; }
        
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .btn-press { transition: all 0.1s; position: relative; }
        .btn-press:active { transform: translateY(2px); }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .img-preview { max-height: 150px; object-fit: contain; border-radius: 1rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-v7-stable';
        let db, auth, user;
        
        let state = {
            view: 'home',
            quizzes: [],
            editingQuiz: null,
            isSaving: false
        };

        async function init() {
            renderLoading();
            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) setupSubscriptions();
                    else render();
                });
            } catch (err) {
                console.error("Init error", err);
                render();
            }
        }

        function setupSubscriptions() {
            const quizCol = collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes');
            onSnapshot(quizCol, (snap) => {
                state.quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        // --- Global Actions ---
        window.setView = (v) => { state.view = v; render(); };

        window.createEmptyQuiz = () => {
            state.editingQuiz = {
                title: '',
                questions: [{ type: 'multi', text: '', time: 20, correct: 0, image: '', opts: ['', '', '', ''] }]
            };
            setView('editor');
        };

        window.addQuestion = (type) => {
            const newQ = {
                type,
                text: '',
                time: 20,
                correct: 0,
                image: '',
                opts: type === 'tf' ? ['אמת', 'שקר'] : ['', '', '', '']
            };
            state.editingQuiz.questions.push(newQ);
            render();
        };

        window.updateQ = (i, field, val) => {
            state.editingQuiz.questions[i][field] = val;
            if (field === 'image') render(); // Refresh preview
        };

        window.updateOpt = (qIdx, oIdx, val) => {
            state.editingQuiz.questions[qIdx].opts[oIdx] = val;
        };

        window.saveQuiz = async () => {
            const title = document.getElementById('quizTitle').value;
            if (!title.trim()) return alert("חובה להזין שם לחידון");
            
            state.isSaving = true;
            render();

            try {
                const id = state.editingQuiz.id || Math.random().toString(36).substr(2, 9);
                const quizData = { ...state.editingQuiz, title, id, updatedAt: Date.now() };
                
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', id), quizData);
                
                state.isSaving = false;
                state.editingQuiz = null;
                setView('dashboard');
            } catch (e) {
                console.error(e);
                alert("שגיאה בשמירה");
                state.isSaving = false;
                render();
            }
        };

        window.deleteQuiz = async (id) => {
            if (confirm("למחוק חידון זה?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', id));
            }
        };

        function renderLoading() {
            document.getElementById('app').innerHTML = `<div class="h-screen kahoot-purple flex items-center justify-center text-white text-4xl font-black">Quizmo...</div>`;
        }

        function render() {
            const root = document.getElementById('app');
            
            if (state.view === 'home') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-6">
                    <h1 class="text-8xl font-black italic mb-12 animate-bounce">Quizmo!</h1>
                    <div class="w-full max-w-xs space-y-4">
                        <button onclick="setView('login')" class="w-full bg-white text-purple-900 py-5 rounded-2xl text-2xl font-black btn-press shadow-xl">נהל חידונים</button>
                        <button onclick="alert('בקרוב: הצטרפות כשחקן')" class="w-full bg-black/20 text-white py-4 rounded-2xl font-bold border border-white/20">הצטרף למשחק</button>
                    </div>
                </div>`;
            }

            else if (state.view === 'login') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6 text-right">
                    <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
                        <h2 class="text-3xl font-black mb-6 text-center text-gray-800">כניסת מנהל</h2>
                        <input type="password" id="adminPass" class="w-full p-4 bg-gray-100 rounded-xl text-center text-2xl mb-4 outline-none focus:ring-4 ring-purple-200" placeholder="קוד גישה">
                        <button onclick="const p=document.getElementById('adminPass').value; if(p==='2160')setView('dashboard'); else alert('טעות')" class="w-full kahoot-purple text-white py-4 rounded-xl font-black text-xl btn-press">כניסה</button>
                        <button onclick="setView('home')" class="w-full mt-4 text-gray-400 font-bold">חזרה</button>
                    </div>
                </div>`;
            }

            else if (state.view === 'dashboard') {
                root.innerHTML = `
                <div class="min-h-screen bg-gray-50 text-right">
                    <nav class="kahoot-purple text-white p-6 flex justify-between items-center flex-row-reverse">
                        <h1 class="text-2xl font-black italic">Quizmo Admin</h1>
                        <button onclick="setView('home')" class="opacity-70 hover:opacity-100"><i class="fas fa-sign-out-alt text-xl"></i></button>
                    </nav>
                    <div class="max-w-4xl mx-auto p-6">
                        <div class="flex justify-between items-center mb-10 flex-row-reverse">
                            <h2 class="text-3xl font-black">החידונים שלי</h2>
                            <button onclick="createEmptyQuiz()" class="kahoot-green text-white px-8 py-3 rounded-xl font-black btn-press shadow-lg">+ חדש</button>
                        </div>
                        <div class="grid gap-4">
                            ${state.quizzes.map(q => `
                                <div class="bg-white p-6 rounded-3xl shadow-sm border flex justify-between items-center flex-row-reverse">
                                    <div>
                                        <h3 class="text-xl font-black">${q.title}</h3>
                                        <p class="text-gray-400 font-bold text-sm">${q.questions.length} שאלות</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="alert('בפיתוח: הפעלה')" class="kahoot-blue text-white px-6 py-2 rounded-xl font-black">הפעל</button>
                                        <button onclick="state.editingQuiz=JSON.parse(JSON.stringify(state.quizzes.find(x=>x.id==='${q.id}'))); setView('editor');" class="bg-gray-100 p-2 px-4 rounded-xl text-gray-600"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteQuiz('${q.id}')" class="bg-red-50 p-2 px-4 rounded-xl text-red-500"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }

            else if (state.view === 'editor') {
                const qz = state.editingQuiz;
                root.innerHTML = `
                <div class="min-h-screen bg-gray-100 text-right pb-32">
                    <div class="kahoot-purple text-white p-5 sticky top-0 z-50 flex justify-between items-center flex-row-reverse shadow-xl">
                        <input id="quizTitle" value="${qz.title}" class="bg-white/10 border-b-2 border-white/30 text-xl font-black p-2 flex-1 mx-4 text-right outline-none rounded" placeholder="שם החידון">
                        <div class="flex gap-3">
                            <button onclick="saveQuiz()" class="bg-white text-purple-900 px-8 py-2 rounded-lg font-black btn-press flex items-center gap-2">
                                ${state.isSaving ? '<div class="spinner !border-purple-900"></div>' : 'שמור'}
                            </button>
                            <button onclick="setView('dashboard')" class="bg-black/20 px-4 py-2 rounded-lg font-bold">ביטול</button>
                        </div>
                    </div>
                    
                    <div class="max-w-3xl mx-auto p-4 space-y-8 mt-6">
                        ${qz.questions.map((q, i) => `
                            <div class="bg-white rounded-3xl shadow-lg overflow-hidden border">
                                <div class="bg-gray-50 p-4 border-b flex justify-between items-center flex-row-reverse">
                                    <span class="font-black text-purple-900">שאלה ${i+1} (${q.type === 'tf' ? 'אמת/שקר' : 'אמריקאית'})</span>
                                    <button onclick="state.editingQuiz.questions.splice(${i},1); render()" class="text-red-400"><i class="fas fa-trash"></i></button>
                                </div>
                                <div class="p-6 space-y-4">
                                    <textarea oninput="updateQ(${i}, 'text', this.value)" class="w-full p-4 bg-gray-50 rounded-xl text-xl font-bold text-right outline-none" placeholder="הכנס את השאלה כאן...">${q.text}</textarea>
                                    
                                    <div class="flex flex-row-reverse gap-4 items-end">
                                        <div class="flex-1">
                                            <label class="block text-sm font-bold text-gray-400 mb-1">קישור לתמונה (URL)</label>
                                            <input oninput="updateQ(${i}, 'image', this.value)" value="${q.image || ''}" class="w-full p-3 bg-gray-50 rounded-lg text-left font-mono text-sm border" placeholder="https://example.com/image.jpg">
                                        </div>
                                        ${q.image ? `<img src="${q.image}" class="img-preview" onerror="this.style.display='none'">` : ''}
                                    </div>

                                    <div class="grid grid-cols-2 gap-4 mt-4">
                                        ${q.opts.map((opt, oi) => `
                                            <div class="kahoot-${['red','blue','yellow','green'][oi]} p-2 rounded-2xl flex flex-row-reverse items-center gap-2">
                                                <input type="radio" name="ans_${i}" onchange="updateQ(${i}, 'correct', ${oi})" ${q.correct === oi ? 'checked' : ''} class="w-6 h-6">
                                                <input oninput="updateOpt(${i}, ${oi}, this.value)" value="${opt}" class="flex-1 bg-white/20 p-3 rounded-xl text-white font-bold outline-none text-right" placeholder="תשובה...">
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        <div class="flex gap-4">
                            <button onclick="addQuestion('multi')" class="flex-1 bg-white p-6 rounded-2xl border-2 border-dashed font-black text-gray-400 hover:text-purple-600 hover:border-purple-600">+ שאלה אמריקאית</button>
                            <button onclick="addQuestion('tf')" class="flex-1 bg-white p-6 rounded-2xl border-2 border-dashed font-black text-gray-400 hover:text-blue-600 hover:border-blue-600">+ אמת או שקר</button>
                        </div>
                    </div>
                </div>`;
            }
        }

        init();
    </script>
</body>
</html>
