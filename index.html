<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        
        :root {
            --k-purple: #46178f;
            --k-red: #e21b3c;
            --k-blue: #1368ce;
            --k-green: #26890c;
            --k-yellow: #d89e00;
        }

        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: var(--k-purple); 
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .bg-kahoot { background-color: var(--k-purple); }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        
        .btn-hover { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-hover:active { transform: scale(0.95); }

        .loader {
            width: 50px; height: 50px;
            border: 5px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- Config ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-v8-final';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- State ---
        let state = {
            view: 'splash',
            user: null,
            quizzes: [],
            editingQuiz: null,
            isPlaying: false,
            currentQuiz: null,
            qIdx: 0,
            score: 0,
            error: null,
            isSaving: false
        };

        // --- Logic ---
        async function startApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error", e);
            }
        }

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            if (user) {
                fetchQuizzes();
                setTimeout(() => { state.view = 'home'; render(); }, 1000);
            }
        });

        function fetchQuizzes() {
            if (!state.user) return;
            const qCol = collection(db, 'artifacts', appId, 'users', state.user.uid, 'quizzes');
            onSnapshot(qCol, (snap) => {
                state.quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => {
                state.error = "בעיה בטעינת נתונים";
                render();
            });
        }

        window.setView = (v) => { state.view = v; state.error = null; render(); };

        window.initCreate = () => {
            state.editingQuiz = {
                id: 'qz_' + Date.now(),
                title: '',
                questions: [{ type: 'multi', text: '', image: '', opts: ['', '', '', ''], correct: 0 }]
            };
            state.view = 'editor';
            render();
        };

        window.addQ = (type) => {
            state.editingQuiz.questions.push({
                type: type,
                text: '',
                image: '',
                opts: type === 'tf' ? ['אמת', 'שקר'] : ['', '', '', ''],
                correct: 0
            });
            render();
        };

        window.save = async () => {
            if (!state.editingQuiz.title) return alert("אנא הזן שם לחידון");
            state.isSaving = true;
            render();
            try {
                const ref = doc(db, 'artifacts', appId, 'users', state.user.uid, 'quizzes', state.editingQuiz.id);
                await setDoc(ref, state.editingQuiz);
                state.isSaving = false;
                state.view = 'dashboard';
                render();
            } catch (e) {
                state.isSaving = false;
                alert("שגיאה בשמירה לשרת: " + e.message);
                render();
            }
        };

        window.deleteQuiz = async (id) => {
            if (!confirm("למחוק?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'quizzes', id));
        };

        window.startPlay = (quiz) => {
            state.currentQuiz = quiz;
            state.qIdx = 0;
            state.score = 0;
            state.view = 'play';
            render();
        };

        window.answer = (idx) => {
            const q = state.currentQuiz.questions[state.qIdx];
            if (idx === q.correct) state.score += 100;
            
            if (state.qIdx + 1 < state.currentQuiz.questions.length) {
                state.qIdx++;
                render();
            } else {
                state.view = 'summary';
                render();
            }
        };

        // --- UI ---
        function render() {
            const root = document.getElementById('root');
            if (state.view === 'splash') {
                root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center"><h1 class="text-7xl font-black italic mb-8">QUIZMO</h1><div class="loader"></div></div>`;
            } else if (state.view === 'home') {
                root.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center p-6 text-center">
                    <h1 class="text-8xl font-black italic mb-16 tracking-tighter">Quizmo!</h1>
                    <div class="w-full max-w-sm space-y-4">
                        <button onclick="setView('login')" class="w-full bg-white text-purple-900 py-6 rounded-2xl text-3xl font-black shadow-2xl btn-hover">נהל חידונים</button>
                        <button onclick="state.quizzes.length ? startPlay(state.quizzes[0]) : alert('אין חידונים')" class="w-full bg-black/30 border-2 border-white/20 py-4 rounded-2xl text-xl font-bold btn-hover">הצטרף כשחקן</button>
                    </div>
                </div>`;
            } else if (state.view === 'login') {
                root.innerHTML = `
                <div class="h-screen flex items-center justify-center p-6">
                    <div class="glass p-10 rounded-3xl w-full max-w-md text-center">
                        <h2 class="text-3xl font-black mb-6">כניסת מנהל</h2>
                        <input id="pw" type="password" placeholder="קוד גישה" class="w-full p-4 rounded-xl text-black text-center text-2xl mb-4 outline-none">
                        <button onclick="document.getElementById('pw').value === '2160' ? setView('dashboard') : alert('טעות')" class="w-full bg-white text-purple-900 py-4 rounded-xl font-black text-xl">כניסה</button>
                        <button onclick="setView('home')" class="mt-4 opacity-50 font-bold">ביטול</button>
                    </div>
                </div>`;
            } else if (state.view === 'dashboard') {
                root.innerHTML = `
                <div class="p-8 max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-10 flex-row-reverse">
                        <h2 class="text-5xl font-black">החידונים שלי</h2>
                        <button onclick="initCreate()" class="bg-green-500 px-8 py-3 rounded-xl font-black text-xl btn-hover shadow-lg">צור חידון חדש +</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${state.quizzes.map(q => `
                            <div class="glass p-6 rounded-2xl flex flex-col">
                                <h3 class="text-2xl font-black mb-4">${q.title}</h3>
                                <p class="mb-6 opacity-60">${q.questions.length} שאלות</p>
                                <div class="mt-auto grid grid-cols-2 gap-2">
                                    <button onclick="startPlay(${JSON.stringify(q).replace(/"/g, '&quot;')})" class="col-span-2 bg-blue-500 py-3 rounded-xl font-black">שחק עכשיו</button>
                                    <button onclick="state.editingQuiz=${JSON.stringify(q).replace(/"/g, '&quot;')}; setView('editor')" class="bg-white/10 py-2 rounded-lg font-bold">ערוך</button>
                                    <button onclick="deleteQuiz('${q.id}')" class="bg-red-500/20 text-red-300 py-2 rounded-lg font-bold">מחק</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('home')" class="mt-12 block mx-auto opacity-50">חזרה לדף הבית</button>
                </div>`;
            } else if (state.view === 'editor') {
                const qz = state.editingQuiz;
                root.innerHTML = `
                <div class="min-h-screen bg-gray-100 text-gray-900 pb-20">
                    <header class="bg-kahoot p-4 text-white flex justify-between items-center flex-row-reverse sticky top-0 z-50">
                        <input oninput="state.editingQuiz.title=this.value" value="${qz.title}" class="bg-white/10 border-b-2 p-2 text-2xl font-black outline-none w-1/2" placeholder="שם החידון...">
                        <div class="flex gap-2">
                            <button onclick="save()" class="bg-green-500 px-6 py-2 rounded-lg font-black text-lg">${state.isSaving ? 'שומר...' : 'שמור חידון'}</button>
                            <button onclick="setView('dashboard')" class="bg-white/10 px-4 py-2 rounded-lg">ביטול</button>
                        </div>
                    </header>
                    <div class="max-w-4xl mx-auto p-4 space-y-8 mt-6">
                        ${qz.questions.map((q, i) => `
                            <div class="bg-white rounded-2xl shadow-xl p-6 border-r-8 border-purple-600">
                                <div class="flex justify-between items-center mb-4 flex-row-reverse">
                                    <span class="font-black text-xl">שאלה ${i+1} (${q.type === 'tf' ? 'אמת/שקר' : 'אמריקאית'})</span>
                                    <button onclick="state.editingQuiz.questions.splice(${i},1); render()" class="text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                                <textarea oninput="state.editingQuiz.questions[${i}].text=this.value" class="w-full p-4 bg-gray-50 rounded-xl text-xl mb-4 border focus:border-purple-500 outline-none" placeholder="הקלד שאלה...">${q.text}</textarea>
                                <input oninput="state.editingQuiz.questions[${i}].image=this.value" value="${q.image}" class="w-full p-2 mb-4 bg-gray-100 rounded text-sm" placeholder="URL לתמונה (אופציונלי)">
                                
                                <div class="grid grid-cols-2 gap-4">
                                    ${q.opts.map((opt, oi) => `
                                        <div class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border">
                                            <input type="radio" name="corr_${i}" ${q.correct === oi ? 'checked' : ''} onchange="state.editingQuiz.questions[${i}].correct=${oi}">
                                            <input oninput="state.editingQuiz.questions[${i}].opts[${oi}]=this.value" value="${opt}" class="flex-1 bg-transparent outline-none font-bold" placeholder="תשובה ${oi+1}...">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                        <div class="flex gap-4">
                            <button onclick="addQ('multi')" class="flex-1 bg-white p-6 rounded-xl border-2 border-dashed font-black text-purple-600">+ שאלה אמריקאית</button>
                            <button onclick="addQ('tf')" class="flex-1 bg-white p-6 rounded-xl border-2 border-dashed font-black text-blue-600">+ אמת או שקר</button>
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'play') {
                const q = state.currentQuiz.questions[state.qIdx];
                root.innerHTML = `
                <div class="h-screen flex flex-col p-6">
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-2xl font-black">${state.qIdx + 1} / ${state.currentQuiz.questions.length}</span>
                        <span class="text-2xl font-black">Score: ${state.score}</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center text-center gap-6">
                        <h2 class="text-5xl font-black">${q.text}</h2>
                        ${q.image ? `<img src="${q.image}" class="max-h-64 rounded-2xl shadow-2xl">` : ''}
                        <div class="grid grid-cols-2 gap-4 w-full max-w-4xl mt-10">
                            ${q.opts.map((opt, oi) => opt ? `
                                <button onclick="answer(${oi})" class="p-8 rounded-2xl text-2xl font-black shadow-xl btn-hover text-white" style="background-color: var(--k-${['red','blue','yellow','green'][oi]})">
                                    ${opt}
                                </button>
                            ` : '').join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'summary') {
                root.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center text-center p-6">
                    <h2 class="text-7xl font-black mb-4">כל הכבוד!</h2>
                    <div class="glass p-12 rounded-full mb-8">
                        <div class="text-8xl font-black">${state.score}</div>
                        <div class="text-xl opacity-60">ניקוד סופי</div>
                    </div>
                    <button onclick="setView('home')" class="bg-white text-purple-900 px-12 py-4 rounded-2xl text-2xl font-black">חזרה לתפריט</button>
                </div>`;
            }
        }

        startApp();
        render();
    </script>
</body>
</html>
