<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #f2f2f2; margin: 0; overflow-x: hidden; }
        .kahoot-purple { background-color: #46178f; }
        .kahoot-red { background-color: #e21b3c; }
        .kahoot-blue { background-color: #1368ce; }
        .kahoot-green { background-color: #26890c; }
        .kahoot-yellow { background-color: #d89e00; }
        .btn-shadow { box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: all 0.1s; }
        .btn-shadow:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white">
            <div class="text-6xl font-black animate-pulse italic mb-6">Quizmo</div>
            <div class="spinner mb-4"></div>
            <div id="status-text" class="text-sm opacity-70">מתחבר למערכת...</div>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- Configuration & Initialization ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-v4';
        let db, auth, user;

        let state = {
            view: 'home',
            quizzes: [],
            players: [],
            currentGame: null,
            myPlayerData: null,
            timeLeft: 0,
            timerId: null,
            editingQuiz: null,
            nickname: '',
            pin: ''
        };

        async function init() {
            const statusEl = document.getElementById('status-text');
            
            try {
                // Check for config
                let config;
                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                }

                if (!config || !config.apiKey) {
                    console.warn("No Firebase config found. App will run in Preview Mode.");
                    render(); // Fallback to UI-only or mock data if needed
                    return;
                }

                // Initialize Firebase
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                // Auth
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) {
                        statusEl.innerText = "טוען נתונים...";
                        setupSubscriptions();
                    }
                    render();
                });

            } catch (err) {
                console.error("Init error:", err);
                render(); // Show UI anyway
            }
        }

        function setupSubscriptions() {
            if (!user || !db) return;

            // Load Quizzes (Private)
            const quizCol = collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes');
            onSnapshot(quizCol, (snap) => {
                state.quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.log("Quiz sync error", err));
        }

        // --- Actions ---
        window.setView = (v) => { state.view = v; render(); };

        window.handleAdminLogin = () => {
            const pass = document.getElementById('adminPass').value;
            if (pass === '2160') setView('dashboard');
            else alert("קוד שגוי");
        };

        window.createQuiz = () => {
            state.editingQuiz = { title: 'חידון חדש', questions: [] };
            setView('editor');
        };

        window.addQuestion = (type) => {
            state.editingQuiz.questions.push({
                type,
                text: '',
                time: 20,
                correct: 0,
                opts: type === 'tf' ? ['אמת', 'שקר'] : ['', '', '', '']
            });
            render();
        };

        window.saveQuiz = async () => {
            if (!db || !user) return alert("המערכת בטעינה, נסה שוב בעוד רגע");
            const titleInput = document.getElementById('quizTitle');
            if (titleInput) state.editingQuiz.title = titleInput.value;
            
            if (state.editingQuiz.questions.length === 0) return alert("יש להוסיף לפחות שאלה אחת");

            const id = state.editingQuiz.id || Math.random().toString(36).substr(2, 9);
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', id);
            
            await setDoc(docRef, { ...state.editingQuiz, id });
            setView('dashboard');
        };

        window.hostGame = async (quizId) => {
            if (!db) return;
            const quiz = state.quizzes.find(q => q.id === quizId);
            const pin = Math.floor(100000 + Math.random() * 899999).toString();
            state.pin = pin;
            
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', pin);
            await setDoc(gameRef, {
                pin, quiz, status: 'lobby', hostId: user.uid, currentQ: 0, lastUpdate: Date.now()
            });
            
            listenToGame(pin);
            setView('host_lobby');
        };

        window.joinGame = async () => {
            const pinInput = document.getElementById('joinPin').value;
            if (!pinInput || !db) return;

            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pinInput));
            if (!snap.exists()) return alert("PIN לא נמצא");
            
            state.pin = pinInput;
            setView('join_nick');
        };

        window.enterLobby = async () => {
            const nick = document.getElementById('joinNick').value;
            if (!nick || !db) return;
            state.nickname = nick;
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                pin: state.pin, name: nick, score: 0, hasAnswered: false, id: user.uid
            });
            
            listenToGame(state.pin);
            setView('player_lobby');
        };

        function listenToGame(pin) {
            // Game State
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), (snap) => {
                if (!snap.exists()) return;
                state.currentGame = snap.data();
                if (state.currentGame.hostId === user.uid) handleHostTimer();
                render();
            });

            // Players
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                state.players = snap.docs
                    .map(d => d.data())
                    .filter(p => p.pin === pin)
                    .sort((a,b) => b.score - a.score);
                
                state.myPlayerData = state.players.find(p => p.id === user.uid);
                render();
            });
        }

        function handleHostTimer() {
            if (state.currentGame.status === 'question' && !state.timerId) {
                const q = state.currentGame.quiz.questions[state.currentGame.currentQ];
                state.timeLeft = q.time;
                state.timerId = setInterval(async () => {
                    state.timeLeft--;
                    const allAns = state.players.length > 0 && state.players.every(p => p.hasAnswered);
                    if (state.timeLeft <= 0 || allAns) {
                        clearInterval(state.timerId);
                        state.timerId = null;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin), { status: 'reveal' });
                    }
                    render();
                }, 1000);
            }
        }

        window.submitAnswer = async (idx) => {
            if (!state.myPlayerData || state.myPlayerData.hasAnswered || state.currentGame.status !== 'question') return;
            const q = state.currentGame.quiz.questions[state.currentGame.currentQ];
            const isCorrect = idx === q.correct;
            const pts = isCorrect ? Math.max(100, state.timeLeft * 50) : 0;
            
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                hasAnswered: true, lastCorrect: isCorrect, score: state.myPlayerData.score + pts, lastPoints: pts
            });
        };

        window.startGame = async () => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin), { status: 'question', currentQ: 0 });
        };

        window.nextStep = async () => {
            const g = state.currentGame;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin);
            
            if (g.status === 'reveal') await updateDoc(ref, { status: 'scoreboard' });
            else if (g.status === 'scoreboard') {
                if (g.currentQ + 1 >= g.quiz.questions.length) await updateDoc(ref, { status: 'podium' });
                else {
                    for(let p of state.players) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id), { hasAnswered: false });
                    }
                    await updateDoc(ref, { status: 'question', currentQ: g.currentQ + 1 });
                }
            }
        };

        // --- Rendering ---
        function render() {
            const root = document.getElementById('app');
            if (state.view === 'home') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-6">
                    <h1 class="text-7xl font-black italic mb-16 drop-shadow-xl animate-pop">Quizmo!</h1>
                    <div class="w-full max-w-xs space-y-4">
                        <button onclick="setView('join')" class="w-full bg-white text-black py-5 rounded-2xl text-2xl font-black btn-shadow">הצטרף למשחק</button>
                        <button onclick="setView('login')" class="w-full text-white/50 font-bold py-4 hover:text-white transition">ניהול מערכת</button>
                    </div>
                    ${!db ? '<p class="mt-8 text-xs opacity-50">מצב תצוגה מקדימה בלבד</p>' : ''}
                </div>`;
            } else if (state.view === 'login') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6 text-right">
                    <div class="bg-white p-10 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                        <h2 class="text-2xl font-bold mb-6">קוד ניהול</h2>
                        <input type="password" id="adminPass" class="w-full p-4 bg-gray-100 rounded-xl text-center text-3xl mb-6 outline-none border-2 focus:border-purple-600 font-mono" placeholder="••••">
                        <button onclick="handleAdminLogin()" class="w-full kahoot-purple text-white py-4 rounded-xl font-black btn-shadow">כניסה</button>
                        <button onclick="setView('home')" class="mt-4 text-gray-400 font-bold">חזור</button>
                    </div>
                </div>`;
            } else if (state.view === 'dashboard') {
                root.innerHTML = `
                <div class="p-6 max-w-4xl mx-auto text-right">
                    <div class="flex flex-row-reverse justify-between items-center mb-10">
                        <h1 class="text-4xl font-black">החידונים שלי</h1>
                        <button onclick="createQuiz()" class="kahoot-green text-white px-8 py-3 rounded-xl font-bold btn-shadow">+ צור חדש</button>
                    </div>
                    <div class="grid gap-6">
                        ${state.quizzes.length === 0 ? '<div class="text-center py-20 bg-white rounded-3xl opacity-40 font-bold">אין לך חידונים עדיין</div>' : ''}
                        ${state.quizzes.map(q => `
                            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-row-reverse justify-between items-center animate-pop">
                                <div><h3 class="text-2xl font-bold">${q.title}</h3><p class="text-gray-400 font-medium">${q.questions.length} שאלות</p></div>
                                <div class="flex gap-3">
                                    <button onclick="hostGame('${q.id}')" class="kahoot-blue text-white px-8 py-3 rounded-xl font-black btn-shadow">הפעל</button>
                                    <button onclick="state.editingQuiz = state.quizzes.find(x=>x.id==='${q.id}'); setView('editor');" class="bg-gray-100 p-3 rounded-xl hover:bg-gray-200"><i class="fas fa-edit"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('home')" class="mt-12 text-gray-500 font-bold hover:underline">חזור למסך הראשי</button>
                </div>`;
            } else if (state.view === 'editor') {
                const qz = state.editingQuiz;
                root.innerHTML = `
                <div class="p-6 max-w-3xl mx-auto pb-40 text-right">
                    <div class="flex flex-row-reverse items-center gap-4 mb-8">
                        <button onclick="setView('dashboard')" class="text-2xl"><i class="fas fa-arrow-left"></i></button>
                        <input id="quizTitle" value="${qz.title}" class="flex-1 text-3xl font-black border-b-4 border-purple-900 outline-none p-2 bg-transparent focus:border-purple-500 transition text-right">
                    </div>
                    <div class="space-y-8">
                        ${qz.questions.map((q, i) => `
                            <div class="bg-white p-8 rounded-3xl shadow-lg border-l-8 border-purple-600 relative animate-pop">
                                <div class="flex flex-row-reverse justify-between mb-6">
                                    <span class="font-black text-purple-900 text-lg underline">שאלה ${i+1}</span>
                                    <button onclick="state.editingQuiz.questions.splice(${i},1); render()" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                                </div>
                                <textarea onchange="state.editingQuiz.questions[${i}].text = this.value" class="w-full p-4 bg-gray-50 rounded-xl mb-6 font-bold text-lg resize-none h-24 text-right" placeholder="כתוב את השאלה כאן...">${q.text}</textarea>
                                <div class="grid grid-cols-2 gap-4">
                                    ${q.opts.map((opt, oi) => `
                                        <div class="flex flex-row-reverse items-center gap-3 bg-gray-50 p-4 rounded-2xl border-2 ${q.correct === oi ? 'border-green-500 bg-green-50' : 'border-transparent'}">
                                            <input type="radio" name="correct_${i}" onchange="state.editingQuiz.questions[${i}].correct = ${oi}" ${q.correct === oi ? 'checked' : ''} class="w-6 h-6 accent-green-600">
                                            <input onchange="state.editingQuiz.questions[${i}].opts[${oi}] = this.value" value="${opt}" class="bg-transparent w-full font-bold text-right" placeholder="תשובה ${oi+1}">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md p-6 shadow-2xl flex gap-4">
                        <button onclick="addQuestion('multi')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-black text-lg btn-shadow">אמריקאית +</button>
                        <button onclick="addQuestion('tf')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-black text-lg btn-shadow">אמת/שקר +</button>
                        <button onclick="saveQuiz()" class="flex-1 kahoot-green text-white py-4 rounded-2xl font-black text-lg btn-shadow">שמור חידון</button>
                    </div>
                </div>`;
            } else if (state.view === 'join') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6">
                    <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-xs text-center shadow-2xl">
                        <h2 class="text-4xl font-black italic mb-8">Quizmo!</h2>
                        <input id="joinPin" inputmode="numeric" class="w-full p-5 bg-gray-100 rounded-2xl text-center text-3xl font-black mb-6 outline-none border-4 focus:border-purple-600 tracking-widest" placeholder="PIN">
                        <button onclick="joinGame()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xl btn-shadow">קדימה!</button>
                        <button onclick="setView('home')" class="mt-6 text-gray-400 font-bold block w-full">ביטול</button>
                    </div>
                </div>`;
            } else if (state.view === 'join_nick') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6">
                    <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-xs text-center shadow-2xl">
                        <h2 class="text-2xl font-black mb-6 underline">איך יקראו לך?</h2>
                        <input id="joinNick" maxlength="15" class="w-full p-5 bg-gray-100 rounded-2xl text-center text-xl mb-6 outline-none font-black" placeholder="הכנס כינוי">
                        <button onclick="enterLobby()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xl btn-shadow">אני מוכן!</button>
                    </div>
                </div>`;
            } else if (state.view === 'host_lobby') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple text-white flex flex-col">
                    <div class="bg-white text-black py-10 text-center shadow-2xl">
                        <p class="font-black text-gray-400 text-lg uppercase tracking-widest mb-2">PIN משחק:</p>
                        <h1 class="text-8xl font-black tracking-tighter">${state.pin}</h1>
                    </div>
                    <div class="flex-1 p-10 overflow-y-auto">
                        <div class="flex flex-row-reverse justify-between items-end mb-12">
                            <div class="text-right">
                                <h2 class="text-4xl font-black mb-1">${state.currentGame?.quiz.title}</h2>
                                <span class="text-xl opacity-70 font-bold"><i class="fas fa-user-friends mr-2"></i> ${state.players.length} שחקנים מחוברים</span>
                            </div>
                            <button onclick="startGame()" class="bg-white text-black px-12 py-5 rounded-2xl font-black text-2xl btn-shadow hover:scale-105 transition">התחל משחק</button>
                        </div>
                        <div class="flex flex-wrap gap-4 justify-center">
                            ${state.players.length === 0 ? '<div class="text-2xl opacity-30 mt-20 font-black animate-pulse">מחכה לשחקנים...</div>' : ''}
                            ${state.players.map(p => `<div class="bg-white/10 backdrop-blur-md border-2 border-white/20 px-8 py-3 rounded-xl text-2xl font-black animate-pop">${p.name}</div>`).join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'player_lobby') {
                root.innerHTML = `
                <div class="h-screen kahoot-green text-white flex flex-col items-center justify-center p-6 text-center">
                    <div class="text-8xl mb-8 animate-bounce"><i class="fas fa-check-circle"></i></div>
                    <h2 class="text-5xl font-black italic mb-4">אתה בפנים!</h2>
                    <p class="text-2xl mb-16 opacity-80 font-bold">השם שלך על המסך?</p>
                    <div class="bg-black/20 px-16 py-6 rounded-3xl text-3xl font-black border-4 border-white/10">${state.nickname}</div>
                </div>`;
            } else if (state.currentGame) {
                root.innerHTML = renderGame();
            }
        }

        function renderGame() {
            const g = state.currentGame;
            const q = g.quiz.questions[g.currentQ];
            const isHost = g.hostId === user.uid;

            if (isHost) {
                if (g.status === 'question') {
                    return `
                    <div class="h-screen flex flex-col bg-white overflow-hidden text-right">
                        <div class="p-10 text-center shadow-md bg-white z-10"><h1 class="text-5xl font-black leading-tight">${q.text}</h1></div>
                        <div class="flex-1 flex flex-col items-center justify-center relative bg-gray-50">
                            <div class="absolute right-12 top-1/2 -translate-y-1/2 text-7xl font-black w-32 h-32 rounded-full border-8 border-purple-900 flex items-center justify-center text-purple-900 bg-white shadow-xl">${state.timeLeft}</div>
                            <div class="w-80 h-80 kahoot-purple rounded-3xl flex items-center justify-center text-8xl text-white italic font-black shadow-2xl animate-pulse">Q</div>
                            <div class="absolute left-12 top-1/2 -translate-y-1/2 text-center bg-white p-8 rounded-3xl shadow-xl">
                                <div class="text-7xl font-black text-purple-900">${state.players.filter(p=>p.hasAnswered).length}</div>
                                <div class="font-black text-xl text-gray-400">תשובות</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 p-4 h-[30vh]">
                            ${[0,1,2,3].filter(i => q.type==='multi' || i < 2).map(i => `
                                <div class="kahoot-${['red','blue','yellow','green'][i]} text-white flex flex-row-reverse items-center px-12 rounded-2xl text-3xl font-black shadow-lg">
                                    <i class="fas ${['fa-caret-up','fa-square','fa-circle','fa-square'][i]} ml-6 text-4xl" ${i===1?'style="transform:rotate(45deg)"':''}></i>
                                    ${q.opts[i]}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
                if (g.status === 'reveal' || g.status === 'scoreboard') {
                    return `
                    <div class="h-screen kahoot-purple text-white p-12 flex flex-col text-right">
                        <div class="flex flex-row-reverse justify-between items-center mb-12">
                            <h1 class="text-5xl font-black italic">לוח התוצאות</h1>
                            <button onclick="nextStep()" class="bg-white text-black px-12 py-5 rounded-2xl font-black text-2xl btn-shadow">הבא</button>
                        </div>
                        <div class="flex-1 max-w-3xl w-full mx-auto space-y-4 overflow-y-auto pr-4">
                            ${state.players.slice(0,5).map((p, i) => `
                                <div class="bg-white text-black p-6 rounded-[2rem] flex flex-row-reverse justify-between items-center animate-pop shadow-xl" style="animation-delay:${i*100}ms">
                                    <div class="flex flex-row-reverse items-center gap-6">
                                        <span class="w-12 h-12 flex items-center justify-center bg-purple-100 text-purple-900 rounded-full font-black text-xl">${i+1}</span>
                                        <span class="text-3xl font-black">${p.name}</span>
                                    </div>
                                    <span class="text-4xl font-black text-purple-900">${p.score}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
                if (g.status === 'podium') {
                    return `
                    <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-6 text-center">
                        <i class="fas fa-trophy text-[12rem] text-yellow-400 mb-12 animate-bounce"></i>
                        <h1 class="text-7xl font-black mb-4 drop-shadow-lg">${state.players[0]?.name || 'סוף החידון'}</h1>
                        <p class="text-3xl opacity-70 mb-16 font-black">${state.players[0]?.score || 0} נקודות!</p>
                        <button onclick="location.reload()" class="bg-white text-black px-16 py-6 rounded-[2.5rem] font-black text-3xl btn-shadow shadow-2xl">סגור משחק</button>
                    </div>`;
                }
            } else {
                // Player Screen
                if (g.status === 'question') {
                    if (state.myPlayerData?.hasAnswered) {
                        return `
                        <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-10 text-center">
                            <div class="spinner mb-8 scale-150"></div>
                            <h2 class="text-4xl font-black italic animate-pulse">תשובה נשלחה...</h2>
                            <p class="mt-4 text-xl opacity-60">היה זה נכון? נראה עוד רגע!</p>
                        </div>`;
                    }
                    if (q.type === 'tf') {
                        return `
                        <div class="h-screen flex flex-col gap-3 p-3 bg-gray-200">
                            <button onclick="submitAnswer(0)" class="flex-1 kahoot-red rounded-3xl flex items-center justify-center active:scale-90 transition-transform shadow-2xl">
                                <i class="fas fa-caret-up text-[150px] text-white"></i>
                            </button>
                            <button onclick="submitAnswer(1)" class="flex-1 kahoot-blue rounded-3xl flex items-center justify-center active:scale-90 transition-transform shadow-2xl">
                                <i class="fas fa-square text-[110px] text-white" style="transform:rotate(45deg)"></i>
                            </button>
                        </div>`;
                    }
                    return `
                    <div class="h-screen grid grid-cols-2 grid-rows-2 gap-3 p-3 bg-gray-200">
                        ${[0,1,2,3].map(i => `
                            <button onclick="submitAnswer(${i})" class="kahoot-${['red','blue','yellow','green'][i]} rounded-3xl flex items-center justify-center active:scale-90 transition-transform shadow-2xl">
                                <i class="fas ${['fa-caret-up','fa-square','fa-circle','fa-square'][i]} text-[110px] text-white" ${i===1?'style="transform:rotate(45deg)"':''}></i>
                            </button>
                        `).join('')}
                    </div>`;
                }
                if (g.status === 'reveal') {
                    const win = state.myPlayerData?.lastCorrect;
                    return `
                    <div class="h-screen ${win ? 'kahoot-green' : 'kahoot-red'} flex flex-col items-center justify-center text-white p-10 text-center">
                        <i class="fas ${win ? 'fa-check-circle' : 'fa-times-circle'} text-[10rem] mb-10 animate-pop"></i>
                        <h2 class="text-6xl font-black mb-6">${win ? 'מצוין!' : 'לא נורא...'}</h2>
                        <div class="bg-black/30 px-12 py-5 rounded-2xl text-3xl font-black border-2 border-white/20">+${state.myPlayerData?.lastPoints || 0}</div>
                    </div>`;
                }
                return `
                <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white text-center p-12">
                    <h2 class="text-4xl font-black mb-4 italic">הסתכל על המסך הראשי!</h2>
                    <p class="text-xl opacity-60 font-bold">התוצאות מוצגות עכשיו.</p>
                </div>`;
            }
        }

        // Run
        init();
    </script>
</body>
</html>
