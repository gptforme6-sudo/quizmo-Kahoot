<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; transition: background-color 0.5s ease; }
        .animate-bounce-short { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        
        /* Loading Screen Styles */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #46178f;
            color: white;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-top: 8px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .fade-out { opacity: 0; visibility: hidden; }
    </style>
</head>
<body class="bg-[#f2f2f2] text-gray-900 overflow-x-hidden">

    <div id="app">
        <!-- Loading Screen (The effect you liked) -->
        <div id="loading-screen">
            <div class="loader-ring mb-6"></div>
            <h1 class="text-3xl font-black italic animate-pulse">Quizmo</h1>
            <p class="mt-4 text-white/70 font-bold" id="loading-status">מתחבר לשרתים...</p>
        </div>

        <!-- Mute Toggle -->
        <button onclick="toggleMute()" class="fixed top-4 left-4 z-50 p-3 bg-white rounded-full shadow-lg hover:bg-gray-100 transition">
            <i id="mute-icon" data-lucide="volume-2"></i>
        </button>

        <!-- Main Content Area -->
        <div id="main-content" class="opacity-0 transition-opacity duration-1000">
            <!-- Content injected here -->
        </div>
    </div>

    <script>
        // --- Configuration & Globals ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-v2-stable';
        let isMuted = false;
        let user = null;
        let db = null;

        // --- Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol=0.1) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Firebase Initialization ---
        async function initApp() {
            const statusText = document.getElementById('loading-status');
            
            try {
                // Check if config exists, if not, wait 2 seconds and show local mode
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    
                    statusText.innerText = "מאמת משתמש...";
                    const u = await firebase.auth().signInAnonymously();
                    user = u.user;
                } else {
                    statusText.innerText = "מצב מקומי (ללא שרת)";
                    await new Promise(r => setTimeout(r, 1500));
                }
            } catch (err) {
                console.error("Firebase Error:", err);
                statusText.innerText = "שגיאת חיבור, טוען במצב לא מקוון";
                await new Promise(r => setTimeout(r, 1500));
            }

            hideLoading();
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            const main = document.getElementById('main-content');
            
            loader.classList.add('fade-out');
            main.classList.remove('opacity-0');
            
            setTimeout(() => {
                renderView('home');
            }, 500);
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        // --- Views ---
        function renderView(view) {
            const container = document.getElementById('main-content');
            
            if (view === 'home') {
                document.body.style.backgroundColor = "#46178f";
                container.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center text-white px-4">
                        <div class="text-center mb-12">
                            <h1 class="text-7xl md:text-9xl font-black mb-4 drop-shadow-2xl animate-bounce-short italic">Quizmo!</h1>
                            <p class="text-xl font-bold opacity-80">החידון שכולם אוהבים</p>
                        </div>
                        
                        <div class="flex flex-col gap-5 w-full max-w-xs">
                            <button onclick="renderView('join')" class="group relative bg-white text-black py-5 rounded-xl font-black text-2xl shadow-[0_8px_0_#ccc] active:shadow-none active:translate-y-2 transition-all">
                                הצטרף למשחק
                            </button>
                            <button onclick="renderView('create')" class="bg-[#1368ce] text-white py-5 rounded-xl font-black text-2xl shadow-[0_8px_0_#0c4891] active:shadow-none active:translate-y-2 transition-all">
                                צור חידון חדש
                            </button>
                        </div>
                        
                        <div class="mt-12 text-sm opacity-50 font-bold">Version 2.0 • Realtime Engine</div>
                    </div>
                `;
            } else if (view === 'join') {
                container.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-4">
                        <div class="bg-white p-8 rounded-2xl w-full max-w-sm flex flex-col gap-6 shadow-2xl scale-in">
                            <h2 class="text-3xl font-black text-center text-[#46178f]">הזן קוד PIN</h2>
                            <input id="pin-input" type="number" class="p-4 border-4 border-gray-100 rounded-xl text-center text-4xl font-black tracking-widest focus:border-[#46178f] outline-none transition" placeholder="000000">
                            <input id="nick-input" type="text" class="p-4 border-4 border-gray-100 rounded-xl text-center text-xl font-bold focus:border-[#46178f] outline-none transition" placeholder="איך קוראים לך?">
                            <button onclick="handleJoin()" class="bg-[#26890c] text-white py-4 rounded-xl font-black text-2xl shadow-[0_6px_0_#195c08] active:translate-y-1 active:shadow-none transition-all">
                                יאללה נכנסתי!
                            </button>
                            <button onclick="renderView('home')" class="text-gray-400 font-bold hover:text-gray-600 transition">חזרה</button>
                        </div>
                    </div>
                `;
            } else if (view === 'create') {
                // Simplified creation for this demo
                container.innerHTML = `
                    <div class="min-h-screen bg-white p-6 max-w-2xl mx-auto">
                        <div class="flex items-center justify-between mb-8">
                            <button onclick="renderView('home')" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-right"></i></button>
                            <h2 class="text-2xl font-black">יצירת חידון</h2>
                            <div class="w-10"></div>
                        </div>
                        
                        <div class="space-y-6">
                            <div>
                                <label class="block font-black mb-2">כותרת החידון</label>
                                <input id="q-title" class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-purple-500 rounded-xl outline-none font-bold text-xl" placeholder="למשל: ידע כללי">
                            </div>
                            <div class="p-6 border-2 border-dashed border-gray-200 rounded-2xl text-center">
                                <p class="text-gray-500 font-bold">כאן תוסיף שאלות בהמשך...</p>
                            </div>
                            <button onclick="alert('פונקציונליות בבנייה')" class="w-full bg-[#46178f] text-white py-4 rounded-xl font-black text-xl shadow-lg">צור ושחק</button>
                        </div>
                    </div>
                `;
            }
            
            lucide.createIcons();
        }

        async function handleJoin() {
            const pin = document.getElementById('pin-input').value;
            const nick = document.getElementById('nick-input').value;
            
            if (!pin || !nick) return;
            
            playTone(440, 'sine', 0.2);
            // Here you'd add the Firebase join logic
            alert(`היי ${nick}! מנסה להתחבר לחדר ${pin}...`);
        }

        // --- Entry Point ---
        window.onload = () => {
            initApp();
            lucide.createIcons();
        };

    </script>
</body>
</html>
