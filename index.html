<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Kahoot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #f4f4f9; margin: 0; overflow-x: hidden; }
        
        .kahoot-purple { background: linear-gradient(135deg, #46178f 0%, #33116d 100%); }
        .kahoot-red { background-color: #e21b3c; }
        .kahoot-blue { background-color: #1368ce; }
        .kahoot-green { background-color: #26890c; }
        .kahoot-yellow { background-color: #d89e00; }
        
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
        .btn-press { transition: all 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); position: relative; }
        .btn-press:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .option-input { border: 2px solid transparent; transition: all 0.2s; }
        .option-input:focus { border-color: white; background-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Global State
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-pro-v6-fixed';
        let db, auth, user;
        
        let state = {
            view: 'home',
            quizzes: [],
            players: [],
            currentGame: null,
            myPlayerData: null,
            timeLeft: 0,
            timerId: null,
            editingQuiz: null,
            nickname: '',
            pin: '',
            isSaving: false,
            pinErrorMessage: ''
        };

        async function init() {
            renderLoading();
            try {
                let config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                
                if (config) {
                    const app = initializeApp(config);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (u) => {
                        user = u;
                        if (user) setupSubscriptions();
                        render();
                    });
                } else {
                    render(); 
                }
            } catch (err) {
                console.error("Initialization failed", err);
                render();
            }
        }

        function setupSubscriptions() {
            if (!user || !db) return;
            const quizCol = collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes');
            onSnapshot(quizCol, (snap) => {
                state.quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Firestore error:", err));
        }

        // --- Logic ---

        window.setView = (v) => { 
            state.view = v; 
            state.pinErrorMessage = '';
            render(); 
        };

        window.createEmptyQuiz = () => {
            state.editingQuiz = {
                title: '',
                questions: [
                    { type: 'multi', text: '', time: 20, correct: 0, image: '', opts: ['', '', '', ''] }
                ]
            };
            setView('editor');
        };

        window.updateField = (index, field, value) => {
            if (!state.editingQuiz) return;
            state.editingQuiz.questions[index][field] = value;
            if (field === 'image') {
                const imgPrev = document.getElementById(`img-prev-${index}`);
                if (imgPrev) imgPrev.src = value || 'https://via.placeholder.com/150?text=No+Image';
            }
        };

        window.updateOption = (qIdx, oIdx, value) => {
            if (!state.editingQuiz) return;
            state.editingQuiz.questions[qIdx].opts[oIdx] = value;
        };

        window.addQuestion = (type) => {
            if (!state.editingQuiz) return;
            
            // Backup current inputs
            const inputs = document.querySelectorAll('.q-text-input');
            inputs.forEach(input => {
                const idx = input.dataset.index;
                state.editingQuiz.questions[idx].text = input.value;
            });

            const newQ = {
                type,
                text: '',
                time: 20,
                correct: 0,
                image: '',
                opts: type === 'tf' ? ['אמת', 'שקר'] : ['', '', '', '']
            };
            state.editingQuiz.questions.push(newQ);
            render();
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
        };

        window.saveQuiz = async () => {
            if (!state.editingQuiz) return;
            
            const titleInput = document.getElementById('quizTitle');
            if (titleInput) state.editingQuiz.title = titleInput.value;
            
            // Sync all current text inputs before saving
            document.querySelectorAll('.q-text-input').forEach(input => {
                state.editingQuiz.questions[input.dataset.index].text = input.value;
            });

            if (!state.editingQuiz.title) return alert("בבקשה תן שם לחידון");
            
            state.isSaving = true;
            render();

            try {
                const id = state.editingQuiz.id || Math.random().toString(36).substr(2, 9);
                if (db && user) {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', id);
                    const dataToSave = { 
                        ...state.editingQuiz, 
                        id, 
                        lastUpdated: Date.now() 
                    };
                    await setDoc(docRef, dataToSave);
                    
                    // Force refresh local quizzes list to ensure visibility
                    const index = state.quizzes.findIndex(q => q.id === id);
                    if (index > -1) state.quizzes[index] = dataToSave;
                    else state.quizzes.push(dataToSave);
                    
                    state.editingQuiz = null;
                    state.view = 'dashboard';
                }
            } catch (e) {
                alert("שגיאה בשמירה: " + e.message);
            } finally {
                state.isSaving = false;
                render();
            }
        };

        window.joinGame = async () => {
            const pinInput = document.getElementById('joinPin').value;
            if (!pinInput) return;

            if (db) {
                const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', pinInput);
                const snap = await getDoc(gameRef);
                if (!snap.exists()) {
                    state.pinErrorMessage = "קוד לא קיים";
                    render();
                    return;
                }
                state.pin = pinInput;
                setView('join_nick');
            }
        };

        window.hostGame = async (quizId) => {
            const quiz = state.quizzes.find(q => q.id === quizId);
            const pin = Math.floor(100000 + Math.random() * 899999).toString();
            state.pin = pin;
            
            if (db) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), {
                    pin, quiz, status: 'lobby', hostId: user.uid, currentQ: 0, lastUpdate: Date.now()
                });
                listenToGame(pin);
            }
            setView('host_lobby');
        };

        window.enterLobby = async () => {
            const nick = document.getElementById('joinNick').value;
            if (!nick) return;
            state.nickname = nick;
            
            if (db) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                    pin: state.pin, name: nick, score: 0, hasAnswered: false, id: user.uid
                });
                listenToGame(state.pin);
            }
            setView('player_lobby');
        };

        function listenToGame(pin) {
            if (!db) return;
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), (snap) => {
                if (snap.exists()) {
                    state.currentGame = snap.data();
                    if (state.currentGame.hostId === (user?.uid || '')) handleHostTimer();
                    render();
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                state.players = snap.docs
                    .map(d => d.data())
                    .filter(p => p.pin === pin)
                    .sort((a,b) => b.score - a.score);
                state.myPlayerData = state.players.find(p => p.id === (user?.uid || ''));
                render();
            });
        }

        function handleHostTimer() {
            if (state.currentGame.status === 'question' && !state.timerId) {
                const q = state.currentGame.quiz.questions[state.currentGame.currentQ];
                state.timeLeft = q.time;
                state.timerId = setInterval(async () => {
                    state.timeLeft--;
                    const allAns = state.players.length > 0 && state.players.every(p => p.hasAnswered);
                    if (state.timeLeft <= 0 || allAns) {
                        clearInterval(state.timerId);
                        state.timerId = null;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin), { status: 'reveal' });
                    }
                    render();
                }, 1000);
            }
        }

        window.submitAnswer = async (idx) => {
            if (!state.myPlayerData || state.myPlayerData.hasAnswered || state.currentGame.status !== 'question') return;
            const q = state.currentGame.quiz.questions[state.currentGame.currentQ];
            const isCorrect = idx === q.correct;
            const pts = isCorrect ? Math.max(100, state.timeLeft * 50) : 0;
            
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                hasAnswered: true, lastCorrect: isCorrect, score: (state.myPlayerData.score || 0) + pts, lastPoints: pts
            });
        };

        window.startGame = async () => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin), { status: 'question', currentQ: 0 });
        };

        window.nextStep = async () => {
            const g = state.currentGame;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin);
            if (g.status === 'reveal') await updateDoc(ref, { status: 'scoreboard' });
            else if (g.status === 'scoreboard') {
                if (g.currentQ + 1 >= g.quiz.questions.length) await updateDoc(ref, { status: 'podium' });
                else {
                    for(let p of state.players) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id), { hasAnswered: false });
                    }
                    await updateDoc(ref, { status: 'question', currentQ: g.currentQ + 1 });
                }
            }
        };

        // --- UI ---

        function renderLoading() {
            document.getElementById('app').innerHTML = `
            <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white">
                <div class="text-7xl font-black italic mb-6 animate-bounce">Quizmo</div>
                <div class="spinner"></div>
            </div>`;
        }

        function render() {
            const root = document.getElementById('app');
            
            if (state.view === 'home') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-6 overflow-hidden">
                    <div class="absolute top-10 left-10 opacity-10 text-9xl rotate-12"><i class="fas fa-bolt"></i></div>
                    <div class="absolute bottom-10 right-10 opacity-10 text-9xl -rotate-12"><i class="fas fa-trophy"></i></div>
                    
                    <h1 class="text-9xl font-black italic mb-12 drop-shadow-2xl tracking-tighter animate-pop">Quizmo!</h1>
                    <div class="w-full max-w-sm space-y-4 z-10">
                        <button onclick="setView('join')" class="w-full bg-white text-black py-6 rounded-3xl text-3xl font-black btn-press card-shadow">הצטרף למשחק</button>
                        <button onclick="setView('login')" class="w-full text-white/70 font-bold py-4 hover:text-white transition-all text-lg border-2 border-white/20 rounded-2xl">לוח מנהל</button>
                    </div>
                </div>`;
            } else if (state.view === 'login') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6">
                    <div class="bg-white p-12 rounded-[3rem] w-full max-w-md text-center shadow-2xl">
                        <div class="w-20 h-20 kahoot-purple text-white flex items-center justify-center rounded-3xl mx-auto mb-6 text-3xl shadow-lg"><i class="fas fa-lock"></i></div>
                        <h2 class="text-3xl font-black mb-2 text-gray-800">כניסת מנהל</h2>
                        <p class="text-gray-400 mb-8 font-bold">הזן את הקוד הסודי שלך</p>
                        <input type="password" id="adminPass" class="w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl text-center text-4xl mb-6 outline-none focus:border-purple-600 font-mono tracking-widest" placeholder="••••">
                        <button onclick="const p=document.getElementById('adminPass').value; if(p==='2160')setView('dashboard'); else alert('קוד שגוי')" class="w-full kahoot-purple text-white py-5 rounded-2xl font-black text-xl btn-press shadow-xl">כניסה למערכת</button>
                        <button onclick="setView('home')" class="mt-6 text-gray-400 font-bold hover:text-gray-600 underline">חזרה</button>
                    </div>
                </div>`;
            } else if (state.view === 'dashboard') {
                root.innerHTML = `
                <div class="min-h-screen bg-gray-50 text-right">
                    <nav class="kahoot-purple text-white p-6 shadow-xl flex flex-row-reverse justify-between items-center">
                        <h1 class="text-3xl font-black italic">Quizmo Admin</h1>
                        <button onclick="setView('home')" class="bg-white/10 p-3 rounded-xl hover:bg-white/20 transition"><i class="fas fa-sign-out-alt"></i></button>
                    </nav>
                    <div class="max-w-5xl mx-auto p-8">
                        <div class="flex flex-row-reverse justify-between items-center mb-12">
                            <div>
                                <h2 class="text-4xl font-black text-gray-800">החידונים שלי</h2>
                                <p class="text-gray-500 font-bold">נהל, ערוך והפעל את המשחקים שלך</p>
                            </div>
                            <button onclick="createEmptyQuiz()" class="kahoot-green text-white px-10 py-4 rounded-2xl font-black text-xl btn-press shadow-lg">+ צור חידון</button>
                        </div>
                        <div class="grid gap-6">
                            ${state.quizzes.length === 0 ? `
                                <div class="bg-white rounded-[2rem] p-20 text-center border-4 border-dashed border-gray-100">
                                    <p class="text-xl text-gray-400 font-bold">אין חידונים ברשימה. צור את הראשון שלך עכשיו!</p>
                                </div>
                            ` : state.quizzes.map(q => `
                                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-row-reverse justify-between items-center animate-pop">
                                    <div>
                                        <h3 class="text-2xl font-black text-gray-800 mb-1">${q.title}</h3>
                                        <div class="flex flex-row-reverse gap-4 text-sm text-gray-400 font-bold">
                                            <span><i class="fas fa-list-ol ml-1"></i> ${q.questions ? q.questions.length : 0} שאלות</span>
                                        </div>
                                    </div>
                                    <div class="flex gap-3">
                                        <button onclick="hostGame('${q.id}')" class="kahoot-blue text-white px-10 py-4 rounded-2xl font-black text-xl btn-press shadow-md">הפעל עכשיו</button>
                                        <button onclick="state.editingQuiz = JSON.parse(JSON.stringify(state.quizzes.find(x=>x.id==='${q.id}'))); setView('editor');" class="bg-gray-100 text-gray-600 p-4 rounded-2xl hover:bg-gray-200 transition"><i class="fas fa-edit"></i></button>
                                        <button onclick="if(confirm('למחוק?')) deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', '${q.id}'))" class="bg-red-50 text-red-500 p-4 rounded-2xl hover:bg-red-100 transition"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'editor') {
                const qz = state.editingQuiz;
                root.innerHTML = `
                <div class="min-h-screen bg-gray-100 text-right pb-40">
                    <div class="kahoot-purple text-white p-6 sticky top-0 z-50 shadow-2xl flex flex-row-reverse justify-between items-center">
                        <div class="flex flex-row-reverse items-center gap-6 flex-1">
                            <button onclick="setView('dashboard')" class="text-2xl hover:scale-110 transition"><i class="fas fa-times"></i></button>
                            <input id="quizTitle" value="${qz.title}" class="bg-white/10 border-b-2 border-white/30 text-2xl font-black p-2 outline-none focus:bg-white/20 rounded-t-lg flex-1 text-right" placeholder="שם החידון שלך...">
                        </div>
                        <div class="flex gap-4">
                            <button onclick="saveQuiz()" class="bg-white text-purple-900 px-10 py-3 rounded-xl font-black text-lg btn-press flex items-center gap-2">
                                ${state.isSaving ? '<div class="spinner !border-purple-900"></div>' : 'שמור חידון'}
                            </button>
                        </div>
                    </div>

                    <div class="max-w-4xl mx-auto p-6 space-y-12 mt-8">
                        ${qz.questions.map((q, i) => `
                            <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden border-2 border-gray-100 animate-pop">
                                <div class="bg-gray-50 px-10 py-6 border-b flex flex-row-reverse justify-between items-center">
                                    <span class="text-xl font-black text-purple-900">שאלה ${i+1}</span>
                                    <div class="flex gap-4 items-center">
                                        <select onchange="updateField(${i}, 'time', parseInt(this.value))" class="bg-white border p-2 rounded-xl font-bold">
                                            <option value="10" ${q.time===10?'selected':''}>10 שניות</option>
                                            <option value="20" ${q.time===20?'selected':''}>20 שניות</option>
                                            <option value="30" ${q.time===30?'selected':''}>30 שניות</option>
                                        </select>
                                        <button onclick="state.editingQuiz.questions.splice(${i},1); render()" class="text-red-400 hover:text-red-600 text-xl"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                <div class="p-10 space-y-8">
                                    <div>
                                        <label class="block text-gray-400 font-black mb-2 uppercase text-xs">השאלה</label>
                                        <textarea data-index="${i}" oninput="updateField(${i}, 'text', this.value)" class="q-text-input w-full p-6 bg-gray-50 rounded-2xl text-2xl font-bold border-2 border-transparent focus:border-purple-500 outline-none text-right resize-none h-24 transition-all" placeholder="הכנס את השאלה כאן...">${q.text}</textarea>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-gray-400 font-black mb-2 uppercase text-xs">קישור לתמונה</label>
                                            <input oninput="updateField(${i}, 'image', this.value)" value="${q.image || ''}" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-purple-500 outline-none text-right" placeholder="הדבק כאן URL...">
                                        </div>
                                        <div class="flex items-center justify-center bg-gray-50 rounded-2xl p-2">
                                            <img id="img-prev-${i}" src="${q.image || 'https://via.placeholder.com/150?text=No+Image'}" class="h-20 w-auto rounded shadow-sm">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-6">
                                        ${q.opts.map((opt, oi) => {
                                            const colors = ['red', 'blue', 'yellow', 'green'];
                                            let colorClass = `kahoot-${colors[oi]}`;
                                            if (q.type === 'tf') colorClass = oi === 0 ? 'kahoot-blue' : 'kahoot-red';
                                            
                                            return `
                                            <div class="${colorClass} p-2 rounded-[2rem] shadow-lg flex flex-row-reverse items-center gap-4 transition-all ${q.correct === oi ? 'ring-8 ring-green-400 ring-offset-4' : 'opacity-90 hover:opacity-100'}">
                                                <div class="w-12 h-12 flex items-center justify-center text-white">
                                                    <input type="radio" name="correct_${i}" onchange="state.editingQuiz.questions[${i}].correct = ${oi}; render()" ${q.correct === oi ? 'checked' : ''} class="w-8 h-8 accent-white">
                                                </div>
                                                <input oninput="updateOption(${i}, ${oi}, this.value)" value="${opt}" class="flex-1 bg-white/20 p-4 rounded-2xl text-white font-black text-xl outline-none placeholder-white/50 text-right" placeholder="${q.type === 'tf' ? (oi===0?'אמת':'שקר') : 'תשובה...'}">
                                            </div>`;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        
                        <div class="flex gap-6 justify-center mt-12">
                            <button onclick="addQuestion('multi')" class="bg-white border-2 border-purple-900 text-purple-900 px-12 py-5 rounded-[2.5rem] font-black text-xl hover:bg-purple-900 hover:text-white transition-all shadow-xl">שאלת בחירה +</button>
                            <button onclick="addQuestion('tf')" class="bg-white border-2 border-blue-600 text-blue-600 px-12 py-5 rounded-[2.5rem] font-black text-xl hover:bg-blue-600 hover:text-white transition-all shadow-xl">נכון / לא נכון +</button>
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'join') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6">
                    <div class="bg-white p-12 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl animate-pop">
                        <h2 class="text-6xl font-black italic mb-10 text-purple-900">Quizmo!</h2>
                        <div class="relative mb-6">
                            <input id="joinPin" inputmode="numeric" maxlength="6" class="w-full p-6 bg-gray-50 border-4 border-gray-100 rounded-[2rem] text-center text-4xl font-black outline-none focus:border-purple-600 transition-all tracking-widest" placeholder="PIN">
                            ${state.pinErrorMessage ? `<p class="absolute -bottom-10 left-0 right-0 text-red-600 font-black text-lg animate-bounce">${state.pinErrorMessage}</p>` : ''}
                        </div>
                        <button onclick="joinGame()" class="w-full bg-black text-white py-6 rounded-[2rem] font-black text-2xl btn-press shadow-xl mt-4">הצטרף!</button>
                        <button onclick="setView('home')" class="mt-10 text-gray-400 font-bold hover:text-gray-600">ביטול</button>
                    </div>
                </div>`;
            } else if (state.view === 'join_nick') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6 text-right">
                    <div class="bg-white p-12 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl">
                        <h2 class="text-3xl font-black mb-4 text-gray-800">איך יקראו לך?</h2>
                        <input id="joinNick" maxlength="15" class="w-full p-6 bg-gray-50 border-4 border-gray-100 rounded-[2rem] text-center text-2xl font-black outline-none focus:border-purple-600 mb-8" placeholder="הכנס כינוי...">
                        <button onclick="enterLobby()" class="w-full kahoot-green text-white py-6 rounded-[2rem] font-black text-2xl btn-press shadow-xl">אני מוכן!</button>
                    </div>
                </div>`;
            } else if (state.view === 'host_lobby') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple text-white flex flex-col text-right">
                    <div class="bg-white text-black py-10 px-6 shadow-2xl flex flex-row-reverse justify-between items-center">
                        <div class="text-right">
                            <p class="font-black text-gray-400 text-lg uppercase mb-1">PIN משחק:</p>
                            <h1 class="text-9xl font-black leading-none">${state.pin}</h1>
                        </div>
                        <button onclick="startGame()" class="bg-black text-white px-16 py-8 rounded-[2.5rem] font-black text-4xl btn-press shadow-2xl animate-pulse">התחל משחק!</button>
                    </div>
                    <div class="flex-1 p-10 flex flex-col">
                        <h2 class="text-4xl font-black mb-10"><i class="fas fa-users ml-4"></i> ${state.players.length} שחקנים בלובי</h2>
                        <div class="flex-1 flex flex-wrap gap-6 justify-center content-start overflow-y-auto">
                            ${state.players.map(p => `<div class="bg-white/10 backdrop-blur-xl border-2 border-white/20 px-10 py-5 rounded-[2rem] text-3xl font-black animate-pop">${p.name}</div>`).join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'player_lobby') {
                root.innerHTML = `
                <div class="h-screen kahoot-green text-white flex flex-col items-center justify-center p-8 text-center">
                    <h2 class="text-6xl font-black italic mb-6">אתה בפנים!</h2>
                    <div class="bg-black/20 px-16 py-8 rounded-[3rem] text-4xl font-black border-4 border-white/10">${state.nickname}</div>
                    <p class="mt-20 font-bold opacity-50">המשחק יתחיל בקרוב...</p>
                </div>`;
            } else if (state.currentGame) {
                root.innerHTML = renderGameUI();
            }
        }

        function renderGameUI() {
            const g = state.currentGame;
            const q = g.quiz.questions[g.currentQ];
            const isHost = g.hostId === (user?.uid || '');

            if (isHost) {
                if (g.status === 'question') {
                    return `
                    <div class="h-screen flex flex-col bg-white text-right">
                        <div class="p-8 text-center bg-white border-b-8 border-gray-100 shadow-lg"><h1 class="text-5xl font-black">${q.text}</h1></div>
                        <div class="flex-1 flex flex-col items-center justify-center relative bg-gray-50">
                            <div class="absolute right-10 top-10 text-8xl font-black w-40 h-40 rounded-full border-[10px] border-purple-900 flex items-center justify-center text-purple-900 bg-white">${state.timeLeft}</div>
                            <div class="max-w-xl w-full">
                                ${q.image ? `<img src="${q.image}" class="w-full h-80 object-contain rounded-3xl shadow-xl">` : `<div class="w-80 h-80 kahoot-purple rounded-3xl mx-auto flex items-center justify-center text-9xl text-white font-black animate-pulse">Q</div>`}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 p-4 h-[35vh]">
                            ${q.opts.map((opt, i) => {
                                let c = `kahoot-${['red','blue','yellow','green'][i]}`;
                                if (q.type === 'tf') c = i === 0 ? 'kahoot-blue' : 'kahoot-red';
                                return `<div class="${c} text-white flex flex-row-reverse items-center px-12 rounded-[2rem] text-3xl font-black shadow-md"><i class="fas fa-circle mr-6 text-2xl opacity-50"></i><span class="flex-1">${opt}</span></div>`;
                            }).join('')}
                        </div>
                    </div>`;
                }
                if (g.status === 'reveal' || g.status === 'scoreboard') {
                    return `
                    <div class="h-screen kahoot-purple text-white p-12 flex flex-col text-right">
                        <div class="flex flex-row-reverse justify-between items-center mb-10">
                            <h1 class="text-5xl font-black italic">לוח התוצאות</h1>
                            <button onclick="nextStep()" class="bg-white text-black px-12 py-5 rounded-[2rem] font-black text-2xl btn-press shadow-2xl">הבא</button>
                        </div>
                        <div class="flex-1 max-w-3xl w-full mx-auto space-y-4">
                            ${state.players.slice(0,5).map((p, i) => `
                                <div class="bg-white text-black p-6 rounded-[2.5rem] flex flex-row-reverse justify-between items-center animate-pop shadow-xl">
                                    <div class="flex flex-row-reverse items-center gap-6"><span class="w-12 h-12 bg-purple-100 text-purple-900 rounded-full flex items-center justify-center font-black">${i+1}</span><span class="text-3xl font-black">${p.name}</span></div>
                                    <span class="text-4xl font-black text-purple-900">${p.score}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
                if (g.status === 'podium') {
                    return `<div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white text-center p-12"><h1 class="text-9xl font-black mb-10 animate-bounce">🏆 ${state.players[0]?.name}</h1><button onclick="location.reload()" class="bg-white text-black px-20 py-8 rounded-[3rem] font-black text-3xl btn-press shadow-2xl">סיום</button></div>`;
                }
            } else {
                // Player Side
                if (g.status === 'question') {
                    if (state.myPlayerData?.hasAnswered) return `<div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white text-center"><h2 class="text-5xl font-black italic animate-pulse">ממתינים...</h2></div>`;
                    const gridClass = q.type === 'tf' ? 'grid-rows-2' : 'grid-cols-2 grid-rows-2';
                    return `<div class="h-screen grid ${gridClass} gap-4 p-4 bg-gray-100">
                        ${q.opts.map((_, i) => {
                             let c = `kahoot-${['red','blue','yellow','green'][i]}`;
                             if (q.type === 'tf') c = i === 0 ? 'kahoot-blue' : 'kahoot-red';
                             return `<button onclick="submitAnswer(${i})" class="${c} rounded-[3rem] shadow-2xl flex items-center justify-center active:scale-90 transition-transform"><i class="fas ${['fa-caret-up','fa-square','fa-circle','fa-square'][i]} text-8xl text-white"></i></button>`;
                        }).join('')}
                    </div>`;
                }
                if (g.status === 'reveal') {
                    const win = state.myPlayerData?.lastCorrect;
                    return `<div class="h-screen ${win ? 'kahoot-green' : 'kahoot-red'} flex flex-col items-center justify-center text-white text-center p-12">
                        <i class="fas ${win ? 'fa-check' : 'fa-times'} text-[10rem] mb-10 animate-pop"></i>
                        <h2 class="text-6xl font-black">${win ? 'נכון!' : 'טעות...'}</h2>
                        <div class="mt-8 text-3xl font-black bg-black/20 p-6 rounded-3xl">+${state.myPlayerData?.lastPoints || 0}</div>
                    </div>`;
                }
                return `<div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white text-center p-12"><h2 class="text-4xl font-black">הסתכל על המסך הגדול!</h2></div>`;
            }
        }

        init();
    </script>
</body>
</html>
