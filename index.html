<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate - Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #46178f; /* Kahoot Purple */
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .kahoot-button {
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .kahoot-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        .shape-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        
        /* Animation for background */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #46178f 25%, #5a1ea8 25%, #5a1ea8 50%, #46178f 50%, #46178f 75%, #5a1ea8 75%, #5a1ea8 100%);
            background-size: 100px 100px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div id="app" class="relative z-10 flex-1 flex flex-col">
        <!-- Loading Screen -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <h1 class="text-6xl font-black italic animate-bounce mb-4">Quizmo!</h1>
            <p class="text-xl">טוען מערכת...</p>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            view: 'home', // home, join, login, dashboard, lobby, game
            nick: '',
            pin: '',
            quizzes: [
                { id: '1', title: 'חידון ידע כללי', questions: [
                    { text: 'מהי בירת ישראל?', opts: ['תל אביב', 'חיפה', 'ירושלים', 'אילת'], correct: 2, time: 20 },
                    { text: 'כמה זה 2+2?', opts: ['3', '4', '5', '22'], correct: 1, time: 10 }
                ]}
            ]
        };

        // --- View Transitions ---
        function setView(viewName) {
            state.view = viewName;
            render();
        }

        // --- Components ---
        function render() {
            const root = document.getElementById('app');
            
            if (state.view === 'home') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6">
                        <h1 class="text-8xl font-black italic mb-16 drop-shadow-lg">Quizmo!</h1>
                        <div class="w-full max-w-sm space-y-4">
                            <button onclick="setView('join')" class="w-full bg-white text-black py-6 rounded-2xl text-3xl font-bold kahoot-button">הצטרפות למשחק</button>
                            <button onclick="setView('login')" class="w-full bg-black/30 text-white/70 py-4 rounded-xl text-xl font-bold border border-white/20">ניהול (דביר)</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'join') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6">
                        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center">
                            <h2 class="text-3xl font-black text-gray-800 mb-6">הצטרפות</h2>
                            <input type="text" id="join-pin" placeholder="PIN משחק" class="w-full p-4 bg-gray-100 rounded-xl text-center text-2xl font-bold text-black mb-4 border-2 border-transparent focus:border-purple-500 outline-none">
                            <input type="text" id="join-nick" placeholder="כינוי" class="w-full p-4 bg-gray-100 rounded-xl text-center text-xl font-bold text-black mb-6 border-2 border-transparent focus:border-purple-500 outline-none">
                            <button onclick="alert('מתחבר לשרת...')" class="w-full bg-slate-800 text-white py-4 rounded-xl text-2xl font-black kahoot-button">קדימה!</button>
                            <button onclick="setView('home')" class="mt-4 text-gray-400 font-bold">ביטול</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'login') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6">
                        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center">
                            <h2 class="text-3xl font-black text-gray-800 mb-6">כניסת מנהל</h2>
                            <input type="password" id="admin-pass" placeholder="סיסמה" class="w-full p-4 bg-gray-100 rounded-xl text-center text-2xl font-bold text-black mb-6 outline-none">
                            <button onclick="checkAdmin()" class="w-full bg-purple-700 text-white py-4 rounded-xl text-xl font-bold kahoot-button">כניסה</button>
                            <button onclick="setView('home')" class="mt-4 text-gray-400 font-bold">חזור</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'dashboard') {
                root.innerHTML = `
                    <div class="p-6 max-w-4xl mx-auto w-full">
                        <div class="flex justify-between items-center mb-10">
                            <h1 class="text-4xl font-black">החידונים שלי</h1>
                            <button onclick="setView('home')" class="bg-white/10 p-2 rounded-lg">יציאה</button>
                        </div>
                        <div class="grid gap-4">
                            ${state.quizzes.map(q => `
                                <div class="bg-white p-6 rounded-2xl flex justify-between items-center text-black shadow-xl">
                                    <div>
                                        <h3 class="text-2xl font-black">${q.title}</h3>
                                        <p class="text-gray-500">${q.questions.length} שאלות</p>
                                    </div>
                                    <button onclick="alert('מייצר PIN...')" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold kahoot-button">הפעל משחק</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '2160') setView('dashboard');
            else alert('סיסמה שגויה!');
        }

        // Initial Load
        window.onload = () => {
            setTimeout(() => setView('home'), 1000);
        };
    </script>
</body>
</html>
