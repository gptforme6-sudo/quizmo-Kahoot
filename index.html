<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Legacy Scripts (Most Compatible) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background: #46178f; color: white; overflow-x: hidden; }
        .k-btn { transition: all 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); border-radius: 12px; font-weight: 900; }
        .k-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <!-- Loading Screen -->
        <div class="h-screen flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <h1 class="text-2xl font-black">מתחבר למערכת...</h1>
            <p id="status-msg" class="mt-2 opacity-50 text-sm">אנא המתן</p>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default_quizmo';
        let db, auth, currentUser;
        let quizzes = [];
        let view = 'home';

        // --- Core Logic ---
        async function startApp() {
            const status = document.getElementById('status-msg');
            
            try {
                // Initialize Firebase
                status.innerText = "מאתחל שרת...";
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();

                // Auth
                status.innerText = "מבצע כניסה...";
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }

                auth.onAuthStateChanged(user => {
                    if (user) {
                        currentUser = user;
                        syncData();
                    }
                });

                // Safety Timeout - if sync takes too long
                setTimeout(() => {
                    if (view === 'loading') {
                        render('home');
                    }
                }, 4000);

            } catch (err) {
                console.error(err);
                status.innerText = "שגיאה בחיבור. טוען מצב לא מקוון...";
                setTimeout(() => render('home'), 2000);
            }
        }

        function syncData() {
            const path = `artifacts/${appId}/users/${currentUser.uid}/quizzes`;
            db.collection(path).onSnapshot(snap => {
                quizzes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render('home');
            }, err => {
                console.warn("Sync failed, using empty list");
                render('home');
            });
        }

        // --- Router & Views ---
        function render(target) {
            view = target;
            const appDiv = document.getElementById('app');
            
            if (target === 'home') {
                appDiv.innerHTML = `
                    <div class="h-screen flex flex-col items-center justify-center p-6 text-center">
                        <h1 class="text-7xl font-black italic mb-2 drop-shadow-lg">Quizmo!</h1>
                        <div class="bg-yellow-400 text-purple-900 px-3 py-1 rounded font-black text-sm mb-12">PRO EDITION</div>
                        
                        <div class="w-full max-w-xs space-y-4">
                            <button onclick="render('auth')" class="k-btn w-full bg-white text-purple-900 py-4 text-xl">ניהול חידונים</button>
                            <button onclick="playNow()" class="k-btn w-full bg-blue-500 text-white py-4 text-xl">שחק עכשיו</button>
                        </div>
                    </div>
                `;
            } else if (target === 'auth') {
                appDiv.innerHTML = `
                    <div class="h-screen flex items-center justify-center p-4">
                        <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
                            <h2 class="text-2xl font-black mb-6">קוד כניסה</h2>
                            <input id="pin" type="password" maxlength="4" class="w-full bg-white/10 border-2 border-white/20 p-4 rounded-xl text-center text-3xl mb-6 outline-none">
                            <button onclick="checkPin()" class="k-btn w-full bg-white text-purple-900 py-3">כניסה</button>
                            <button onclick="render('home')" class="mt-4 text-sm opacity-50">חזור</button>
                        </div>
                    </div>
                `;
            } else if (target === 'dash') {
                appDiv.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-black">החידונים שלי</h2>
                            <button onclick="createQuiz()" class="bg-green-500 p-3 rounded-full"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="grid gap-4">
                            ${quizzes.length === 0 ? '<p class="opacity-50">אין חידונים עדיין</p>' : ''}
                            ${quizzes.map(q => `
                                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                                    <div>
                                        <div class="font-bold text-lg">${q.title}</div>
                                        <div class="text-xs opacity-50">${q.questions?.length || 0} שאלות</div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="editQuiz('${q.id}')" class="bg-white/10 p-2 rounded-lg text-sm">ערוך</button>
                                        <button onclick="deleteQuiz('${q.id}')" class="bg-red-500/20 text-red-400 p-2 rounded-lg text-sm">מחק</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="render('home')" class="mt-8 opacity-50 text-sm">חזרה לתפריט</button>
                    </div>
                `;
            }
        }

        // --- Actions ---
        window.checkPin = () => {
            if (document.getElementById('pin').value === '2160') render('dash');
            else alert("טעות!");
        };

        window.createQuiz = async () => {
            const title = prompt("שם החידון:");
            if (!title) return;
            const id = 'q' + Date.now();
            const newQuiz = {
                title: title,
                questions: [{ text: "שאלת פתיחה", opts: ["תשובה 1", "תשובה 2", "תשובה 3", "תשובה 4"], correct: 0 }]
            };
            await db.collection(`artifacts/${appId}/users/${currentUser.uid}/quizzes`).doc(id).set(newQuiz);
        };

        window.deleteQuiz = async (id) => {
            if (confirm("למחוק?")) {
                await db.collection(`artifacts/${appId}/users/${currentUser.uid}/quizzes`).doc(id).delete();
            }
        };

        window.playNow = () => {
            if (quizzes.length === 0) alert("צריך ליצור חידון קודם!");
            else alert("המשחק בטעינה... (פונקציונליות מלאה בגרסה הבאה)");
        };

        // Start
        window.onload = startApp;

    </script>
</body>
</html>
