<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת טריוויה מקצועית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- שימוש באייקונים -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow-x: hidden;
        }
        /* הסתרת מסכים שלא פעילים */
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
        
        /* עיצוב חלון קופץ (Modal) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <!-- ================= מסך הבית ================= -->
    <div id="screen-home" class="screen active min-h-screen p-6 relative">
        <div class="flex-grow flex flex-col items-center justify-center space-y-8">
            <h1 class="text-5xl font-extrabold text-center drop-shadow-lg">Trivia Master</h1>
            
            <div class="w-full max-w-md space-y-4">
                <input type="number" id="pin-input" placeholder="הכנס קוד משחק (PIN)" 
                       class="w-full text-center text-3xl p-4 rounded-xl text-black font-bold focus:outline-none focus:ring-4 focus:ring-yellow-400">
                <button onclick="joinGame()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black text-2xl font-bold py-4 rounded-xl shadow-lg transition-transform transform active:scale-95">
                    היכנס למשחק!
                </button>
            </div>
        </div>

        <!-- כפתור המנהל שביקשת להוריד למטה ולשנות את שמו -->
        <div class="w-full flex justify-center pb-8 mt-auto">
            <button onclick="showPasswordModal()" class="text-white/70 hover:text-white border border-white/30 hover:bg-white/10 px-6 py-3 rounded-full font-semibold transition-all flex items-center gap-2">
                <i data-lucide="settings"></i>
                Admin Panel
            </button>
        </div>
    </div>

    <!-- ================= מודל (חלון קופץ) לסיסמה ================= -->
    <div id="password-modal" class="modal-overlay p-4">
        <div class="bg-white text-gray-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl transform transition-all">
            <h2 class="text-2xl font-bold mb-4 text-center">כניסת מנהל</h2>
            <p class="text-sm text-gray-500 mb-4 text-center">אנא הכנס סיסמת מנהל כדי להמשיך</p>
            <input type="password" id="admin-password" placeholder="סיסמה..." 
                   class="w-full text-center text-xl p-3 border-2 border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
            <div id="password-error" class="text-red-500 text-sm text-center hidden mb-4">סיסמה שגויה, נסה שוב.</div>
            <div class="flex gap-3">
                <button onclick="hidePasswordModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-lg">ביטול</button>
                <button onclick="checkPassword()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">היכנס</button>
            </div>
        </div>
    </div>

    <!-- ================= מסך דאשבורד מנהל (כל החידונים) ================= -->
    <div id="screen-dashboard" class="screen min-h-screen p-4 sm:p-6 bg-gray-50 text-gray-800">
        <div class="max-w-4xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-blue-900">ניהול חידונים</h1>
                <button onclick="switchScreen('screen-home')" class="text-gray-500 hover:text-gray-800 flex items-center gap-1">
                    <i data-lucide="log-out" class="w-5 h-5"></i> יציאה
                </button>
            </div>

            <button onclick="openEditor()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md mb-8 flex justify-center items-center gap-2 transition-transform active:scale-95">
                <i data-lucide="plus-circle"></i> צור חידון חדש
            </button>

            <!-- רשימת החידונים תופיע כאן -->
            <div id="quizzes-list" class="space-y-4">
                <!-- נתונים יוזרקו לפה מ-JS -->
            </div>
        </div>
    </div>

    <!-- ================= מסך עריכת/יצירת חידון ================= -->
    <div id="screen-editor" class="screen min-h-screen p-4 sm:p-6 bg-gray-50 text-gray-800">
        <div class="max-w-4xl mx-auto w-full">
            <div class="flex justify-between items-center mb-6">
                <h1 id="editor-title" class="text-2xl font-bold text-blue-900">יצירת חידון חדש</h1>
                <button onclick="switchScreen('screen-dashboard')" class="text-gray-500 hover:text-gray-800">ביטול</button>
            </div>

            <input type="text" id="quiz-title-input" placeholder="שם החידון (לדוגמה: היסטוריה כיתה ו')" 
                   class="w-full text-xl p-4 border-2 border-gray-300 rounded-xl mb-6 focus:outline-none focus:border-blue-500 font-bold">

            <!-- אזור השאלות -->
            <div id="questions-container" class="space-y-6 mb-6">
                <!-- שאלות יתווספו לכאן -->
            </div>

            <button onclick="addQuestionToEditor()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-xl border border-dashed border-gray-400 mb-6 flex justify-center items-center gap-2">
                <i data-lucide="plus"></i> הוסף שאלה
            </button>

            <button onclick="saveQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 flex justify-center items-center gap-2">
                <i data-lucide="save"></i> שמור חידון
            </button>
        </div>
    </div>

    <!-- ================= מסך המתנה/הוסט (Lobby) ================= -->
    <div id="screen-host-lobby" class="screen min-h-screen p-6 relative flex-col items-center justify-center">
        <button onclick="switchScreen('screen-dashboard')" class="absolute top-6 left-6 text-white hover:text-gray-200 flex items-center gap-1">
            <i data-lucide="arrow-right"></i> חזור לניהול
        </button>
        
        <h2 class="text-3xl font-bold mb-2 text-center" id="lobby-quiz-title">טוען...</h2>
        <p class="text-xl mb-8">הקוד להצטרפות למשחק:</p>
        
        <div class="bg-white text-black text-7xl font-extrabold py-6 px-12 rounded-3xl shadow-2xl mb-12 tracking-widest" id="lobby-pin">
            0000
        </div>

        <p class="text-lg mb-4">ממתין לשחקנים...</p>
        <div id="players-list" class="flex flex-wrap justify-center gap-3 mb-12 min-h-[50px]">
            <!-- שמות השחקנים יופיעו כאן -->
            <span class="bg-white/20 px-4 py-2 rounded-full">כרגע אין שחקנים מחוברים</span>
        </div>

        <button onclick="alert('בגרסה זו הלוגיקה נבנתה! כאן יתחיל המשחק בפועל.')" class="bg-yellow-400 hover:bg-yellow-500 text-black text-2xl font-bold py-4 px-12 rounded-xl shadow-lg transition-transform transform active:scale-95">
            התחל משחק!
        </button>
    </div>


    <script>
        // אתחול אייקונים
        lucide.createIcons();

        // משתנים גלובליים
        let currentQuizIdToEdit = null;
        let quizzes = []; 
        let currentQuestionsList = [];

        // בטעינת העמוד, נטען נתונים שמורים (מקומיים כרגע, לטובת מהירות ולוגיקה)
        window.onload = () => {
            const savedQuizzes = localStorage.getItem('triviaQuizzes');
            if (savedQuizzes) {
                quizzes = JSON.parse(savedQuizzes);
            }
        };

        // פונקציית מעבר בין מסכים
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- לוגיקת כניסת מנהל (מהירה, ללא prompt) ---
        function showPasswordModal() {
            document.getElementById('admin-password').value = '';
            document.getElementById('password-error').classList.add('hidden');
            document.getElementById('password-modal').classList.add('active');
            setTimeout(() => document.getElementById('admin-password').focus(), 100);
        }

        function hidePasswordModal() {
            document.getElementById('password-modal').classList.remove('active');
        }

        function checkPassword() {
            const pass = document.getElementById('admin-password').value;
            // הנה הסיסמה! כרגע 1234. אתה יכול לשנות אותה פה.
            const ADMIN_PASSWORD = "1234"; 

            if (pass === ADMIN_PASSWORD) {
                hidePasswordModal();
                openDashboard();
            } else {
                document.getElementById('password-error').classList.remove('hidden');
            }
        }

        // מאפשר לחיצה על Enter בסיסמה
        document.getElementById('admin-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });


        // --- לוגיקת דאשבורד מנהל (CRUD) ---
        function openDashboard() {
            renderQuizzesList();
            switchScreen('screen-dashboard');
        }

        function renderQuizzesList() {
            const container = document.getElementById('quizzes-list');
            container.innerHTML = '';

            if (quizzes.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 py-8">עדיין לא יצרת חידונים. לחץ על הכפתור למעלה כדי להתחיל!</div>`;
                return;
            }

            quizzes.forEach(quiz => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow border border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4";
                
                card.innerHTML = `
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">${quiz.title}</h3>
                        <p class="text-sm text-gray-500">${quiz.questions.length} שאלות</p>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="hostQuiz('${quiz.id}')" class="flex-1 sm:flex-none bg-green-100 text-green-700 hover:bg-green-200 px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-1 transition-colors">
                            <i data-lucide="play" class="w-4 h-4"></i> הפעל
                        </button>
                        <button onclick="editQuiz('${quiz.id}')" class="flex-1 sm:flex-none bg-blue-100 text-blue-700 hover:bg-blue-200 px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-1 transition-colors">
                            <i data-lucide="edit" class="w-4 h-4"></i> ערוך
                        </button>
                        <button onclick="deleteQuiz('${quiz.id}')" class="flex-1 sm:flex-none bg-red-100 text-red-700 hover:bg-red-200 px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-1 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> מחק
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- לוגיקת עורך החידונים ---
        function openEditor(quizId = null) {
            currentQuizIdToEdit = quizId;
            const titleInput = document.getElementById('quiz-title-input');
            const questionsContainer = document.getElementById('questions-container');
            
            questionsContainer.innerHTML = ''; // נקה עורך

            if (quizId) {
                // מצב עריכה
                document.getElementById('editor-title').innerText = "עריכת חידון";
                const quizToEdit = quizzes.find(q => q.id === quizId);
                titleInput.value = quizToEdit.title;
                currentQuestionsList = JSON.parse(JSON.stringify(quizToEdit.questions)); // עותק עמוק
            } else {
                // מצב יצירה חדשה
                document.getElementById('editor-title').innerText = "יצירת חידון חדש";
                titleInput.value = '';
                currentQuestionsList = [];
                addQuestionToEditor(); // הוסף שאלה ראשונה ריקה כברירת מחדל
            }

            renderEditorQuestions();
            switchScreen('screen-editor');
        }

        function addQuestionToEditor() {
            currentQuestionsList.push({
                text: '',
                answers: ['', '', '', ''],
                correctIndex: 0
            });
            renderEditorQuestions();
        }

        function removeQuestion(index) {
            if (currentQuestionsList.length <= 1) {
                alert("חייבת להיות לפחות שאלה אחת בחידון.");
                return;
            }
            currentQuestionsList.splice(index, 1);
            renderEditorQuestions();
        }

        function renderEditorQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            currentQuestionsList.forEach((q, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-200 relative";
                
                let answersHTML = '';
                for(let i=0; i<4; i++) {
                    const isCorrect = q.correctIndex === i;
                    answersHTML += `
                        <div class="flex items-center gap-2 mb-2">
                            <input type="radio" name="correct-${qIndex}" value="${i}" ${isCorrect ? 'checked' : ''} 
                                   onchange="updateCorrectAnswer(${qIndex}, ${i})"
                                   class="w-5 h-5 text-blue-600 focus:ring-blue-500 cursor-pointer" title="סמן כתשובה נכונה">
                            <input type="text" placeholder="תשובה ${i+1}" value="${q.answers[i]}" 
                                   oninput="updateAnswerText(${qIndex}, ${i}, this.value)"
                                   class="flex-1 p-2 border rounded focus:outline-none focus:border-blue-400 ${isCorrect ? 'bg-green-50 border-green-300' : 'bg-gray-50'}">
                        </div>
                    `;
                }

                qDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-gray-700">שאלה ${qIndex + 1}</span>
                        <button onclick="removeQuestion(${qIndex})" class="text-red-500 hover:text-red-700 text-sm flex items-center gap-1">
                            <i data-lucide="trash" class="w-4 h-4"></i> הסר
                        </button>
                    </div>
                    <textarea placeholder="הכנס את תוכן השאלה כאן..." oninput="updateQuestionText(${qIndex}, this.value)"
                              class="w-full p-3 border rounded-lg focus:outline-none focus:border-blue-500 mb-4 resize-none h-20">${q.text}</textarea>
                    <div class="text-sm font-semibold text-gray-600 mb-2">תשובות (סמן את הנכונה בעיגול):</div>
                    ${answersHTML}
                `;
                container.appendChild(qDiv);
            });
            lucide.createIcons();
        }

        // פונקציות עדכון נתונים בזמן עריכה
        function updateQuestionText(qIndex, text) { currentQuestionsList[qIndex].text = text; }
        function updateAnswerText(qIndex, aIndex, text) { currentQuestionsList[qIndex].answers[aIndex] = text; }
        function updateCorrectAnswer(qIndex, aIndex) { 
            currentQuestionsList[qIndex].correctIndex = aIndex; 
            renderEditorQuestions(); // רנדור מחדש כדי לצבוע את התשובה הנכונה בירוק
        }

        function saveQuiz() {
            const title = document.getElementById('quiz-title-input').value.trim();
            if (!title) {
                alert("חובה לתת שם לחידון!");
                return;
            }
            
            // בדיקת תקינות בסיסית
            const isValid = currentQuestionsList.every(q => q.text.trim() !== '' && q.answers.every(a => a.trim() !== ''));
            if (!isValid) {
                alert("אנא ודא שכל השאלות והתשובות מלאות.");
                return;
            }

            if (currentQuizIdToEdit) {
                // עדכון קיים
                const index = quizzes.findIndex(q => q.id === currentQuizIdToEdit);
                quizzes[index].title = title;
                quizzes[index].questions = currentQuestionsList;
            } else {
                // יצירה חדש
                const newQuiz = {
                    id: 'quiz_' + Date.now(),
                    title: title,
                    questions: currentQuestionsList
                };
                quizzes.push(newQuiz);
            }

            // שמירה בזיכרון המקומי
            localStorage.setItem('triviaQuizzes', JSON.stringify(quizzes));
            openDashboard();
        }

        function editQuiz(id) {
            openEditor(id);
        }

        function deleteQuiz(id) {
            // החלפתי את ה-confirm המכוער במודל מעוצב בגרסאות הבאות, אבל פה נשתמש בו לצורך פשטות הלוגיקה
            if(confirm("האם אתה בטוח שברצונך למחוק חידון זה?")) {
                quizzes = quizzes.filter(q => q.id !== id);
                localStorage.setItem('triviaQuizzes', JSON.stringify(quizzes));
                renderQuizzesList();
            }
        }

        // --- לוגיקת הפעלת משחק (Host) ---
        function hostQuiz(quizId) {
            const quiz = quizzes.find(q => q.id === quizId);
            document.getElementById('lobby-quiz-title').innerText = quiz.title;
            
            // יצירת PIN אקראי למשחק
            const pin = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('lobby-pin').innerText = pin;
            
            switchScreen('screen-host-lobby');
            
            // כאן בעתיד נחבר את ה-Firebase כדי ליצור "חדר" בענן שהשחקנים יוכלו להתחבר אליו
        }

        function joinGame() {
            const pin = document.getElementById('pin-input').value;
            if(pin.length !== 4) {
                alert("אנא הכנס קוד PIN חוקי בעל 4 ספרות");
                return;
            }
            alert("פונקציית התחברות כשחקן. הלוגיקה שלך הושלמה בצד מנהל!");
        }

    </script>
</body>
</html>
