<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quizmo - The Ultimate Quiz</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- Firebase Imports -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Rubik:wght@400;700;900&display=swap');
        
        :root {
            --kahoot-red: #e21b3c;
            --kahoot-blue: #1368ce;
            --kahoot-yellow: #d89e00;
            --kahoot-green: #26890c;
            --kahoot-purple: #46178f;
            --kahoot-light-purple: #ebf2fa;
        }

        body { 
            font-family: 'Rubik', sans-serif; 
            background: #f2f2f2;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .bg-kahoot { background-color: var(--kahoot-purple); color: white; }
        .bg-lobby { 
            background: linear-gradient(135deg, #46178f, #250a4d, #6a2cc9); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-dark { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        .k-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .k-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0);
        }

        /* Player Answer Buttons */
        .ans-red { background-color: var(--kahoot-red); }
        .ans-blue { background-color: var(--kahoot-blue); }
        .ans-yellow { background-color: var(--kahoot-yellow); }
        .ans-green { background-color: var(--kahoot-green); }

        .shape-icon { filter: drop-shadow(0px 2px 0px rgba(0,0,0,0.2)); }

        .podium-bar { transition: height 1s ease-out; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--kahoot-purple); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Timer Ring */
        .timer-ring { stroke-dasharray: 283; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    </style>
</head>
<body>

    <!-- Audio Elements -->
    <audio id="audio-lobby" loop src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3"></audio>
    <audio id="audio-question" loop src="https://assets.mixkit.co/music/preview/mixkit-tense-clock-countdown-1002.mp3"></audio>
    <audio id="audio-podium" src="https://assets.mixkit.co/music/preview/mixkit-winning-chimes-2015.mp3"></audio>

    <div id="app" class="min-h-screen">
        <div class="h-screen flex flex-col items-center justify-center bg-lobby text-white">
            <div class="loader mb-4"></div>
            <h1 class="text-3xl font-black tracking-widest animate-pulse">Quizmo</h1>
            <p id="boot-status" class="mt-2 opacity-70">מתחבר לשרתים...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "firebase/auth";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc, updateDoc } from "firebase/firestore";

        // ==========================================
        // Firebase Configuration for GitHub Pages
        // ==========================================
        // התיקון לגיטהאב: כאן אתה חייב להכניס את הנתונים מה-Firebase שלך כדי שזה יעבוד!
        const myGithubFirebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo_prod';
        
        let app, auth, db, currentUser;
        
        // Data states
        let myQuizzes = [];
        let activeGame = null;
        let unsubscribeGame = null;
        
        // App Flow State
        let currentRole = null; // 'host' or 'player'
        let currentPin = null;
        let playerSessionId = null;
        let playerName = null;
        let isMuted = false;

        // Editor State
        let edQuiz = null;

        // --- Init ---
        async function initApp() {
            try {
                let configToUse;
                
                // התיקון שמונע את הטעינה האינסופית
                if (typeof __firebase_config !== 'undefined') {
                    // עובד בצורה חלקה בתוך סביבת הפיתוח שלנו פה
                    configToUse = JSON.parse(__firebase_config);
                } else {
                    // כשהקוד רץ ב-GitHub Pages, הוא יקרא את ההגדרות שלך מפה
                    configToUse = myGithubFirebaseConfig;
                    
                    if (configToUse.apiKey === "YOUR_API_KEY") {
                        throw new Error("חובה להכניס פרטי Firebase (מסד נתונים) כדי שהמשחק יעבוד ב-GitHub Pages. חפש בקוד את 'myGithubFirebaseConfig' והזן את הפרטים שלך.");
                    }
                }

                app = initializeApp(configToUse);
                auth = getAuth(app);
                db = getFirestore(app);

                const status = document.getElementById('boot-status');
                status.innerText = "מאמת משתמש...";

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        if (!playerSessionId) playerSessionId = user.uid; // Player ID is their anonymous UID
                        renderView('home');
                        startSyncLibrary();
                    }
                });
            } catch (e) {
                console.error("Init error", e);
                // עכשיו במקום להיתקע לנצח, תוצג לך הודעה ברורה
                document.getElementById('app').innerHTML = `
                    <div class="p-10 text-center bg-red-600 text-white h-screen flex flex-col items-center justify-center">
                        <i class="fas fa-exclamation-triangle text-6xl mb-4"></i>
                        <h1 class="text-3xl font-black mb-2">שגיאת חיבור למסד הנתונים</h1>
                        <p class="text-xl max-w-2xl">${e.message}</p>
                    </div>`;
            }
        }

        function startSyncLibrary() {
            const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'quizzes');
            onSnapshot(ref, (snap) => {
                myQuizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(document.getElementById('dash-view')) renderDashboard(); // update if in dash
            });
        }

        // --- Audio Controller ---
        const audio = {
            play: (id) => {
                if (isMuted) return;
                document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
                const a = document.getElementById(`audio-${id}`);
                if (a) a.play().catch(e=>console.log("Audio play blocked by browser"));
            },
            stop: () => { document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; }); },
            toggleMute: () => {
                isMuted = !isMuted;
                if(isMuted) audio.stop();
                else if(activeGame?.gameState === 'lobby') audio.play('lobby');
                else if(activeGame?.gameState === 'question') audio.play('question');
                renderMuteBtn();
            }
        };

        // --- Core UI Renderer ---
        window.renderView = (viewId, data = null) => {
            const appDiv = document.getElementById('app');
            appDiv.className = "min-h-screen relative"; // reset
            window.scrollTo(0,0);
            
            let html = '';
            
            // Public / Home
            if (viewId === 'home') html = templateHome();
            else if (viewId === 'player_pin') html = templatePlayerPin();
            else if (viewId === 'player_name') html = templatePlayerName();
            else if (viewId === 'admin_auth') html = templateAdminAuth();
            
            // Admin / Host
            else if (viewId === 'dashboard') html = templateDashboard();
            else if (viewId === 'editor') html = templateEditor();
            else if (viewId === 'host_lobby') html = templateHostLobby();
            else if (viewId === 'host_question') html = templateHostQuestion();
            else if (viewId === 'host_leaderboard') html = templateHostLeaderboard();
            else if (viewId === 'host_podium') html = templateHostPodium();
            
            // Player IN GAME
            else if (viewId === 'player_waiting') html = templatePlayerWaiting();
            else if (viewId === 'player_question') html = templatePlayerQuestion();
            else if (viewId === 'player_result') html = templatePlayerResult(data);
            else if (viewId === 'player_podium') html = templatePlayerPodium();

            appDiv.innerHTML = html;
            
            // Setup timers or specifics after render
            if (viewId === 'host_question') startHostTimer();
            if (viewId === 'host_lobby' || viewId === 'host_question' || viewId === 'host_leaderboard') renderMuteBtn();
        };

        function renderMuteBtn() {
            const container = document.getElementById('mute-container');
            if(!container) return;
            container.innerHTML = `<button onclick="toggleAudio()" class="bg-white/20 p-3 rounded-full hover:bg-white/40"><i class="fas fa-volume-${isMuted?'mute':'up'} text-white text-xl"></i></button>`;
        }
        window.toggleAudio = audio.toggleMute;

        // ==========================================
        // TEMPLATES: HOME & JOIN
        // ==========================================

        function templateHome() {
            audio.stop();
            return `
                <div class="h-screen bg-lobby flex flex-col items-center justify-center p-4">
                    <h1 class="text-7xl font-black italic mb-10 drop-shadow-lg text-white">Quizmo!</h1>
                    
                    <div class="w-full max-w-sm space-y-4">
                        <button onclick="renderView('player_pin')" class="k-btn w-full bg-white text-gray-900 py-5 rounded-md text-2xl font-black">
                            הצטרפות למשחק
                        </button>
                        
                        <div class="text-center pt-8">
                            <button onclick="renderView('admin_auth')" class="text-white/70 hover:text-white font-bold text-lg underline">
                                ניהול חידונים למורים (דביר)
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function templatePlayerPin() {
            return `
                <div class="h-screen bg-lobby flex flex-col items-center justify-center p-4">
                    <h1 class="text-6xl font-black italic mb-12 drop-shadow-lg text-white">Quizmo!</h1>
                    <div class="bg-white p-6 rounded-md w-full max-w-sm shadow-2xl flex flex-col">
                        <input id="pin-input" type="number" placeholder="Game PIN" 
                            class="w-full text-center text-2xl font-black p-4 bg-gray-100 border-2 border-gray-200 rounded outline-none focus:border-purple-500 mb-4 tracking-widest">
                        <button onclick="joinGameWithPin()" class="k-btn w-full bg-gray-900 text-white py-4 rounded text-xl font-black">Enter</button>
                    </div>
                    <button onclick="renderView('home')" class="mt-8 text-white/70 hover:text-white font-bold">חזרה</button>
                </div>
            `;
        }

        function templatePlayerName() {
            return `
                <div class="h-screen bg-lobby flex flex-col items-center justify-center p-4">
                    <h1 class="text-6xl font-black italic mb-12 drop-shadow-lg text-white">Quizmo!</h1>
                    <div class="bg-white p-6 rounded-md w-full max-w-sm shadow-2xl flex flex-col">
                        <input id="name-input" type="text" placeholder="Nickname" maxlength="15"
                            class="w-full text-center text-2xl font-black p-4 bg-gray-100 border-2 border-gray-200 rounded outline-none focus:border-purple-500 mb-4">
                        <button onclick="submitPlayerName()" class="k-btn w-full bg-gray-900 text-white py-4 rounded text-xl font-black">OK, go!</button>
                    </div>
                </div>
            `;
        }

        function templateAdminAuth() {
            return `
                <div class="h-screen bg-gray-100 flex items-center justify-center p-4">
                    <div class="bg-white p-10 rounded-xl w-full max-w-sm shadow-xl text-center">
                        <i class="fas fa-lock text-4xl text-gray-300 mb-6"></i>
                        <h2 class="text-2xl font-black text-gray-800 mb-6">אזור ניהול</h2>
                        <input id="admin-pin" type="password" placeholder="קוד גישה" 
                            class="w-full text-center text-3xl font-black p-4 bg-gray-50 border-2 border-gray-200 rounded outline-none focus:border-purple-500 mb-6 tracking-widest">
                        <button onclick="verifyAdmin()" class="k-btn w-full bg-purple-600 text-white py-4 rounded text-xl font-black">כניסה</button>
                        <button onclick="renderView('home')" class="mt-6 text-gray-500 font-bold">חזור</button>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // TEMPLATES: DASHBOARD & EDITOR (HOST)
        // ==========================================

        function templateDashboard() {
            let listHtml = myQuizzes.length === 0 ? 
                `<div class="text-center py-20 text-gray-400"><i class="fas fa-folder-open text-6xl mb-4"></i><p class="text-xl font-bold">אין חידונים עדיין</p></div>` : 
                `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">` + 
                myQuizzes.map(q => `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden flex flex-col border border-gray-100">
                        <div class="h-32 bg-purple-100 flex items-center justify-center relative">
                            <i class="fas fa-question text-5xl text-purple-300"></i>
                            <span class="absolute bottom-2 left-2 bg-black/50 text-white text-xs px-2 py-1 rounded font-bold">${q.questions.length} Qs</span>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="font-black text-xl mb-4 text-gray-800 truncate">${q.title}</h3>
                            <div class="mt-auto flex gap-2">
                                <button onclick="hostGame('${q.id}')" class="flex-1 k-btn bg-purple-600 text-white font-bold py-2 rounded">הפעל</button>
                                <button onclick="editQuiz('${q.id}')" class="bg-gray-100 text-gray-700 w-12 rounded font-bold hover:bg-gray-200"><i class="fas fa-pen"></i></button>
                                <button onclick="deleteQuiz('${q.id}')" class="bg-red-50 text-red-500 w-12 rounded font-bold hover:bg-red-100"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('') + `</div>`;

            return `
                <div id="dash-view" class="min-h-screen bg-gray-100 p-6 md:p-12">
                    <div class="max-w-6xl mx-auto">
                        <div class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm">
                            <div>
                                <h2 class="text-3xl font-black text-gray-800">החידונים שלי</h2>
                                <p class="text-gray-500 font-bold">אזור ניהול - דביר</p>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="renderView('home')" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-md font-bold hover:bg-gray-300">יציאה</button>
                                <button onclick="createNewQuiz()" class="k-btn bg-green-500 text-white px-8 py-3 rounded-md font-black text-lg shadow-lg">
                                    צור חידון חדש <i class="fas fa-plus mr-2"></i>
                                </button>
                            </div>
                        </div>
                        ${listHtml}
                    </div>
                </div>
            `;
        }

        function templateEditor() {
            const q = edQuiz.questions[edQuiz.currentIdx];
            return `
                <div class="h-screen flex flex-col bg-gray-100">
                    <!-- Top Bar -->
                    <div class="bg-white h-16 border-b flex items-center justify-between px-6 shadow-sm z-10">
                        <div class="flex gap-4">
                            <button onclick="saveQuiz()" class="k-btn bg-green-500 text-white px-8 py-2 rounded font-black">שמור צא</button>
                            <button onclick="renderView('dashboard')" class="text-gray-500 font-bold px-4">ביטול</button>
                        </div>
                        <input oninput="edQuiz.title = this.value" value="${edQuiz.title}" 
                            class="text-center font-black text-xl border-b-2 border-gray-300 focus:border-purple-500 outline-none w-64 bg-transparent" placeholder="שם החידון">
                        <div class="font-black italic text-xl text-purple-600">Quizmo Creator</div>
                    </div>

                    <div class="flex flex-1 overflow-hidden">
                        <!-- Left Sidebar (Slides) -->
                        <div class="w-64 bg-white border-l flex flex-col shadow-lg z-0">
                            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                                ${edQuiz.questions.map((ques, idx) => `
                                    <div onclick="selectEditorQ(${idx})" class="cursor-pointer relative bg-gray-50 border-2 rounded-lg p-3 ${edQuiz.currentIdx === idx ? 'border-purple-500 shadow-md' : 'border-gray-200'}">
                                        <div class="text-xs font-bold text-gray-500 mb-1 flex justify-between">
                                            <span>${idx+1}. ${ques.type === 'tf' ? 'אמת/שקר' : 'חידון'}</span>
                                            <i onclick="event.stopPropagation(); deleteEditorQ(${idx})" class="fas fa-trash text-gray-300 hover:text-red-500"></i>
                                        </div>
                                        <div class="text-sm font-bold truncate">${ques.text || '...'}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="p-4 border-t bg-gray-50">
                                <button onclick="addEditorQ('multi')" class="w-full bg-purple-600 text-white py-2 rounded font-bold mb-2 text-sm shadow">הוסף שאלה</button>
                                <button onclick="addEditorQ('tf')" class="w-full bg-blue-600 text-white py-2 rounded font-bold text-sm shadow">הוסף אמת/שקר</button>
                            </div>
                        </div>

                        <!-- Main Canvas -->
                        <div class="flex-1 bg-gray-100 p-8 overflow-y-auto flex justify-center">
                            <div class="w-full max-w-4xl flex flex-col">
                                <!-- Question Text -->
                                <textarea oninput="updateQ('text', this.value)" class="w-full text-center text-3xl font-black p-6 rounded-md shadow-md outline-none focus:ring-4 focus:ring-purple-200 resize-none h-32 mb-6" placeholder="הקלד את השאלה כאן...">${q.text}</textarea>
                                
                                <!-- Media & Settings -->
                                <div class="flex gap-6 mb-6 h-64">
                                    <div class="flex-1 bg-white rounded-md shadow-md border-2 border-dashed border-gray-300 flex flex-col items-center justify-center p-4 relative overflow-hidden group">
                                        ${q.image ? `
                                            <img src="${q.image}" class="h-full object-contain z-0">
                                            <button onclick="updateQ('image', '')" class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded shadow opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash"></i></button>
                                        ` : `
                                            <i class="fas fa-image text-5xl text-gray-300 mb-4"></i>
                                            <input onchange="updateQ('image', this.value)" type="text" placeholder="הדבק כתובת תמונה (URL)" class="text-center w-3/4 p-2 border rounded bg-gray-50 focus:bg-white outline-none">
                                        `}
                                    </div>
                                    <div class="w-64 bg-white rounded-md shadow-md p-4 flex flex-col gap-4">
                                        <div>
                                            <label class="text-xs font-bold text-gray-500 uppercase">זמן לשאלה</label>
                                            <select onchange="updateQ('time', parseInt(this.value))" class="w-full p-2 border rounded font-bold bg-gray-50 mt-1">
                                                <option value="5" ${q.time===5?'selected':''}>5 שניות</option>
                                                <option value="10" ${q.time===10?'selected':''}>10 שניות</option>
                                                <option value="20" ${q.time===20?'selected':''}>20 שניות (רגיל)</option>
                                                <option value="30" ${q.time===30?'selected':''}>30 שניות</option>
                                                <option value="60" ${q.time===60?'selected':''}>60 שניות</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="text-xs font-bold text-gray-500 uppercase">ניקוד</label>
                                            <select onchange="updateQ('multiplier', parseInt(this.value))" class="w-full p-2 border rounded font-bold bg-gray-50 mt-1">
                                                <option value="1" ${q.multiplier===1?'selected':''}>רגיל (עד 1000)</option>
                                                <option value="2" ${q.multiplier===2?'selected':''}>כפול (עד 2000)</option>
                                            </select>
                                            ${q.multiplier === 2 ? '<div class="text-xs text-orange-500 font-black mt-1 text-center"><i class="fas fa-star"></i> Double Points!</div>' : ''}
                                        </div>
                                    </div>
                                </div>

                                <!-- Answers Grid -->
                                <div class="grid ${q.type==='tf' ? 'grid-cols-2' : 'grid-cols-2'} gap-4 mt-auto">
                                    ${renderEditorAnswers(q)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEditorAnswers(q) {
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
            const icons = ['fa-play -rotate-90', 'fa-square rotate-45', 'fa-circle', 'fa-square'];
            let html = '';
            
            const maxOpts = q.type === 'tf' ? 2 : 4;
            
            for(let i=0; i<maxOpts; i++) {
                const isCorrect = q.correctIdx === i;
                const isTF = q.type === 'tf';
                const val = q.options[i] || '';
                const tfText = i===0 ? 'אמת' : 'שקר';
                
                html += `
                    <div class="relative flex items-center bg-white rounded-md shadow-md border-b-4 ${colors[i].replace('bg-', 'border-')} overflow-hidden h-24">
                        <div class="${colors[i]} w-16 h-full flex items-center justify-center text-white text-3xl opacity-90"><i class="fas ${icons[i]}"></i></div>
                        ${isTF ? `
                            <div class="flex-1 px-4 text-2xl font-black text-gray-700">${tfText}</div>
                        ` : `
                            <textarea oninput="updateQOpt(${i}, this.value)" class="flex-1 h-full resize-none p-4 text-xl font-bold outline-none" placeholder="הוסף תשובה...">${val}</textarea>
                        `}

                const remaining = Math.max(0, duration - elapsed);
                
                txt.innerText = Math.ceil(remaining);
                
                // Ring SVG stroke-dashoffset magic
                const dashoffset = 283 - (283 * (remaining / duration));
                ring.style.strokeDashoffset = dashoffset;

                // Check auto-advance condition (time up OR everyone answered)
                const players = activeGame.players || {};
                const totalP = Object.keys(players).length;
                const answeredP = Object.values(players).filter(p => p.hasAnswered).length;

            playerName = name;

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'live_games', currentPin);
            const snap = await getDoc(docRef);
            if(!snap.exists()) return alert("המשחק נסגר");

            const gameData = snap.data();
            const players = gameData.players || {};
            
            // Check if name exists (simple check)
            const nameExists = Object.values(players).some(p => p.name === name && p.uid !== playerSessionId);
            if(nameExists) return alert("השם תפוס, בחר אחר");

            // Add/Update me
            players[playerSessionId] = {
                uid: playerSessionId,
                name: name,
                score: 0,
                hasAnswered: false,
                lastAnswerCorrect: false,
                lastPointsEarned: 0,
                forceRename: false
            };

            await updateDoc(docRef, { players: players });
            listenToGame(currentPin);
        };

        window.playerSubmitAnswer = async (optIdx) => {
            if(!activeGame) return;
            const q = activeGame.quizData.questions[activeGame.currentQIdx];
            const isCorrect = optIdx === q.correctIdx;
            
            // Calculate Points based on time
            let pts = 0;
            if (isCorrect) {
                const elapsed = (Date.now() - activeGame.qStartTime) / 1000;
                const ratio = Math.max(0, 1 - (elapsed / q.time) / 2); // Kahoot formula approx: max 1000, min 500
                pts = Math.round(ratio * 1000) * q.multiplier;
            }

            const me = activeGame.players[playerSessionId];
            
            // Local Optimistic update to UI immediately
            me.hasAnswered = true;
            me.lastAnswerCorrect = isCorrect;
            me.lastPointsEarned = pts;
            me.score += pts;
            renderView('player_question'); 

            // Update Firebase
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'live_games', currentPin), {
                [`players.${playerSessionId}`]: me
            });
        };

        // ==========================================
        // REAL-TIME SYNC ENGINE
        // ==========================================

        function listenToGame(pin) {
            if(unsubscribeGame) unsubscribeGame();
            
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'live_games', pin);
            unsubscribeGame = onSnapshot(ref, (snap) => {
                if(!snap.exists()) {
                    // Game Deleted
                    if(currentRole === 'player') {
                        alert("המשחק הסתיים על ידי המנהל");
                        renderView('home');
                    }
                    return;
                }

                const newData = snap.data();
                const oldState = activeGame?.gameState;
                activeGame = newData;

                if (currentRole === 'host') {
                    // Host UI Updates
                    if(activeGame.gameState === 'lobby') renderView('host_lobby');
                    else if(activeGame.gameState === 'question' && oldState !== 'question') renderView('host_question');
                    else if(activeGame.gameState === 'question') {
                        // Just update answers count if already on question view
                        const answered = Object.values(activeGame.players).filter(p=>p.hasAnswered).length;
                        const el = document.querySelector('.text-7xl.font-black');
                        if(el) el.innerText = answered;
                    }
                    else if(activeGame.gameState === 'leaderboard' && oldState !== 'leaderboard') renderView('host_leaderboard');
                    else if(activeGame.gameState === 'podium' && oldState !== 'podium') renderView('host_podium');
                } 
                else if (currentRole === 'player') {
                    // Player Force Rename Check
                    const me = activeGame.players[playerSessionId];
                    if (me && me.forceRename) {
                        unsubscribeGame();
                        renderView('player_name');
                        alert("המנהל דרש שתחליף כינוי");
                        return;
                    }

                    // Player UI Updates
                    if(activeGame.gameState === 'lobby') renderView('player_waiting');
                    else if(activeGame.gameState === 'question' && oldState !== 'question') renderView('player_question');
                    else if(activeGame.gameState === 'leaderboard' && oldState !== 'leaderboard') renderView('player_result');
                    else if(activeGame.gameState === 'podium' && oldState !== 'podium') renderView('player_podium');
                }
            }, (error) => {
                console.error("Game sync error", error);
            });
        }

        // Run
        initApp();

    </script>
</body>
</html>
