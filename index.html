<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo - Dvir's Kahoot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #46178f; color: white; margin: 0; }
        .kahoot-purple { background-color: #46178f; }
        .kahoot-blue { background-color: #1368ce; }
        .kahoot-green { background-color: #26890c; }
        .btn-shadow { box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: all 0.1s; }
        .btn-shadow:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .player-card { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col">
        <div id="screen-container" class="flex-1 flex flex-col">
            <!-- Screens will be injected here -->
        </div>
    </div>

    <script>
        // --- Game State ---
        let quizzes = JSON.parse(localStorage.getItem('quizzes')) || [];
        let currentQuiz = null;
        let activePlayers = []; // Local mock for players
        let gamePin = "";

        // --- Router ---
        function showScreen(screen, data = {}) {
            const container = document.getElementById('screen-container');
            
            // Default background for admin/editor
            document.body.style.backgroundColor = (screen === 'dashboard' || screen === 'editor') ? "#f2f2f2" : "#46178f";
            document.body.style.color = (screen === 'dashboard' || screen === 'editor') ? "#333" : "white";

            switch(screen) {
                case 'home':
                    container.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                            <h1 class="text-8xl font-black italic mb-12 drop-shadow-xl text-white">Quizmo!</h1>
                            <div class="flex flex-col gap-4 w-full max-w-sm">
                                <button onclick="showScreen('join_pin')" class="bg-white text-[#333] py-5 rounded-xl text-3xl font-black btn-shadow">הצטרפות</button>
                                <button onclick="showScreen('login')" class="kahoot-blue text-white py-4 rounded-xl text-xl font-bold btn-shadow flex items-center justify-center gap-2">
                                    <i data-lucide="user"></i> ניהול דביר
                                </button>
                            </div>
                        </div>
                    `;
                    break;

                case 'join_pin':
                    container.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center p-6">
                            <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
                                <input id="input-pin" type="number" class="w-full p-4 bg-gray-100 rounded-lg text-center text-3xl font-black mb-4 text-black border-2 border-transparent focus:border-purple-500 outline-none" placeholder="PIN קוד">
                                <button onclick="handleJoinPin()" class="w-full bg-[#333] text-white py-4 rounded-lg font-black text-2xl btn-shadow">המשך</button>
                            </div>
                            <button onclick="showScreen('home')" class="mt-8 text-white/60 font-bold">ביטול</button>
                        </div>
                    `;
                    break;

                case 'join_name':
                    container.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center p-6">
                            <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
                                <h2 class="text-black text-center text-xl font-bold mb-4 italic">איך קוראים לך?</h2>
                                <input id="input-name" type="text" class="w-full p-4 bg-gray-100 rounded-lg text-center text-3xl font-black mb-4 text-black border-2 border-transparent focus:border-purple-500 outline-none" placeholder="כינוי">
                                <button onclick="handleJoinName()" class="w-full kahoot-green text-white py-4 rounded-lg font-black text-2xl btn-shadow">אני בפנים!</button>
                            </div>
                        </div>
                    `;
                    break;

                case 'player_waiting':
                    container.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                            <h2 class="text-4xl font-black mb-4">מעולה, ${data.name}!</h2>
                            <p class="text-xl opacity-80 animate-pulse">אתה מופיע על המסך? המתן שהמארח יתחיל...</p>
                        </div>
                    `;
                    break;

                case 'login':
                    container.innerHTML = `
                        <div class="flex-1 flex items-center justify-center p-6">
                            <div class="bg-white p-8 rounded-2xl w-full max-w-xs shadow-2xl text-center">
                                <h2 class="text-2xl font-black text-purple-800 mb-6">כניסת דביר</h2>
                                <input id="admin-pass" type="password" class="w-full p-3 bg-gray-100 rounded-lg text-center font-bold mb-4 text-black outline-none" placeholder="סיסמה">
                                <button onclick="handleLogin()" class="w-full kahoot-purple text-white py-3 rounded-lg font-black btn-shadow">כניסה</button>
                                <button onclick="showScreen('home')" class="mt-4 text-gray-400 text-sm">חזרה</button>
                            </div>
                        </div>
                    `;
                    break;

                case 'dashboard':
                    container.innerHTML = `
                        <div class="max-w-4xl mx-auto w-full p-6">
                            <div class="flex justify-between items-center mb-8">
                                <h1 class="text-3xl font-black text-purple-900">החידונים של דביר</h1>
                                <button onclick="createNewQuiz()" class="kahoot-green text-white px-6 py-2 rounded-lg font-black btn-shadow">חדש +</button>
                            </div>
                            <div id="quiz-list" class="grid gap-4"></div>
                        </div>
                    `;
                    renderQuizList();
                    break;

                case 'editor':
                    container.innerHTML = `
                        <div class="max-w-4xl mx-auto w-full p-6 pb-24">
                            <div class="bg-white p-4 rounded-xl shadow-md mb-6 flex gap-4">
                                <input id="quiz-title" class="flex-1 text-2xl font-black outline-none border-b-2 border-gray-100 focus:border-purple-500" placeholder="שם החידון" value="${currentQuiz.title}">
                                <button onclick="saveQuiz()" class="kahoot-green text-white px-8 py-2 rounded-lg font-black btn-shadow">שמור</button>
                                <button onclick="showScreen('dashboard')" class="text-gray-400 font-bold">ביטול</button>
                            </div>
                            <div id="questions-list" class="space-y-8"></div>
                            <button onclick="addQuestion()" class="w-full py-6 border-4 border-dashed border-gray-300 rounded-2xl mt-8 text-gray-400 text-xl font-black hover:bg-white transition-all">+ הוסף שאלה</button>
                        </div>
                    `;
                    renderQuestions();
                    break;

                case 'lobby':
                    container.innerHTML = `
                        <div class="flex-1 flex flex-col p-8">
                            <div class="flex justify-between items-start mb-12">
                                <div class="bg-white text-black p-6 rounded-2xl shadow-2xl">
                                    <p class="text-gray-500 font-bold mb-1">הצטרפות עם קוד:</p>
                                    <h2 class="text-8xl font-black tracking-tighter">${data.pin}</h2>
                                </div>
                                <div class="text-right">
                                    <h1 class="text-5xl font-black mb-4">${data.title}</h1>
                                    <button onclick="startGame()" class="kahoot-green px-12 py-4 rounded-xl text-3xl font-black btn-shadow">התחל!</button>
                                </div>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-4 mb-6">
                                    <div class="bg-black/30 px-4 py-2 rounded-full font-black"><i data-lucide="users" class="inline w-5 h-5 ml-2"></i> <span id="player-count">0</span> שחקנים</div>
                                </div>
                                <div id="players-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                    <!-- Players appear here -->
                                </div>
                            </div>
                        </div>
                    `;
                    gamePin = data.pin;
                    activePlayers = []; // Reset for new session
                    break;
            }
            lucide.createIcons();
        }

        // --- Logic Functions ---

        function handleJoinPin() {
            const pin = document.getElementById('input-pin').value;
            if (pin) showScreen('join_name');
        }

        function handleJoinName() {
            const name = document.getElementById('input-name').value;
            if (name) {
                // In a real app, we'd send this to Firestore. 
                // For this demo, let's pretend we're the host too and update the screen if open.
                const playersGrid = document.getElementById('players-grid');
                if (playersGrid) {
                    addPlayerToLobby(name);
                }
                showScreen('player_waiting', { name });
            }
        }

        function addPlayerToLobby(name) {
            const grid = document.getElementById('players-grid');
            const div = document.createElement('div');
            div.className = "player-card bg-white/20 p-4 rounded-lg text-center font-black text-xl backdrop-blur-sm";
            div.innerText = name;
            grid.appendChild(div);
            activePlayers.push(name);
            document.getElementById('player-count').innerText = activePlayers.length;
        }

        function handleLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '2160') showScreen('dashboard');
            else alert("סיסמה שגויה");
        }

        function renderQuizList() {
            const list = document.getElementById('quiz-list');
            list.innerHTML = quizzes.map(q => `
                <div class="bg-white p-5 rounded-xl shadow-md flex justify-between items-center group">
                    <div>
                        <h3 class="text-xl font-black text-gray-800">${q.title || 'ללא שם'}</h3>
                        <p class="text-gray-400 font-bold">${q.questions.length} שאלות</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="deleteQuiz(${q.id})" class="p-2 text-red-400 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2"></i></button>
                        <button onclick="editQuiz(${q.id})" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i data-lucide="edit"></i></button>
                        <button onclick="hostQuiz(${q.id})" class="kahoot-blue text-white px-6 py-2 rounded-lg font-black btn-shadow">הפעל</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteQuiz(id) {
            if (confirm("למחוק את החידון?")) {
                quizzes = quizzes.filter(q => q.id !== id);
                localStorage.setItem('quizzes', JSON.stringify(quizzes));
                renderQuizList();
            }
        }

        function editQuiz(id) {
            currentQuiz = JSON.parse(JSON.stringify(quizzes.find(q => q.id === id)));
            showScreen('editor');
        }

        function createNewQuiz() {
            currentQuiz = { id: Date.now(), title: '', questions: [{ text: '', options: ['', '', '', ''], correct: 0 }] };
            showScreen('editor');
        }

        function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = currentQuiz.questions.map((q, i) => `
                <div class="bg-white p-6 rounded-2xl shadow-lg relative">
                    <div class="flex justify-between mb-4">
                        <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-bold">שאלה ${i+1}</span>
                        <button onclick="removeQuestion(${i})" class="text-red-300 hover:text-red-500"><i data-lucide="x-circle"></i></button>
                    </div>
                    <input onchange="currentQuiz.questions[${i}].text = this.value" class="w-full p-4 text-center text-xl font-bold bg-gray-50 rounded-xl mb-6 outline-none focus:ring-2 ring-purple-400" placeholder="הקלד שאלה..." value="${q.text}">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${q.options.map((opt, oi) => `
                            <div class="flex items-center p-2 border-2 ${q.correct === oi ? 'border-green-500 bg-green-50' : 'border-gray-100'} rounded-xl">
                                <input onchange="currentQuiz.questions[${i}].options[${oi}] = this.value" class="flex-1 p-2 bg-transparent font-bold outline-none" placeholder="תשובה..." value="${opt}">
                                <button onclick="currentQuiz.questions[${i}].correct = ${oi}; renderQuestions();" class="w-6 h-6 rounded-full border-2 ${q.correct === oi ? 'bg-green-500 border-transparent' : 'border-gray-300'}"></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addQuestion() { currentQuiz.questions.push({ text: '', options: ['', '', '', ''], correct: 0 }); renderQuestions(); }
        function removeQuestion(i) { currentQuiz.questions.splice(i, 1); renderQuestions(); }

        function saveQuiz() {
            currentQuiz.title = document.getElementById('quiz-title').value;
            const idx = quizzes.findIndex(q => q.id === currentQuiz.id);
            if (idx > -1) quizzes[idx] = currentQuiz;
            else quizzes.push(currentQuiz);
            localStorage.setItem('quizzes', JSON.stringify(quizzes));
            showScreen('dashboard');
        }

        function hostQuiz(id) {
            const quiz = quizzes.find(q => q.id === id);
            const pin = Math.floor(Math.random() * 900000) + 100000;
            showScreen('lobby', { pin, title: quiz.title });
        }

        function startGame() {
            if (activePlayers.length === 0) {
                alert("חייב לפחות שחקן אחד כדי להתחיל!");
                return;
            }
            alert("המשחק מתחיל עכשיו! (כאן יבוא מסך השאלות הבא)");
        }

        // Init
        showScreen('home');
    </script>
</body>
</html>
