<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot! - Dvir Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f2f2f2; overflow-x: hidden; user-select: none; }
        .bg-k-red { background-color: #e21b3c; }
        .bg-k-blue { background-color: #1368ce; }
        .bg-k-yellow { background-color: #d89e00; }
        .bg-k-green { background-color: #26890c; }
        .btn-shadow { box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2); transition: all 0.1s; }
        .btn-shadow:active { box-shadow: 0 0 0 rgba(0, 0, 0, 0.2); transform: translateY(4px); }
        .view-section { display: none; width: 100%; min-height: 100vh; flex-direction: column; }
        .view-section.active { display: flex; }
        .bg-animated { animation: pulse-bg 15s infinite alternate; }
        @keyframes pulse-bg { 0% { background-color: #46178f; } 100% { background-color: #25074d; } }
        .shape-triangle { width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 45px solid white; }
        .shape-diamond { width: 40px; height: 40px; background-color: white; transform: rotate(45deg); }
        .shape-circle { width: 45px; height: 45px; background-color: white; border-radius: 50%; }
        .shape-square { width: 40px; height: 40px; background-color: white; }
        .bar { transition: height 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <!-- Audio System -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lobbyInterval, timerInterval, isMuted = false;
        function playTone(freq, duration, vol=0.05) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(g).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function startLobbyMusic() {
            clearInterval(lobbyInterval);
            const notes = [261, 329, 392, 523]; let i = 0;
            lobbyInterval = setInterval(() => playTone(notes[i++ % 4], 0.6), 600);
        }
        function startTimerMusic() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => playTone(800, 0.1, 0.02), 1000);
        }
        function stopMusic() { clearInterval(lobbyInterval); clearInterval(timerInterval); }
    </script>

    <!-- PLAYER START SCREEN (Default for all) -->
    <div id="view-player-join" class="view-section active justify-center items-center bg-animated">
        <div class="bg-white p-8 rounded shadow-2xl w-full max-w-sm text-center animate-fade-in">
            <h1 class="text-5xl font-black text-[#46178f] mb-8 italic">Kahoot!</h1>
            <input type="number" id="pin-input" placeholder="קוד משחק" class="w-full border-2 border-gray-300 rounded p-4 mb-4 text-center text-2xl font-bold outline-none focus:border-purple-500">
            <button onclick="checkPin()" class="w-full bg-gray-900 text-white font-bold py-4 text-xl rounded btn-shadow">היכנס</button>
            <p id="join-error" class="text-red-600 font-bold mt-4 hidden">הקוד לא נמצא...</p>
        </div>
        <!-- Secret Admin Access -->
        <button onclick="nav('view-admin-login')" class="mt-20 text-white/30 hover:text-white/60 text-sm">ניהול מערכת</button>
    </div>

    <!-- PLAYER NICKNAME -->
    <div id="view-player-nick" class="view-section justify-center items-center bg-animated">
        <div class="bg-white p-8 rounded shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-4xl font-black text-[#46178f] mb-8">בחר כינוי</h1>
            <input type="text" id="nick-input" placeholder="כינוי" maxlength="12" class="w-full border-2 border-gray-300 rounded p-4 mb-4 text-center text-2xl font-bold outline-none">
            <button onclick="joinLobby()" class="w-full bg-gray-900 text-white font-bold py-4 text-xl rounded btn-shadow">אני מוכן!</button>
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="view-admin-login" class="view-section justify-center items-center bg-gray-200">
        <div class="bg-white p-8 rounded shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center">כניסת מנהל (דביר)</h2>
            <input type="password" id="admin-pass" placeholder="סיסמה" class="w-full border p-3 mb-4 text-center rounded">
            <button onclick="loginAdmin()" class="w-full bg-purple-700 text-white py-3 rounded btn-shadow font-bold">כניסה</button>
            <button onclick="nav('view-player-join')" class="w-full mt-2 text-gray-500">חזור</button>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="view-admin-dash" class="view-section bg-gray-100">
        <div class="bg-white p-4 shadow flex justify-between items-center">
            <span class="text-xl font-bold">החידונים שלי</span>
            <button onclick="createNewQuiz()" class="bg-green-600 text-white px-4 py-2 rounded font-bold">+ חידון חדש</button>
        </div>
        <div id="dash-list" class="p-6 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>

    <!-- ADMIN CREATOR -->
    <div id="view-admin-creator" class="view-section bg-gray-100">
        <div class="bg-white p-4 shadow flex justify-between items-center">
            <input type="text" id="edit-title" class="text-xl font-bold border-b focus:border-blue-500 outline-none" placeholder="שם החידון">
            <div class="flex gap-2">
                <button onclick="nav('view-admin-dash')" class="bg-gray-300 px-4 py-2 rounded">ביטול</button>
                <button onclick="saveCurrentQuiz()" class="bg-green-600 text-white px-4 py-2 rounded font-bold">שמור</button>
            </div>
        </div>
        <div class="flex flex-grow h-0">
            <div id="creator-sidebar" class="w-64 bg-white border-l p-4 flex flex-col gap-2 overflow-y-auto"></div>
            <div id="creator-main" class="flex-grow p-8 overflow-y-auto">
                <div class="bg-white p-8 rounded shadow-lg max-w-4xl mx-auto relative">
                    <button onclick="removeQuestion()" class="absolute top-4 left-4 text-red-500">🗑️</button>
                    <input type="text" id="edit-q-text" class="w-full text-3xl font-bold text-center border-b-2 mb-8 py-2 outline-none" placeholder="הקלד שאלה..." oninput="syncQData()">
                    <div class="grid grid-cols-2 gap-4" id="edit-answers-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- HOST LOBBY -->
    <div id="view-host-lobby" class="view-section bg-animated text-white justify-center items-center">
        <div class="absolute top-4 right-4 flex gap-4">
            <button onclick="isMuted = !isMuted; this.innerText = isMuted ? '🔇' : '🔊'" class="text-3xl">🔊</button>
            <button onclick="nav('view-admin-dash'); stopMusic()" class="bg-white/20 px-4 py-2 rounded">סגור</button>
        </div>
        <div class="text-center">
            <p class="text-2xl mb-2">הצטרפו בכתובת האתר עם הקוד:</p>
            <div id="display-pin" class="bg-white text-black text-800 text-7xl font-black py-4 px-12 rounded shadow-2xl mb-8">000000</div>
            <div class="flex justify-between items-center w-full max-w-4xl px-4 mb-4">
                <span id="host-count" class="text-2xl font-bold">0 שחקנים</span>
                <button id="start-btn" onclick="startMatch()" class="bg-blue-600 px-10 py-3 rounded text-2xl font-bold btn-shadow opacity-50" disabled>התחל</button>
            </div>
            <div id="host-player-list" class="bg-black/20 p-6 rounded-lg w-[80vw] min-h-[200px] flex flex-wrap gap-4 justify-center"></div>
        </div>
    </div>

    <!-- MATCH: QUESTION -->
    <div id="view-host-match" class="view-section bg-gray-100">
        <button onclick="skipQ()" class="absolute top-6 left-6 bg-white px-6 py-2 rounded-full font-bold btn-shadow">דלג ⏭</button>
        <div class="text-center pt-12">
            <h2 id="match-q-text" class="text-5xl font-bold mb-10 px-4">שאלה?</h2>
            <div class="flex justify-center items-center h-64 relative">
                <div id="match-timer" class="absolute left-10 w-24 h-24 bg-purple-600 text-white rounded-full flex justify-center items-center text-4xl font-black">20</div>
                <div class="text-2xl font-bold bg-white p-4 rounded shadow">תשובות: <span id="match-ans-count">0</span></div>
            </div>
        </div>
        <div id="match-options" class="grid grid-cols-2 gap-4 p-8 flex-grow"></div>
    </div>

    <!-- PLAYER: WAITING/BUTTONS/RESULT -->
    <div id="view-player-status" class="view-section justify-center items-center text-white text-center p-6">
        <h2 id="status-msg" class="text-4xl font-bold">מחכה...</h2>
        <div id="player-buttons" class="grid grid-cols-2 gap-4 w-full h-full mt-10 hidden"></div>
    </div>

    <script>
        /* Logic Core */
        const channel = new BroadcastChannel('kahoot_dvir');
        let quizzes = JSON.parse(localStorage.getItem('dvir_quizzes')) || [];
        let state = { pin: null, players: [], currentQuiz: null, qIdx: 0, timer: 0, interval: null, myId: 'p'+Math.random() };

        // Admin Auth
        function loginAdmin() {
            if(document.getElementById('admin-pass').value === "2160") {
                renderDash(); nav('view-admin-dash');
            } else alert("טעות בסיסמה");
        }

        // Navigation
        function nav(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Dashboard
        function renderDash() {
            const container = document.getElementById('dash-list');
            container.innerHTML = '';
            quizzes.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded shadow";
                div.innerHTML = `<h3 class="font-bold text-lg mb-4">${q.title}</h3>
                <div class="flex gap-2">
                    <button onclick="launchQuiz(${i})" class="flex-grow bg-blue-600 text-white py-2 rounded font-bold">הפעל</button>
                    <button onclick="editQuiz(${i})" class="p-2 bg-gray-200 rounded">✏️</button>
                    <button onclick="deleteQuiz(${i})" class="p-2 bg-red-100 text-red-600 rounded">🗑️</button>
                </div>`;
                container.appendChild(div);
            });
        }

        function deleteQuiz(i) { if(confirm('למחוק?')) { quizzes.splice(i,1); save(); renderDash(); } }

        // Creator Logic (Fixed)
        let editingIdx = -1;
        let tempQuiz = null;
        let tempQIdx = 0;

        function createNewQuiz() { editingIdx = -1; tempQuiz = { title: 'חידון חדש', questions: [emptyQ()] }; tempQIdx = 0; openCreator(); }
        function editQuiz(i) { editingIdx = i; tempQuiz = JSON.parse(JSON.stringify(quizzes[i])); tempQIdx = 0; openCreator(); }
        function emptyQ() { return { text: '', time: 20, answers: ['', '', '', ''], correct: 0 }; }

        function openCreator() {
            document.getElementById('edit-title').value = tempQuiz.title;
            renderCreatorSidebar();
            loadQToEditor();
            nav('view-admin-creator');
        }

        function renderCreatorSidebar() {
            const side = document.getElementById('creator-sidebar');
            side.innerHTML = '';
            tempQuiz.questions.forEach((q, i) => {
                const btn = document.createElement('button');
                btn.className = `p-2 text-right rounded ${i === tempQIdx ? 'bg-purple-100 border-r-4 border-purple-600' : ''}`;
                btn.innerText = `שאלה ${i+1}: ${q.text.substring(0,10)}...`;
                btn.onclick = () => { tempQIdx = i; loadQToEditor(); renderCreatorSidebar(); };
                side.appendChild(btn);
            });
            const add = document.createElement('button');
            add.className = "mt-4 border-2 border-dashed p-2";
            add.innerText = "+ הוסף שאלה";
            add.onclick = () => { tempQuiz.questions.push(emptyQ()); tempQIdx = tempQuiz.questions.length-1; renderCreatorSidebar(); loadQToEditor(); };
            side.appendChild(add);
        }

        function loadQToEditor() {
            const q = tempQuiz.questions[tempQIdx];
            document.getElementById('edit-q-text').value = q.text;
            const grid = document.getElementById('edit-answers-grid');
            grid.innerHTML = '';
            const colors = ['bg-k-red', 'bg-k-blue', 'bg-k-yellow', 'bg-k-green'];
            q.answers.forEach((ans, i) => {
                const div = document.createElement('div');
                div.className = `${colors[i]} p-4 rounded flex items-center gap-2`;
                div.innerHTML = `
                    <input type="radio" name="correct" ${q.correct === i ? 'checked' : ''} onchange="tempQuiz.questions[tempQIdx].correct = ${i}">
                    <input type="text" class="bg-white/20 text-white w-full p-2 outline-none font-bold" value="${ans}" oninput="tempQuiz.questions[tempQIdx].answers[${i}] = this.value; syncQData()">
                `;
                grid.appendChild(div);
            });
        }

        function syncQData() { tempQuiz.questions[tempQIdx].text = document.getElementById('edit-q-text').value; }
        function saveCurrentQuiz() {
            tempQuiz.title = document.getElementById('edit-title').value;
            if(editingIdx === -1) quizzes.push(tempQuiz); else quizzes[editingIdx] = tempQuiz;
            save(); renderDash(); nav('view-admin-dash');
        }
        function save() { localStorage.setItem('dvir_quizzes', JSON.stringify(quizzes)); }

        // Match Logic
        function launchQuiz(i) {
            state.currentQuiz = quizzes[i];
            state.pin = Math.floor(100000 + Math.random()*900000).toString();
            state.players = [];
            state.qIdx = 0;
            document.getElementById('display-pin').innerText = state.pin;
            document.getElementById('host-player-list').innerHTML = '';
            document.getElementById('host-count').innerText = "0 שחקנים";
            nav('view-host-lobby');
            startLobbyMusic();
        }

        function checkPin() {
            const val = document.getElementById('pin-input').value;
            channel.postMessage({ type: 'CHECK_PIN', pin: val, id: state.myId });
            setTimeout(() => { if(!state.matchPin) document.getElementById('join-error').classList.remove('hidden'); }, 1000);
        }

        function joinLobby() {
            const n = document.getElementById('nick-input').value;
            if(!n) return;
            state.myName = n;
            channel.postMessage({ type: 'JOIN', pin: state.matchPin, id: state.myId, name: n });
            document.getElementById('status-msg').innerText = "אתה בפנים!";
            nav('view-player-status');
        }

        function startMatch() {
            stopMusic();
            sendToPlayers({ type: 'START' });
            showQuestion();
        }

        function showQuestion() {
            const q = state.currentQuiz.questions[state.qIdx];
            document.getElementById('match-q-text').innerText = q.text;
            document.getElementById('match-ans-count').innerText = "0";
            state.answersReceived = 0;
            state.timer = q.time;
            
            const optCont = document.getElementById('match-options');
            optCont.innerHTML = '';
            const colors = ['bg-k-red', 'bg-k-blue', 'bg-k-yellow', 'bg-k-green'];
            const shapes = ['▲', '◆', '●', '■'];
            q.answers.forEach((a, i) => {
                optCont.innerHTML += `<div class="${colors[i]} text-white text-3xl font-bold p-6 rounded flex items-center gap-6">
                    <span class="text-4xl">${shapes[i]}</span><span>${a}</span>
                </div>`;
            });

            nav('view-host-match');
            sendToPlayers({ type: 'Q', answers: q.answers });
            startTimerMusic();
            
            clearInterval(state.interval);
            state.interval = setInterval(() => {
                state.timer--;
                document.getElementById('match-timer').innerText = state.timer;
                if(state.timer <= 0) skipQ();
            }, 1000);
        }

        function skipQ() {
            clearInterval(state.interval);
            stopMusic();
            // In a real Kahoot this would show results, here we'll move next for simplicity
            state.qIdx++;
            if(state.qIdx < state.currentQuiz.questions.length) setTimeout(showQuestion, 3000);
            else { 
                nav('view-admin-dash'); 
                sendToPlayers({ type: 'END' });
            }
        }

        function sendToPlayers(msg) { channel.postMessage({ ...msg, pin: state.pin }); }

        // Communication Bridge
        channel.onmessage = (e) => {
            const d = e.data;
            // Host Side
            if(state.pin && d.pin === state.pin) {
                if(d.type === 'CHECK_PIN') channel.postMessage({ type: 'VALID', pin: state.pin, target: d.id });
                if(d.type === 'JOIN') {
                    if(!state.players.find(p => p.id === d.id)) {
                        state.players.push(d);
                        const pList = document.getElementById('host-player-list');
                        const div = document.createElement('div');
                        div.className = "bg-white text-black px-4 py-2 rounded font-bold animate-bounce";
                        div.innerText = d.name;
                        div.onclick = () => { /* kick logic */ };
                        pList.appendChild(div);
                        document.getElementById('host-count').innerText = state.players.length + " שחקנים";
                        if(state.players.length > 0) { 
                            const b = document.getElementById('start-btn');
                            b.disabled = false; b.classList.remove('opacity-50');
                        }
                    }
                }
                if(d.type === 'ANS') {
                    state.answersReceived++;
                    document.getElementById('match-ans-count').innerText = state.answersReceived;
                    if(state.answersReceived >= state.players.length) skipQ();
                }
            }
            // Player Side
            if(d.type === 'VALID' && d.target === state.myId) {
                state.matchPin = d.pin;
                nav('view-player-nick');
            }
            if(state.matchPin && d.pin === state.matchPin) {
                if(d.type === 'Q') {
                    const btnCont = document.getElementById('player-buttons');
                    btnCont.innerHTML = ''; btnCont.classList.remove('hidden');
                    const colors = ['bg-k-red', 'bg-k-blue', 'bg-k-yellow', 'bg-k-green'];
                    d.answers.forEach((_, i) => {
                        const b = document.createElement('button');
                        b.className = `${colors[i]} h-40 rounded btn-shadow`;
                        b.onclick = () => { 
                            channel.postMessage({ type: 'ANS', pin: state.matchPin, id: state.myId });
                            btnCont.classList.add('hidden');
                            document.getElementById('status-msg').innerText = "תשובה נשלחה!";
                        };
                        btnCont.appendChild(b);
                    });
                    document.getElementById('status-msg').innerText = "בחר תשובה!";
                    nav('view-player-status');
                }
                if(d.type === 'END') { alert('המשחק נגמר!'); location.reload(); }
            }
        };

        // Seed data
        if(quizzes.length === 0) {
            quizzes.push({ title: 'חידון כללי', questions: [{ text: 'כמה זה 2+2?', time: 10, answers: ['3','4','5','6'], correct: 1 }]});
            save();
        }
    </script>
</body>
</html>
