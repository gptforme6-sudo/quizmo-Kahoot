<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo kahoot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #f4f4f9; margin: 0; }
        
        .kahoot-purple { background: linear-gradient(135deg, #46178f 0%, #33116d 100%); }
        .kahoot-red { background-color: #e21b3c; }
        .kahoot-blue { background-color: #1368ce; }
        .kahoot-green { background-color: #26890c; }
        .kahoot-yellow { background-color: #d89e00; }
        
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
        .btn-press { transition: all 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-press:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        
        .option-input { border: 2px solid transparent; transition: all 0.2s; }
        .option-input:focus { border-color: white; background-color: rgba(255,255,255,0.2); }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="app">
        <!-- Initial Loader Overlay -->
        <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white">
            <div class="text-6xl font-black italic mb-6 animate-bounce">Quizmo</div>
            <div class="spinner mb-4"></div>
            <p class="opacity-70">מכין את הלוח...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Global State
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-pro-v5';
        let db, auth, user;
        
        let state = {
            view: 'home',
            quizzes: [],
            players: [],
            currentGame: null,
            myPlayerData: null,
            timeLeft: 0,
            timerId: null,
            editingQuiz: null,
            nickname: '',
            pin: '',
            isSaving: false
        };

        async function init() {
            try {
                let config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                
                if (config) {
                    const app = initializeApp(config);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (u) => {
                        user = u;
                        if (user) setupSubscriptions();
                        render();
                    });
                } else {
                    render(); // Fallback for no config
                }
            } catch (err) {
                console.error("Initialization failed", err);
                render();
            }
        }

        function setupSubscriptions() {
            if (!user || !db) return;
            const quizCol = collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes');
            onSnapshot(quizCol, (snap) => {
                state.quizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.log("Firestore error:", err));
        }

        // --- Logic Functions ---
        window.setView = (v) => { state.view = v; render(); };

        window.updateField = (index, field, value) => {
            state.editingQuiz.questions[index][field] = value;
            // No full render here to keep focus
        };

        window.updateOption = (qIdx, oIdx, value) => {
            state.editingQuiz.questions[qIdx].opts[oIdx] = value;
        };

        window.addQuestion = (type) => {
            const newQ = {
                type,
                text: '',
                time: 20,
                correct: 0,
                image: '',
                opts: type === 'tf' ? ['אמת', 'שקר'] : ['', '', '', '']
            };
            state.editingQuiz.questions.push(newQ);
            render();
            // Scroll to bottom
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
        };

        window.saveQuiz = async () => {
            const titleInput = document.getElementById('quizTitle');
            if (titleInput) state.editingQuiz.title = titleInput.value;
            
            if (!state.editingQuiz.title) return alert("בבקשה תן שם לחידון");
            if (state.editingQuiz.questions.length === 0) return alert("הוסף לפחות שאלה אחת");

            state.isSaving = true;
            render();

            try {
                const id = state.editingQuiz.id || Math.random().toString(36).substr(2, 9);
                if (db && user) {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', id);
                    await setDoc(docRef, { ...state.editingQuiz, id, lastUpdated: Date.now() });
                } else {
                    // Local fallback
                    const existingIdx = state.quizzes.findIndex(q => q.id === id);
                    if (existingIdx > -1) state.quizzes[existingIdx] = { ...state.editingQuiz, id };
                    else state.quizzes.push({ ...state.editingQuiz, id });
                }
                state.view = 'dashboard';
            } catch (e) {
                alert("שגיאה בשמירה: " + e.message);
            } finally {
                state.isSaving = false;
                render();
            }
        };

        window.joinGame = async () => {
            const pinInput = document.getElementById('joinPin').value;
            if (!pinInput) return;

            if (db) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pinInput));
                if (!snap.exists()) {
                    const errEl = document.getElementById('pinError');
                    errEl.innerText = "הקוד שהזנת לא קיים או שהמשחק הסתיים";
                    errEl.classList.remove('hidden');
                    return;
                }
                state.pin = pinInput;
                setView('join_nick');
            } else {
                alert("אין חיבור לשרת כרגע");
            }
        };

        window.hostGame = async (quizId) => {
            const quiz = state.quizzes.find(q => q.id === quizId);
            const pin = Math.floor(100000 + Math.random() * 899999).toString();
            state.pin = pin;
            
            if (db) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), {
                    pin, quiz, status: 'lobby', hostId: user.uid, currentQ: 0, lastUpdate: Date.now()
                });
                listenToGame(pin);
            }
            setView('host_lobby');
        };

        window.enterLobby = async () => {
            const nick = document.getElementById('joinNick').value;
            if (!nick) return;
            state.nickname = nick;
            
            if (db) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                    pin: state.pin, name: nick, score: 0, hasAnswered: false, id: user.uid
                });
                listenToGame(state.pin);
            }
            setView('player_lobby');
        };

        function listenToGame(pin) {
            if (!db) return;
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), (snap) => {
                if (snap.exists()) {
                    state.currentGame = snap.data();
                    if (state.currentGame.hostId === (user?.uid || '')) handleHostTimer();
                    render();
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                state.players = snap.docs
                    .map(d => d.data())
                    .filter(p => p.pin === pin)
                    .sort((a,b) => b.score - a.score);
                state.myPlayerData = state.players.find(p => p.id === (user?.uid || ''));
                render();
            });
        }

        function handleHostTimer() {
            if (state.currentGame.status === 'question' && !state.timerId) {
                const q = state.currentGame.quiz.questions[state.currentGame.currentQ];
                state.timeLeft = q.time;
                state.timerId = setInterval(async () => {
                    state.timeLeft--;
                    const allAns = state.players.length > 0 && state.players.every(p => p.hasAnswered);
                    if (state.timeLeft <= 0 || allAns) {
                        clearInterval(state.timerId);
                        state.timerId = null;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin), { status: 'reveal' });
                    }
                    render();
                }, 1000);
            }
        }

        window.submitAnswer = async (idx) => {
            if (!state.myPlayerData || state.myPlayerData.hasAnswered || state.currentGame.status !== 'question') return;
            const q = state.currentGame.quiz.questions[state.currentGame.currentQ];
            const isCorrect = idx === q.correct;
            const pts = isCorrect ? Math.max(100, state.timeLeft * 50) : 0;
            
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                hasAnswered: true, lastCorrect: isCorrect, score: (state.myPlayerData.score || 0) + pts, lastPoints: pts
            });
        };

        window.startGame = async () => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin), { status: 'question', currentQ: 0 });
        };

        window.nextStep = async () => {
            const g = state.currentGame;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'games', state.pin);
            if (g.status === 'reveal') await updateDoc(ref, { status: 'scoreboard' });
            else if (g.status === 'scoreboard') {
                if (g.currentQ + 1 >= g.quiz.questions.length) await updateDoc(ref, { status: 'podium' });
                else {
                    for(let p of state.players) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id), { hasAnswered: false });
                    }
                    await updateDoc(ref, { status: 'question', currentQ: g.currentQ + 1 });
                }
            }
        };

        // --- UI Rendering ---
        function render() {
            const root = document.getElementById('app');
            if (state.view === 'home') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-6 overflow-hidden">
                    <div class="absolute top-10 left-10 opacity-20 text-8xl rotate-12"><i class="fas fa-question"></i></div>
                    <div class="absolute bottom-10 right-10 opacity-20 text-8xl -rotate-12"><i class="fas fa-trophy"></i></div>
                    
                    <h1 class="text-8xl font-black italic mb-12 drop-shadow-2xl tracking-tighter animate-pop">Quizmo!</h1>
                    <div class="w-full max-w-sm space-y-4 z-10">
                        <button onclick="setView('join')" class="w-full bg-white text-black py-6 rounded-3xl text-3xl font-black btn-press card-shadow">הצטרף למשחק</button>
                        <button onclick="setView('login')" class="w-full text-white/70 font-bold py-4 hover:text-white transition-all text-lg border-2 border-white/20 rounded-2xl">לוח מנהל</button>
                    </div>
                </div>`;
            } else if (state.view === 'login') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6">
                    <div class="bg-white p-12 rounded-[3rem] w-full max-w-md text-center shadow-2xl">
                        <div class="w-20 h-20 kahoot-purple text-white flex items-center justify-center rounded-3xl mx-auto mb-6 text-3xl shadow-lg"><i class="fas fa-lock"></i></div>
                        <h2 class="text-3xl font-black mb-2 text-gray-800">כניסת מנהל</h2>
                        <p class="text-gray-400 mb-8 font-bold">הזן את הקוד הסודי שלך</p>
                        <input type="password" id="adminPass" class="w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl text-center text-4xl mb-6 outline-none focus:border-purple-600 font-mono tracking-widest transition-all" placeholder="••••">
                        <button onclick="const p=document.getElementById('adminPass').value; if(p==='2160')setView('dashboard'); else alert('קוד שגוי')" class="w-full kahoot-purple text-white py-5 rounded-2xl font-black text-xl btn-press shadow-xl">כניסה למערכת</button>
                        <button onclick="setView('home')" class="mt-6 text-gray-400 font-bold hover:text-gray-600 underline">חזרה</button>
                    </div>
                </div>`;
            } else if (state.view === 'dashboard') {
                root.innerHTML = `
                <div class="min-h-screen bg-gray-50 text-right">
                    <nav class="kahoot-purple text-white p-6 shadow-xl flex flex-row-reverse justify-between items-center">
                        <h1 class="text-3xl font-black italic">Quizmo Admin</h1>
                        <button onclick="setView('home')" class="bg-white/10 p-3 rounded-xl hover:bg-white/20 transition"><i class="fas fa-sign-out-alt"></i></button>
                    </nav>
                    <div class="max-w-5xl mx-auto p-8">
                        <div class="flex flex-row-reverse justify-between items-center mb-12">
                            <div>
                                <h2 class="text-4xl font-black text-gray-800">החידונים שלי</h2>
                                <p class="text-gray-500 font-bold">נהל, ערוך והפעל את המשחקים שלך</p>
                            </div>
                            <button onclick="state.editingQuiz = {title: '', questions: []}; setView('editor')" class="kahoot-green text-white px-10 py-4 rounded-2xl font-black text-xl btn-press shadow-lg">+ צור חידון</button>
                        </div>
                        <div class="grid gap-6">
                            ${state.quizzes.length === 0 ? `
                                <div class="bg-white rounded-[2rem] p-20 text-center border-4 border-dashed border-gray-100">
                                    <div class="text-6xl text-gray-200 mb-4"><i class="fas fa-folder-open"></i></div>
                                    <p class="text-xl text-gray-400 font-bold">אין חידונים ברשימה. צור את הראשון שלך עכשיו!</p>
                                </div>
                            ` : state.quizzes.map(q => `
                                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-row-reverse justify-between items-center animate-pop">
                                    <div>
                                        <h3 class="text-2xl font-black text-gray-800 mb-1">${q.title}</h3>
                                        <div class="flex flex-row-reverse gap-4 text-sm text-gray-400 font-bold">
                                            <span><i class="fas fa-list-ol ml-1"></i> ${q.questions.length} שאלות</span>
                                            <span><i class="fas fa-clock ml-1"></i> עודכן לאחרונה</span>
                                        </div>
                                    </div>
                                    <div class="flex gap-3">
                                        <button onclick="hostGame('${q.id}')" class="kahoot-blue text-white px-10 py-4 rounded-2xl font-black text-xl btn-press shadow-md">הפעל עכשיו</button>
                                        <button onclick="state.editingQuiz = JSON.parse(JSON.stringify(state.quizzes.find(x=>x.id==='${q.id}'))); setView('editor');" class="bg-gray-100 text-gray-600 p-4 rounded-2xl hover:bg-gray-200 transition"><i class="fas fa-edit"></i></button>
                                        <button onclick="if(confirm('למחוק?')) deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', '${q.id}'))" class="bg-red-50 text-red-500 p-4 rounded-2xl hover:bg-red-100 transition"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'editor') {
                const qz = state.editingQuiz;
                root.innerHTML = `
                <div class="min-h-screen bg-gray-100 text-right pb-40">
                    <div class="kahoot-purple text-white p-6 sticky top-0 z-50 shadow-2xl flex flex-row-reverse justify-between items-center">
                        <div class="flex flex-row-reverse items-center gap-6 flex-1">
                            <button onclick="setView('dashboard')" class="text-2xl hover:scale-110 transition"><i class="fas fa-times"></i></button>
                            <input id="quizTitle" value="${qz.title}" class="bg-white/10 border-b-2 border-white/30 text-2xl font-black p-2 outline-none focus:bg-white/20 rounded-t-lg flex-1 text-right" placeholder="שם החידון שלך...">
                        </div>
                        <div class="flex gap-4">
                            <button onclick="saveQuiz()" class="bg-white text-purple-900 px-10 py-3 rounded-xl font-black text-lg btn-press flex items-center gap-2">
                                ${state.isSaving ? '<div class="spinner !border-purple-200 !border-top-purple-900"></div>' : 'שמור חידון'}
                            </button>
                        </div>
                    </div>

                    <div class="max-w-4xl mx-auto p-6 space-y-12 mt-8">
                        ${qz.questions.map((q, i) => `
                            <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden border-2 border-gray-100 animate-pop relative">
                                <div class="bg-gray-50 px-10 py-6 border-b flex flex-row-reverse justify-between items-center">
                                    <span class="text-xl font-black text-purple-900">שאלה ${i+1}</span>
                                    <div class="flex gap-4 items-center">
                                        <select onchange="updateField(${i}, 'time', parseInt(this.value))" class="bg-white border p-2 rounded-xl font-bold">
                                            <option value="10" ${q.time===10?'selected':''}>10 שניות</option>
                                            <option value="20" ${q.time===20?'selected':''}>20 שניות</option>
                                            <option value="30" ${q.time===30?'selected':''}>30 שניות</option>
                                        </select>
                                        <button onclick="state.editingQuiz.questions.splice(${i},1); render()" class="text-red-400 hover:text-red-600 text-xl"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                <div class="p-10 space-y-8">
                                    <div>
                                        <label class="block text-gray-400 font-black mb-2 uppercase text-xs tracking-widest">השאלה</label>
                                        <textarea oninput="updateField(${i}, 'text', this.value)" class="w-full p-6 bg-gray-50 rounded-2xl text-2xl font-bold border-2 border-transparent focus:border-purple-500 outline-none text-right resize-none h-32 transition-all" placeholder="הכנס את השאלה כאן...">${q.text}</textarea>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-gray-400 font-black mb-2 uppercase text-xs tracking-widest">תמונה (כתובת URL)</label>
                                            <input oninput="updateField(${i}, 'image', this.value)" value="${q.image || ''}" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-purple-500 outline-none text-right" placeholder="הדבק כאן קישור לתמונה...">
                                        </div>
                                        <div class="flex items-end justify-center">
                                            ${q.image ? `<img src="${q.image}" class="h-16 rounded-lg shadow-sm border" onerror="this.src='https://via.placeholder.com/150?text=Invalid+Image'">` : '<div class="h-16 w-32 border-2 border-dashed rounded-lg flex items-center justify-center text-gray-300 text-xs font-bold uppercase">ללא תמונה</div>'}
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-6">
                                        ${q.opts.map((opt, oi) => {
                                            const colors = ['red', 'blue', 'yellow', 'green'];
                                            // Special logic for True/False
                                            let colorClass = `kahoot-${colors[oi]}`;
                                            if (q.type === 'tf') {
                                                colorClass = oi === 0 ? 'kahoot-blue' : 'kahoot-red';
                                            }
                                            
                                            return `
                                            <div class="${colorClass} p-2 rounded-[2rem] shadow-lg flex flex-row-reverse items-center gap-4 transition-all ${q.correct === oi ? 'ring-8 ring-green-400 ring-offset-4' : 'opacity-90 hover:opacity-100'}">
                                                <div class="w-12 h-12 flex items-center justify-center text-white text-2xl">
                                                    <input type="radio" name="correct_${i}" onchange="state.editingQuiz.questions[${i}].correct = ${oi}; render()" ${q.correct === oi ? 'checked' : ''} class="w-8 h-8 accent-white cursor-pointer">
                                                </div>
                                                <input oninput="updateOption(${i}, ${oi}, this.value)" value="${opt}" class="flex-1 bg-white/20 p-4 rounded-2xl text-white font-black text-xl placeholder-white/50 outline-none option-input text-right" placeholder="תשובה ${oi+1}...">
                                                <div class="w-10 h-10 flex items-center justify-center text-white/50 text-2xl">
                                                    <i class="fas ${['fa-caret-up','fa-square','fa-circle','fa-square'][oi]}"></i>
                                                </div>
                                            </div>`;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        
                        <div class="flex gap-6 justify-center mt-12">
                            <button onclick="addQuestion('multi')" class="bg-white border-2 border-purple-900 text-purple-900 px-12 py-5 rounded-[2.5rem] font-black text-xl hover:bg-purple-900 hover:text-white transition-all shadow-xl">שאלת בחירה +</button>
                            <button onclick="addQuestion('tf')" class="bg-white border-2 border-blue-600 text-blue-600 px-12 py-5 rounded-[2.5rem] font-black text-xl hover:bg-blue-600 hover:text-white transition-all shadow-xl">נכון / לא נכון +</button>
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'join') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6">
                    <div class="bg-white p-12 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl animate-pop">
                        <h2 class="text-6xl font-black italic mb-10 text-purple-900">Quizmo!</h2>
                        <div class="relative mb-6">
                            <input id="joinPin" inputmode="numeric" maxlength="6" class="w-full p-6 bg-gray-50 border-4 border-gray-100 rounded-[2rem] text-center text-4xl font-black outline-none focus:border-purple-600 transition-all tracking-widest" placeholder="PIN">
                            <p id="pinError" class="hidden absolute -bottom-8 left-0 right-0 text-red-500 font-bold text-sm"></p>
                        </div>
                        <button onclick="joinGame()" class="w-full bg-black text-white py-6 rounded-[2rem] font-black text-2xl btn-press shadow-xl mt-4">הצטרף!</button>
                        <button onclick="setView('home')" class="mt-8 text-gray-400 font-bold hover:text-gray-600">ביטול</button>
                    </div>
                </div>`;
            } else if (state.view === 'join_nick') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple flex items-center justify-center p-6 text-right">
                    <div class="bg-white p-12 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl">
                        <h2 class="text-3xl font-black mb-4 text-gray-800 underline decoration-purple-500 underline-offset-8">איך יקראו לך?</h2>
                        <p class="text-gray-400 mb-8 font-bold">הכינוי שלך שיופיע על המסך</p>
                        <input id="joinNick" maxlength="15" class="w-full p-6 bg-gray-50 border-4 border-gray-100 rounded-[2rem] text-center text-2xl font-black outline-none focus:border-purple-600 mb-8" placeholder="הכנס כינוי...">
                        <button onclick="enterLobby()" class="w-full kahoot-green text-white py-6 rounded-[2rem] font-black text-2xl btn-press shadow-xl">אני מוכן!</button>
                    </div>
                </div>`;
            } else if (state.view === 'host_lobby') {
                root.innerHTML = `
                <div class="h-screen kahoot-purple text-white flex flex-col text-right">
                    <div class="bg-white text-black py-12 px-6 shadow-2xl flex flex-row-reverse justify-between items-center">
                        <div class="text-right">
                            <p class="font-black text-gray-400 text-lg uppercase tracking-widest mb-1">PIN משחק:</p>
                            <h1 class="text-9xl font-black tracking-tighter leading-none">${state.pin}</h1>
                        </div>
                        <div class="text-center bg-gray-50 p-6 rounded-3xl border shadow-inner">
                            <p class="text-gray-400 font-black mb-2">סרוק להצטרפות:</p>
                            <div class="w-32 h-32 bg-gray-200 rounded-xl flex items-center justify-center text-gray-400">QR</div>
                        </div>
                    </div>
                    <div class="flex-1 p-10 flex flex-col">
                        <div class="flex flex-row-reverse justify-between items-end mb-16">
                            <div>
                                <h2 class="text-5xl font-black mb-2">${state.currentGame?.quiz.title}</h2>
                                <span class="text-2xl opacity-70 font-bold"><i class="fas fa-users ml-3"></i> ${state.players.length} שחקנים</span>
                            </div>
                            <button onclick="startGame()" class="bg-white text-black px-16 py-6 rounded-[2.5rem] font-black text-3xl btn-press shadow-2xl hover:scale-105">התחל משחק!</button>
                        </div>
                        <div class="flex-1 flex flex-wrap gap-6 justify-center content-start overflow-y-auto pr-4">
                            ${state.players.length === 0 ? '<div class="text-4xl opacity-30 mt-20 font-black animate-pulse">מחכה למתמודדים...</div>' : ''}
                            ${state.players.map(p => `<div class="bg-white/10 backdrop-blur-xl border-2 border-white/20 px-10 py-5 rounded-[2rem] text-3xl font-black animate-pop shadow-lg">${p.name}</div>`).join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'player_lobby') {
                root.innerHTML = `
                <div class="h-screen kahoot-green text-white flex flex-col items-center justify-center p-8 text-center">
                    <div class="text-9xl mb-12 animate-bounce drop-shadow-2xl"><i class="fas fa-rocket"></i></div>
                    <h2 class="text-6xl font-black italic mb-6">אתה בפנים!</h2>
                    <p class="text-2xl mb-16 opacity-80 font-bold">השם שלך מופיע על המסך?</p>
                    <div class="bg-black/20 px-16 py-8 rounded-[3rem] text-4xl font-black border-4 border-white/10 shadow-inner">${state.nickname}</div>
                    <p class="mt-20 font-bold opacity-50">המשחק יתחיל בקרוב...</p>
                </div>`;
            } else if (state.currentGame) {
                root.innerHTML = renderGame();
            }
        }

        function renderGame() {
            const g = state.currentGame;
            const q = g.quiz.questions[g.currentQ];
            const isHost = g.hostId === (user?.uid || '');

            if (isHost) {
                if (g.status === 'question') {
                    return `
                    <div class="h-screen flex flex-col bg-white overflow-hidden text-right">
                        <div class="p-10 text-center shadow-xl bg-white z-10 border-b-8 border-gray-100"><h1 class="text-6xl font-black leading-tight">${q.text}</h1></div>
                        <div class="flex-1 flex flex-col items-center justify-center relative bg-gray-50 p-6">
                            <div class="absolute right-16 top-1/2 -translate-y-1/2 text-8xl font-black w-40 h-40 rounded-full border-[12px] border-purple-900 flex items-center justify-center text-purple-900 bg-white shadow-2xl">${state.timeLeft}</div>
                            
                            <div class="max-w-xl w-full">
                                ${q.image ? `<img src="${q.image}" class="w-full h-80 object-contain rounded-[3rem] shadow-2xl bg-white p-4 border-4 border-white">` : `
                                    <div class="w-80 h-80 kahoot-purple rounded-[3rem] mx-auto flex items-center justify-center text-9xl text-white italic font-black shadow-2xl animate-pulse ring-[20px] ring-purple-100">Q</div>
                                `}
                            </div>

                            <div class="absolute left-16 top-1/2 -translate-y-1/2 text-center bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-gray-50">
                                <div class="text-8xl font-black text-purple-900 leading-none">${state.players.filter(p=>p.hasAnswered).length}</div>
                                <div class="font-black text-2xl text-gray-400 mt-4 uppercase">תשובות</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 p-4 h-[35vh]">
                            ${q.opts.map((opt, i) => {
                                let colorClass = `kahoot-${['red','blue','yellow','green'][i]}`;
                                if (q.type === 'tf') colorClass = i === 0 ? 'kahoot-blue' : 'kahoot-red';
                                
                                return `
                                <div class="${colorClass} text-white flex flex-row-reverse items-center px-16 rounded-[2rem] text-4xl font-black shadow-lg">
                                    <i class="fas ${['fa-caret-up','fa-square','fa-circle','fa-square'][i]} ml-10 text-5xl" ${i===1?'style="transform:rotate(45deg)"':''}></i>
                                    <span class="flex-1">${opt}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                }
                if (g.status === 'reveal' || g.status === 'scoreboard') {
                    return `
                    <div class="h-screen kahoot-purple text-white p-16 flex flex-col text-right">
                        <div class="flex flex-row-reverse justify-between items-center mb-16">
                            <div>
                                <h1 class="text-6xl font-black italic">לוח התוצאות</h1>
                                <p class="text-2xl opacity-60 font-bold">מי מוביל את הטבלה?</p>
                            </div>
                            <button onclick="nextStep()" class="bg-white text-black px-16 py-6 rounded-[2.5rem] font-black text-3xl btn-press shadow-2xl">המשך</button>
                        </div>
                        <div class="flex-1 max-w-4xl w-full mx-auto space-y-6 overflow-y-auto pr-6">
                            ${state.players.slice(0,5).map((p, i) => `
                                <div class="bg-white text-black p-8 rounded-[3rem] flex flex-row-reverse justify-between items-center animate-pop shadow-2xl border-b-8 border-gray-100" style="animation-delay:${i*150}ms">
                                    <div class="flex flex-row-reverse items-center gap-10">
                                        <span class="w-16 h-16 flex items-center justify-center bg-purple-100 text-purple-900 rounded-full font-black text-3xl">${i+1}</span>
                                        <span class="text-4xl font-black">${p.name}</span>
                                    </div>
                                    <span class="text-5xl font-black text-purple-900">${p.score}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
                if (g.status === 'podium') {
                    return `
                    <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-12 text-center">
                        <div class="relative mb-20">
                            <i class="fas fa-trophy text-[15rem] text-yellow-400 animate-bounce drop-shadow-[0_20px_50px_rgba(250,204,21,0.5)]"></i>
                            <div class="absolute -top-10 -right-10 text-8xl text-white opacity-20"><i class="fas fa-star"></i></div>
                            <div class="absolute -bottom-10 -left-10 text-8xl text-white opacity-20"><i class="fas fa-star"></i></div>
                        </div>
                        <h1 class="text-9xl font-black mb-6 drop-shadow-2xl">${state.players[0]?.name || 'סוף המשחק'}</h1>
                        <p class="text-4xl opacity-70 mb-20 font-black italic tracking-widest">${state.players[0]?.score || 0} נקודות!</p>
                        <button onclick="location.reload()" class="bg-white text-black px-20 py-8 rounded-[3rem] font-black text-4xl btn-press shadow-2xl hover:scale-110">סיום וחזרה</button>
                    </div>`;
                }
            } else {
                // Player Screen
                if (g.status === 'question') {
                    if (state.myPlayerData?.hasAnswered) {
                        return `
                        <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white p-12 text-center">
                            <div class="spinner !w-20 !h-20 !border-[10px] mb-12"></div>
                            <h2 class="text-5xl font-black italic animate-pulse">תשובה נשלחה!</h2>
                            <p class="mt-6 text-2xl opacity-60 font-bold">היה זה נכון? נגלה בקרוב...</p>
                        </div>`;
                    }
                    if (q.type === 'tf') {
                        return `
                        <div class="h-screen flex flex-col gap-4 p-4 bg-gray-100">
                            <button onclick="submitAnswer(0)" class="flex-1 kahoot-blue rounded-[3rem] flex items-center justify-center active:scale-90 transition-transform shadow-2xl">
                                <i class="fas fa-square text-[150px] text-white" style="transform:rotate(45deg)"></i>
                            </button>
                            <button onclick="submitAnswer(1)" class="flex-1 kahoot-red rounded-[3rem] flex items-center justify-center active:scale-90 transition-transform shadow-2xl">
                                <i class="fas fa-caret-up text-[180px] text-white"></i>
                            </button>
                        </div>`;
                    }
                    return `
                    <div class="h-screen grid grid-cols-2 grid-rows-2 gap-4 p-4 bg-gray-100">
                        ${[0,1,2,3].map(i => `
                            <button onclick="submitAnswer(${i})" class="kahoot-${['red','blue','yellow','green'][i]} rounded-[3rem] flex items-center justify-center active:scale-90 transition-transform shadow-2xl">
                                <i class="fas ${['fa-caret-up','fa-square','fa-circle','fa-square'][i]} text-[130px] text-white" ${i===1?'style="transform:rotate(45deg)"':''}></i>
                            </button>
                        `).join('')}
                    </div>`;
                }
                if (g.status === 'reveal') {
                    const win = state.myPlayerData?.lastCorrect;
                    return `
                    <div class="h-screen ${win ? 'kahoot-green' : 'kahoot-red'} flex flex-col items-center justify-center text-white p-12 text-center">
                        <i class="fas ${win ? 'fa-check-circle' : 'fa-times-circle'} text-[12rem] mb-12 animate-pop drop-shadow-2xl"></i>
                        <h2 class="text-7xl font-black mb-8">${win ? 'מדהים!' : 'אוי לא...'}</h2>
                        <div class="bg-black/20 px-16 py-6 rounded-[2.5rem] text-5xl font-black border-4 border-white/10 shadow-inner">+${state.myPlayerData?.lastPoints || 0}</div>
                    </div>`;
                }
                return `
                <div class="h-screen kahoot-purple flex flex-col items-center justify-center text-white text-center p-12">
                    <h2 class="text-5xl font-black mb-6 italic animate-pulse">הסתכל על המסך!</h2>
                    <p class="text-2xl opacity-60 font-bold">התוצאות מוצגות עכשיו על מסך המארח.</p>
                </div>`;
            }
        }

        init();
    </script>
</body>
</html>
