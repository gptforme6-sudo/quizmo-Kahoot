<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kahoot! Ultimate Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --k-red: #e21b3c; --k-blue: #1368ce; --k-yellow: #d89e00; --k-green: #26890c; --k-purple: #46178f; --k-bg: #f2f2f2;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--k-bg); margin: 0; overflow-x: hidden; }
        .btn-k { box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2); transition: all 0.1s; cursor: pointer; }
        .btn-k:active { box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2); transform: translateY(4px); }
        .bg-animated { background: linear-gradient(45deg, #46178f, #25076b); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        .view-section { display: none; width: 100%; height: 100vh; flex-direction: column; overflow-y: auto; }
        .view-section.active { display: flex; }
        .k-shape { width: 40px; height: 40px; background: white; display: inline-block; }
        .k-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .k-diamond { transform: rotate(45deg); width: 30px; height: 30px; }
        .k-circle { border-radius: 50%; }
        .k-square { }
    </style>
</head>
<body>

    <!-- 1. HOME / PLAYER JOIN -->
    <div id="view-home" class="view-section active bg-animated justify-center items-center p-4">
        <div class="bg-white p-8 rounded shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-5xl font-black text-[#46178f] mb-8 italic italic">Kahoot!</h1>
            <div id="join-step-1">
                <input type="text" id="pin-input" placeholder="Game PIN" class="w-full border-2 border-gray-300 rounded font-bold text-center text-2xl py-3 mb-4 outline-none focus:border-purple-600">
                <button onclick="window.checkPin()" class="w-full bg-black text-white font-bold text-xl py-3 rounded btn-k">Enter</button>
            </div>
            <div id="join-step-2" class="hidden">
                <input type="text" id="nick-input" placeholder="Nickname" class="w-full border-2 border-gray-300 rounded font-bold text-center text-2xl py-3 mb-4 outline-none focus:border-purple-600">
                <button onclick="window.joinGame()" class="w-full bg-black text-white font-bold text-xl py-3 rounded btn-k">OK, go!</button>
            </div>
            <p id="home-error" class="text-red-500 font-bold mt-4 hidden"></p>
        </div>
        <!-- כפתור כניסת מנהל - תוקן -->
        <button onclick="window.goToAdminLogin()" class="absolute bottom-8 text-white/60 hover:text-white font-bold underline">כניסת מנהל משחק</button>
    </div>

    <!-- 2. ADMIN LOGIN -->
    <div id="view-admin-login" class="view-section bg-gray-100 justify-center items-center p-4">
        <div class="bg-white p-8 rounded shadow-xl w-full max-w-sm text-center border-t-8 border-purple-800">
            <h2 class="text-2xl font-bold mb-6">פאנל ניהול</h2>
            <input type="password" id="admin-pass" placeholder="הזן סיסמה (2160)" class="w-full border rounded p-3 mb-4 text-center text-xl">
            <button onclick="window.tryLoginAdmin()" class="w-full bg-purple-800 text-white font-bold py-3 rounded btn-k">היכנס</button>
            <button onclick="window.nav('view-home')" class="mt-4 text-gray-500 text-sm">ביטול</button>
        </div>
    </div>

    <!-- 3. ADMIN DASHBOARD -->
    <div id="view-admin-dash" class="view-section bg-gray-50">
        <nav class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-purple-800 italic">Kahoot! Admin</h1>
            <button onclick="window.nav('view-home')" class="text-gray-600 font-bold">התנתק</button>
        </nav>
        <div class="p-6 max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">החידונים שלי</h2>
                <button onclick="window.createNewQuiz()" class="bg-blue-600 text-white font-bold py-3 px-8 rounded btn-k">צור חידון חדש</button>
            </div>
            <div id="quiz-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Quizzes will be rendered here -->
            </div>
        </div>
    </div>

    <!-- 4. QUIZ EDITOR -->
    <div id="view-admin-editor" class="view-section bg-gray-100">
        <header class="bg-white p-4 shadow flex justify-between items-center">
            <input type="text" id="edit-quiz-title" placeholder="שם החידון..." class="text-xl font-bold border-b-2 outline-none w-1/2">
            <div class="flex gap-2">
                <button onclick="window.nav('view-admin-dash')" class="bg-gray-400 text-white px-4 py-2 rounded">ביטול</button>
                <button onclick="window.saveQuizToDB()" class="bg-green-600 text-white px-6 py-2 rounded font-bold btn-k">שמור חידון</button>
            </div>
        </header>
        <div class="flex flex-grow overflow-hidden">
            <!-- Sidebar Questions -->
            <div id="editor-sidebar" class="w-64 bg-white border-l p-2 overflow-y-auto flex flex-col gap-2"></div>
            <!-- Question Edit Area -->
            <div class="flex-grow p-8 flex flex-col items-center overflow-y-auto">
                <div id="question-editor-card" class="bg-white p-8 rounded shadow-lg w-full max-w-3xl relative">
                    <button onclick="window.removeCurrentQuestion()" class="absolute top-4 left-4 text-red-500 font-bold">🗑️ מחק שאלה</button>
                    <input type="text" id="edit-q-text" placeholder="הקלד את השאלה כאן" class="w-full text-center text-3xl font-bold py-4 border-b-2 mb-8 outline-none" oninput="window.syncQData()">
                    
                    <div class="grid grid-cols-2 gap-4" id="edit-answers-grid"></div>
                </div>
                <button onclick="window.addNewQuestion()" class="mt-6 bg-purple-600 text-white font-bold py-3 px-12 rounded btn-k">➕ הוסף שאלה</button>
            </div>
        </div>
    </div>

    <!-- 5. HOST LOBBY -->
    <div id="view-host-lobby" class="view-section bg-animated">
        <div class="bg-white w-full p-6 flex justify-between items-center shadow-xl">
            <div class="text-3xl font-black">Join at <span class="text-purple-700">Kahoot!</span></div>
            <div class="text-center">
                <p class="text-gray-500 font-bold uppercase text-xs">Game PIN:</p>
                <p class="text-7xl font-black tracking-tighter" id="display-pin">000000</p>
            </div>
            <button id="start-game-btn" onclick="window.startGame()" class="bg-blue-600 text-white px-10 py-4 rounded text-2xl font-bold btn-k opacity-50 pointer-events-none">Start</button>
        </div>
        <div class="flex-grow p-10 flex flex-wrap gap-4 justify-center" id="lobby-players-list"></div>
    </div>

    <!-- 6. HOST GAME -->
    <div id="view-host-game" class="view-section bg-gray-100 p-8">
        <div class="flex flex-col h-full">
            <div id="host-q-text" class="bg-white p-10 rounded shadow text-center text-4xl font-bold mb-8"></div>
            <div class="flex-grow grid grid-cols-2 gap-4" id="host-answers-display"></div>
            <div class="mt-8 flex justify-between items-center bg-white p-4 rounded shadow">
                <div class="text-2xl font-bold">Answers: <span id="ans-count">0</span></div>
                <div class="text-4xl font-black text-purple-700" id="host-timer">20</div>
                <button onclick="window.nextStep()" id="host-next-btn" class="bg-blue-600 text-white px-8 py-3 rounded font-bold hidden">Next</button>
            </div>
        </div>
    </div>

    <!-- 7. PLAYER GAME -->
    <div id="view-player-game" class="view-section p-2 bg-gray-200">
        <div id="player-buttons" class="flex flex-col h-full gap-2"></div>
    </div>

    <!-- 8. PLAYER RESULT -->
    <div id="view-player-result" class="view-section justify-center items-center text-white">
        <h2 id="p-res-title" class="text-6xl font-black mb-4"></h2>
        <p id="p-res-score" class="text-2xl font-bold bg-black/20 px-4 py-2 rounded"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // App State
        let allQuizzes = [];
        let currentQuiz = null;
        let activeQuestionIndex = 0;
        let gamePin = null;
        let isHost = false;
        let userId = null;

        // --- Navigation ---
        window.nav = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.goToAdminLogin = () => {
            document.getElementById('admin-pass').value = '';
            window.nav('view-admin-login');
        };

        // --- Admin Management ---
        window.tryLoginAdmin = () => {
            if(document.getElementById('admin-pass').value === "2160") {
                window.nav('view-admin-dash');
                loadQuizzes();
            } else {
                alert("סיסמה שגויה");
            }
        };

        async function loadQuizzes() {
            if (!userId) return;
            const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'quizzes');
            onSnapshot(qRef, (snap) => {
                allQuizzes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderQuizList();
            });
        }

        function renderQuizList() {
            const list = document.getElementById('quiz-list');
            list.innerHTML = '';
            allQuizzes.forEach(q => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-lg shadow-md border-b-4 border-purple-600";
                div.innerHTML = `
                    <h3 class="text-xl font-bold mb-2">${q.title}</h3>
                    <p class="text-gray-500 mb-4">${q.questions.length} שאלות</p>
                    <div class="flex gap-2">
                        <button onclick="window.editQuiz('${q.id}')" class="flex-1 bg-gray-100 py-2 rounded font-bold">ערוך</button>
                        <button onclick="window.startHost('${q.id}')" class="flex-1 bg-green-600 text-white py-2 rounded font-bold">שחק</button>
                        <button onclick="window.deleteQuiz('${q.id}')" class="p-2 text-red-500">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // --- Editor Logic (THE "FIX") ---
        window.createNewQuiz = () => {
            currentQuiz = {
                title: "חידון חדש",
                questions: [{ text: "", answers: ["", "", "", ""], correct: 0, time: 20 }]
            };
            activeQuestionIndex = 0;
            openEditor();
        };

        window.editQuiz = (id) => {
            const found = allQuizzes.find(q => q.id === id);
            currentQuiz = JSON.parse(JSON.stringify(found)); // Deep copy
            activeQuestionIndex = 0;
            openEditor();
        };

        function openEditor() {
            document.getElementById('edit-quiz-title').value = currentQuiz.title;
            renderEditorSidebar();
            renderQuestionForm();
            window.nav('view-admin-editor');
        }

        function renderEditorSidebar() {
            const sb = document.getElementById('editor-sidebar');
            sb.innerHTML = '';
            currentQuiz.questions.forEach((q, i) => {
                const btn = document.createElement('button');
                btn.className = `p-3 text-right rounded border ${i === activeQuestionIndex ? 'bg-purple-100 border-purple-500 font-bold' : 'bg-gray-50'}`;
                btn.innerText = `שאלה ${i+1}: ${q.text.substring(0, 15)}...`;
                btn.onclick = () => { activeQuestionIndex = i; renderQuestionForm(); renderEditorSidebar(); };
                sb.appendChild(btn);
            });
        }

        function renderQuestionForm() {
            const q = currentQuiz.questions[activeQuestionIndex];
            document.getElementById('edit-q-text').value = q.text;
            const grid = document.getElementById('edit-answers-grid');
            grid.innerHTML = '';
            
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
            q.answers.forEach((ans, i) => {
                const div = document.createElement('div');
                div.className = `${colors[i]} p-4 rounded flex items-center gap-2`;
                div.innerHTML = `
                    <input type="radio" name="correct" ${i === q.correct ? 'checked' : ''} onchange="window.setCorrect(${i})">
                    <input type="text" value="${ans}" class="w-full p-2 rounded text-black font-bold outline-none" placeholder="תשובה ${i+1}" oninput="window.syncAns(${i}, this.value)">
                `;
                grid.appendChild(div);
            });
        }

        window.syncQData = () => { currentQuiz.questions[activeQuestionIndex].text = document.getElementById('edit-q-text').value; renderEditorSidebar(); };
        window.syncAns = (i, val) => { currentQuiz.questions[activeQuestionIndex].answers[i] = val; };
        window.setCorrect = (i) => { currentQuiz.questions[activeQuestionIndex].correct = i; };
        window.addNewQuestion = () => { currentQuiz.questions.push({ text: "", answers: ["", "", "", ""], correct: 0, time: 20 }); activeQuestionIndex = currentQuiz.questions.length-1; openEditor(); };
        window.removeCurrentQuestion = () => { if(currentQuiz.questions.length > 1) { currentQuiz.questions.splice(activeQuestionIndex, 1); activeQuestionIndex = 0; openEditor(); } };

        window.saveQuizToDB = async () => {
            currentQuiz.title = document.getElementById('edit-quiz-title').value;
            const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'quizzes');
            if(currentQuiz.id) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quizzes', currentQuiz.id), currentQuiz);
            } else {
                await addDoc(qRef, currentQuiz);
            }
            window.nav('view-admin-dash');
        };

        window.deleteQuiz = async (id) => {
            if(confirm("למחוק חידון זה?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quizzes', id));
            }
        };

        // --- Hosting ---
        window.startHost = async (quizId) => {
            const quiz = allQuizzes.find(q => q.id === quizId);
            gamePin = Math.floor(100000 + Math.random() * 899999).toString();
            isHost = true;
            
            const gameData = {
                pin: gamePin,
                quiz: quiz,
                state: "LOBBY",
                currentQ: -1,
                players: {},
                timer: 0
            };
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin), gameData);
            document.getElementById('display-pin').innerText = gamePin;
            window.nav('view-host-lobby');
            
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin), (snap) => {
                const data = snap.data();
                if(!data) return;
                
                // Lobby update
                const players = Object.values(data.players || {});
                document.getElementById('lobby-players-list').innerHTML = players.map(p => `<div class="bg-white p-3 rounded font-bold shadow">${p.name}</div>`).join('');
                const sBtn = document.getElementById('start-game-btn');
                if(players.length > 0) { sBtn.classList.remove('opacity-50', 'pointer-events-none'); }
                
                // Game updates
                if(data.state === "QUESTION") {
                    renderHostQuestion(data);
                }
                
                const ansCount = players.filter(p => p.lastAns !== null && p.lastAns !== undefined).length;
                const countEl = document.getElementById('ans-count');
                if(countEl) countEl.innerText = ansCount;
            });
        };

        window.startGame = async () => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin), { state: "QUESTION", currentQ: 0 });
            window.nav('view-host-game');
        };

        function renderHostQuestion(data) {
            const q = data.quiz.questions[data.currentQ];
            document.getElementById('host-q-text').innerText = q.text;
            const container = document.getElementById('host-answers-display');
            container.innerHTML = '';
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
            q.answers.forEach((ans, i) => {
                container.innerHTML += `<div class="${colors[i]} p-8 rounded text-white text-2xl font-bold shadow-lg">${ans}</div>`;
            });
            document.getElementById('host-next-btn').classList.remove('hidden');
        }

        window.nextStep = async () => {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin));
            const data = snap.data();
            if(data.currentQ < data.quiz.questions.length - 1) {
                // Reset player answers for next round
                const updates = { currentQ: data.currentQ + 1 };
                Object.keys(data.players).forEach(pId => {
                    updates[`players.${pId}.lastAns`] = null;
                });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin), updates);
            } else {
                alert("Game Over!");
                window.nav('view-admin-dash');
            }
        };

        // --- Player ---
        window.checkPin = async () => {
            const pin = document.getElementById('pin-input').value;
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin));
            if(snap.exists()) {
                gamePin = pin;
                document.getElementById('join-step-1').classList.add('hidden');
                document.getElementById('join-step-2').classList.remove('hidden');
            } else {
                alert("PIN לא תקין");
            }
        };

        window.joinGame = async () => {
            const name = document.getElementById('nick-input').value;
            if(!name) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin), {
                [`players.${auth.currentUser.uid}`]: { name, score: 0, lastAns: null }
            });
            window.nav('view-player-game');
            document.getElementById('player-buttons').innerHTML = `<div class="h-full flex items-center justify-center text-2xl font-bold">ממתין להתחלת המשחק...</div>`;
            
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin), (snap) => {
                const data = snap.data();
                if(data.state === "QUESTION") {
                    renderPlayerButtons(data);
                }
            });
        };

        function renderPlayerButtons(data) {
            window.nav('view-player-game');
            const me = data.players[auth.currentUser.uid];
            if(me.lastAns !== null && me.lastAns !== undefined) {
                document.getElementById('player-buttons').innerHTML = `<div class="h-full flex items-center justify-center text-2xl font-bold text-purple-800">תשובה נשלחה! ממתין...</div>`;
                return;
            }
            
            const q = data.quiz.questions[data.currentQ];
            const container = document.getElementById('player-buttons');
            container.innerHTML = '';
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
            const shapes = ['triangle', 'diamond', 'circle', 'square'];
            
            q.answers.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = `${colors[i]} flex-grow rounded flex items-center justify-center btn-k`;
                btn.innerHTML = `<div class="k-shape k-${shapes[i]} scale-150"></div>`;
                btn.onclick = () => window.submitAnswer(i);
                container.appendChild(btn);
            });
        }

        window.submitAnswer = async (idx) => {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gamePin);
            const snap = await getDoc(gameRef);
            const data = snap.data();
            const q = data.quiz.questions[data.currentQ];
            const isCorrect = idx === q.correct;
            const currentScore = data.players[auth.currentUser.uid].score;
            
            await updateDoc(gameRef, {
                [`players.${auth.currentUser.uid}.lastAns`]: idx,
                [`players.${auth.currentUser.uid}.score`]: isCorrect ? currentScore + 1000 : currentScore
            });
            
            window.nav('view-player-result');
            document.getElementById('view-player-result').className = `view-section active justify-center items-center text-white ${isCorrect ? 'bg-green-500' : 'bg-red-500'}`;
            document.getElementById('p-res-title').innerText = isCorrect ? "Correct!" : "Wrong";
            document.getElementById('p-res-score').innerText = `Score: ${isCorrect ? currentScore + 1000 : currentScore}`;
        };

        // Initial Auth
        onAuthStateChanged(auth, async (user) => {
            if(!user) {
                await signInAnonymously(auth);
            } else {
                userId = user.uid;
                loadQuizzes();
            }
        });

    </script>
</body>
</html>
