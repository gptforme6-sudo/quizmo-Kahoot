<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Ultimate - HTML Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body {
            font-family: 'Heebo', sans-serif;
            overflow-x: hidden;
            background-color: #f2f2f2;
        }
        .shape-icon { font-size: 3rem; drop-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* Kahoot Colors */
        .theme-red { background-color: #e21b3c; border-color: #e21b3c; }
        .theme-red-shadow { box-shadow: 0 6px 0 #b3152f; }
        .theme-blue { background-color: #1368ce; border-color: #1368ce; }
        .theme-blue-shadow { box-shadow: 0 6px 0 #0c4891; }
        .theme-yellow { background-color: #d89e00; border-color: #d89e00; }
        .theme-yellow-shadow { box-shadow: 0 6px 0 #8f6900; }
        .theme-green { background-color: #26890c; border-color: #26890c; }
        .theme-green-shadow { box-shadow: 0 6px 0 #195c08; }
        .theme-purple { background-color: #46178f; }

        /* Animations */
        @keyframes pulse-fast {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-fast { animation: pulse-fast 1.5s infinite; }
        
        @keyframes slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
        
        @keyframes bounce-in {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-bounce-in { animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "firebase/auth";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query } from "firebase/firestore";

        // --- Firebase Configuration ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "quizmo-kahoot.firebaseapp.com",
            projectId: "quizmo-kahoot",
            storageBucket: "quizmo-kahoot.firebasestorage.app",
            messagingSenderId: "738657082184",
            appId: "1:738657082184:web:076d9ccf27706d356bb17d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-dvir-html-pro';

        // --- Global State ---
        window.state = {
            user: null,
            view: 'home',
            isMuted: false,
            pin: '',
            nickname: '',
            players: [],
            quizzes: [],
            gameState: null,
            myPlayerState: null,
            editingQuiz: null,
            timerInterval: null,
            timeLeft: 0
        };

        const THEMES = [
            { id: 'red', bg: 'theme-red', shadow: 'theme-red-shadow', icon: '<i class="fas fa-caret-up shape-icon"></i>' },
            { id: 'blue', bg: 'theme-blue', shadow: 'theme-blue-shadow', icon: '<i class="fas fa-square shape-icon" style="transform: rotate(45deg);"></i>' },
            { id: 'yellow', bg: 'theme-yellow', shadow: 'theme-yellow-shadow', icon: '<i class="fas fa-circle shape-icon"></i>' },
            { id: 'green', bg: 'theme-green', shadow: 'theme-green-shadow', icon: '<i class="fas fa-square shape-icon"></i>' }
        ];

        // --- Audio Engine ---
        const playNote = (freq, type, duration, volume = 0.1) => {
            if (window.state.isMuted) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        window.toggleMute = () => {
            window.state.isMuted = !window.state.isMuted;
            render();
        };

        const playSound = (type) => {
            if(window.state.isMuted) return;
            switch(type) {
                case 'join': playNote(440, 'sine', 0.1); setTimeout(() => playNote(660, 'sine', 0.2), 100); break;
                case 'start': playNote(440, 'square', 0.2); setTimeout(() => playNote(880, 'square', 0.4), 200); break;
                case 'tick': playNote(880, 'sine', 0.05, 0.05); break;
                case 'correct': playNote(523.25, 'triangle', 0.1); setTimeout(() => playNote(659.25, 'triangle', 0.1), 100); setTimeout(() => playTone(783.99, 'triangle', 0.3), 200); break;
                case 'wrong': playNote(300, 'sawtooth', 0.3); setTimeout(() => playNote(250, 'sawtooth', 0.4), 250); break;
            }
        };

        // --- Listeners & Init ---
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        
        onAuthStateChanged(auth, (user) => {
            window.state.user = user;
            if(user) {
                setupAdminListeners();
                if(window.state.pin) setupGameListeners(window.state.pin);
            }
            render();
        });

        initAuth();

        let unsubQuizzes = null;
        let unsubGame = null;
        let unsubPlayers = null;

        function setupAdminListeners() {
            if (unsubQuizzes) unsubQuizzes();
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'quizzes');
            unsubQuizzes = onSnapshot(q, (s) => {
                const list = [];
                s.forEach(d => list.push({ id: d.id, ...d.data() }));
                window.state.quizzes = list;
                if(window.state.view === 'dashboard') render();
            });
        }

        function setupGameListeners(pin) {
            if (unsubGame) unsubGame();
            if (unsubPlayers) unsubPlayers();

            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', pin);
            unsubGame = onSnapshot(gameRef, (s) => {
                if (s.exists()) {
                    window.state.gameState = s.data();
                    handleGameLogic();
                    render();
                }
            });

            const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            unsubPlayers = onSnapshot(playersCol, (s) => {
                const list = [];
                s.forEach(d => {
                    if (d.data().pin === pin) list.push({ id: d.id, ...d.data() });
                });
                list.sort((a, b) => (b.score || 0) - (a.score || 0));
                window.state.players = list;
                
                const me = list.find(p => p.id === window.state.user.uid);
                if (me) window.state.myPlayerState = me;
                
                handleGameLogic();
                render();
            });
        }

        function handleGameLogic() {
            const { gameState, players, user } = window.state;
            if (!gameState || !user) return;

            // Host timer logic
            if (gameState.hostId === user.uid && gameState.status === 'question') {
                const q = gameState.quiz.questions[gameState.currentQuestionIndex];
                const answeredCount = players.filter(p => p.hasAnswered).length;
                
                // Start or update timer
                if (!window.state.timerInterval) {
                    window.state.timerInterval = setInterval(() => {
                        if (window.state.gameState?.status !== 'question') {
                            clearInterval(window.state.timerInterval);
                            window.state.timerInterval = null;
                            return;
                        }
                        const timeTaken = Math.floor((Date.now() - window.state.gameState.questionStartTime) / 1000);
                        let diff = Math.max(0, q.time - timeTaken);
                        window.state.timeLeft = diff;
                        
                        if (diff > 0 && diff <= 5) playSound('tick');
                        
                        // Auto skip if time is up OR everyone answered
                        const currentAnswered = window.state.players.filter(p => p.hasAnswered).length;
                        if (diff === 0 || (currentAnswered > 0 && currentAnswered === window.state.players.length)) {
                            clearInterval(window.state.timerInterval);
                            window.state.timerInterval = null;
                            window.nextStep();
                        } else {
                            render(); // update timer UI
                        }
                    }, 1000);
                }
            }
        }

        // --- Actions ---
        window.setView = (view) => {
            window.state.view = view;
            render();
        };

        window.handleLogin = () => {
            const pass = document.getElementById('adminPass').value;
            if (pass === '2160') {
                window.setView('dashboard');
            } else {
                alert("גישה נדחתה: סיסמה שגויה");
            }
        };

        window.createNewQuiz = () => {
            window.state.editingQuiz = { title: '', questions: [] };
            window.setView('editor');
        };

        window.editQuiz = (id) => {
            window.state.editingQuiz = JSON.parse(JSON.stringify(window.state.quizzes.find(q => q.id === id)));
            window.setView('editor');
        };

        window.deleteQuiz = async (id) => {
            if(confirm('למחוק את החידון?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quizzes', id));
            }
        };

        window.addQuestion = () => {
            window.scrapeEditorData();
            window.state.editingQuiz.questions.push({ text: '', type: 'multi', opts: ['', '', '', ''], correct: 0, time: 20, doublePoints: false, image: '' });
            render();
        };

        window.deleteQuestion = (idx) => {
            window.scrapeEditorData();
            window.state.editingQuiz.questions.splice(idx, 1);
            render();
        };

        window.setQuestionType = (idx, type) => {
            window.scrapeEditorData();
            window.state.editingQuiz.questions[idx].type = type;
            if (type === 'tf') {
                window.state.editingQuiz.questions[idx].opts = ['אמת', 'שקר'];
                window.state.editingQuiz.questions[idx].correct = 0;
            } else {
                window.state.editingQuiz.questions[idx].opts = ['', '', '', ''];
            }
            render();
        };

        window.setCorrectAnswer = (qIdx, optIdx) => {
            window.scrapeEditorData();
            window.state.editingQuiz.questions[qIdx].correct = optIdx;
            render();
        };

        window.scrapeEditorData = () => {
            const quiz = window.state.editingQuiz;
            quiz.title = document.getElementById('quizTitle').value;
            quiz.questions.forEach((q, idx) => {
                q.text = document.getElementById(`q_text_${idx}`).value;
                q.time = parseInt(document.getElementById(`q_time_${idx}`).value) || 20;
                q.image = document.getElementById(`q_img_${idx}`).value;
                q.doublePoints = document.getElementById(`q_dbl_${idx}`).checked;
                
                if(q.type === 'multi') {
                    for(let i=0; i<4; i++) {
                        q.opts[i] = document.getElementById(`q_opt_${idx}_${i}`).value;
                    }
                }
            });
        };

        window.saveQuiz = async () => {
            window.scrapeEditorData();
            const quizData = window.state.editingQuiz;
            if(!quizData.title) return alert("חובה להזין שם לחידון");
            if(quizData.questions.length === 0) return alert("חובה להוסיף לפחות שאלה אחת");

            const col = collection(db, 'artifacts', appId, 'public', 'data', 'quizzes');
            if (quizData.id) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quizzes', quizData.id), quizData);
            } else {
                await addDoc(col, { ...quizData, createdAt: Date.now() });
            }
            window.setView('dashboard');
        };

        window.hostGame = async (quizId) => {
            const quiz = window.state.quizzes.find(q => q.id === quizId);
            const newPin = Math.floor(100000 + Math.random() * 899999).toString();
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', newPin);
            await setDoc(gameRef, {
                pin: newPin,
                quiz: quiz,
                status: 'lobby',
                currentQuestionIndex: 0,
                questionStartTime: 0,
                hostId: window.state.user.uid
            });
            window.state.pin = newPin;
            setupGameListeners(newPin);
            window.setView('host_lobby');
        };

        window.joinGame = async () => {
            const p = document.getElementById('joinPin').value;
            const n = document.getElementById('joinNick').value;
            if (!p || !n) return alert("הכנס PIN וכינוי");
            
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', p);
            const snap = await getDoc(gameRef);
            if (!snap.exists()) return alert("הקוד שגוי או שהמשחק לא פעיל");
            
            window.state.pin = p;
            window.state.nickname = n;
            setupGameListeners(p);

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', window.state.user.uid), {
                id: window.state.user.uid,
                pin: p,
                name: n,
                score: 0,
                hasAnswered: false,
                needsNameChange: false
            });
            playSound('join');
            window.setView('player_waiting');
        };

        window.kickPlayer = async (pid) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', pid), {
                needsNameChange: true
            });
        };

        window.updatePlayerName = async () => {
            const newName = document.getElementById('newNameInput').value;
            if(!newName) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', window.state.user.uid), { 
                name: newName, 
                needsNameChange: false 
            });
            window.state.nickname = newName;
        };

        window.startGame = async () => {
            playSound('start');
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', window.state.pin), {
                status: 'question',
                currentQuestionIndex: 0,
                questionStartTime: Date.now()
            });
        };

        window.nextStep = async () => {
            const { gameState, pin, players } = window.state;
            const isLast = gameState.currentQuestionIndex + 1 >= gameState.quiz.questions.length;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'games', pin);
            
            if (gameState.status === 'question') {
                await updateDoc(ref, { status: 'results' });
            } else if (gameState.status === 'results') {
                await updateDoc(ref, { status: 'leaderboard' });
            } else if (gameState.status === 'leaderboard') {
                if (isLast) {
                    await updateDoc(ref, { status: 'podium' });
                } else {
                    for (let p of players) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id), {
                            hasAnswered: false,
                            lastAnswerCorrect: null
                        });
                    }
                    await updateDoc(ref, {
                        status: 'question',
                        currentQuestionIndex: gameState.currentQuestionIndex + 1,
                        questionStartTime: Date.now()
                    });
                }
            }
        };

        window.submitAnswer = async (idx) => {
            const { myPlayerState, gameState, user, pin } = window.state;
            if (myPlayerState?.hasAnswered || gameState.status !== 'question') return;
            
            const q = gameState.quiz.questions[gameState.currentQuestionIndex];
            const isCorrect = idx === q.correct;
            const timeTaken = Date.now() - gameState.questionStartTime;
            
            // Speed bonus calculation (max 1000 bonus points)
            const maxTimeMs = q.time * 1000;
            const speedRatio = Math.max(0, 1 - (timeTaken / maxTimeMs));
            const bonus = Math.floor(speedRatio * 500);
            
            const basePoints = q.doublePoints ? 2000 : 1000;
            const points = isCorrect ? basePoints + bonus : 0;
            
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                hasAnswered: true,
                lastAnswerIndex: idx,
                lastAnswerCorrect: isCorrect,
                lastPointsGained: points,
                score: (myPlayerState.score || 0) + points
            });
        };

        // --- Render System ---
        function render() {
            const appDiv = document.getElementById('app');
            const { view, user } = window.state;

            if (!user) {
                appDiv.innerHTML = `<div class="h-screen flex items-center justify-center text-2xl font-bold bg-gray-100 text-gray-500">מתחבר למערכת...</div>`;
                return;
            }

            // Mute Button HTML
            const muteBtn = `
                <button onclick="window.toggleMute()" class="fixed top-4 left-4 z-50 p-3 bg-white/80 backdrop-blur rounded-full shadow-lg hover:bg-white transition">
                    <i class="fas ${window.state.isMuted ? 'fa-volume-mute text-red-500' : 'fa-volume-up text-blue-500'} text-xl"></i>
                </button>
            `;

            let html = muteBtn;

            switch(view) {
                case 'home': html += renderHome(); break;
                case 'login': html += renderLogin(); break;
                case 'dashboard': html += renderDashboard(); break;
                case 'editor': html += renderEditor(); break;
                case 'join': html += renderJoin(); break;
                case 'host_lobby': html += renderHostLobby(); break;
                case 'host_game': html += renderHostGame(); break;
                case 'player_waiting': html += renderPlayerWaiting(); break;
                case 'player_game': html += renderPlayerGame(); break;
            }

            // To avoid losing focus on input during updates, we use innerHTML safely. 
            // Editor handles state scraping before re-rendering.
            appDiv.innerHTML = html;
            
            // Post-render actions (like setting focus or keeping input values if needed)
            if(view === 'editor') restoreEditorValues();
        }

        // --- View Renderers ---
        function renderHome() {
            return `
            <div class="h-screen theme-purple flex flex-col items-center justify-center p-6 text-white text-center">
                <h1 class="text-8xl md:text-9xl font-black italic mb-12 drop-shadow-2xl animate-pulse-fast">Quizmo!</h1>
                <div class="w-full max-w-sm flex flex-col gap-6">
                    <button onclick="window.setView('join')" class="bg-white text-black py-6 rounded-2xl text-4xl font-black shadow-[0_8px_0_#ccc] active:translate-y-2 active:shadow-none transition-all">הצטרפות</button>
                    <button onclick="window.setView('login')" class="theme-blue text-white py-4 rounded-2xl text-2xl font-bold theme-blue-shadow active:translate-y-2 active:shadow-none transition-all mt-4">
                        <i class="fas fa-cog"></i> ניהול דביר
                    </button>
                </div>
            </div>`;
        }

        function renderLogin() {
            return `
            <div class="h-screen theme-purple flex items-center justify-center p-4">
                <div class="bg-white p-10 rounded-[30px] w-full max-w-sm shadow-2xl text-center animate-bounce-in">
                    <h2 class="text-3xl font-black mb-8 text-gray-800">היי דביר, סיסמה?</h2>
                    <input type="password" id="adminPass" class="w-full p-4 bg-gray-100 rounded-xl mb-6 text-center text-2xl font-bold outline-none border-4 border-transparent focus:border-purple-500 transition-colors" placeholder="****" />
                    <button onclick="window.handleLogin()" class="w-full theme-purple text-white py-4 rounded-xl font-black text-2xl shadow-lg hover:opacity-90">כניסה</button>
                    <button onclick="window.setView('home')" class="mt-6 text-gray-400 font-bold hover:text-gray-600">ביטול</button>
                </div>
            </div>`;
        }

        function renderDashboard() {
            const { quizzes } = window.state;
            let listHtml = quizzes.map(q => `
                <div class="bg-white p-6 rounded-2xl shadow-lg border-r-[12px] border-purple-600 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-right w-full md:w-auto">
                        <h3 class="text-3xl font-black text-gray-800">${q.title}</h3>
                        <p class="text-gray-400 font-bold text-xl">${q.questions.length} שאלות</p>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto justify-end">
                        <button onclick="window.editQuiz('${q.id}')" class="p-4 bg-amber-500 text-white rounded-xl shadow-[0_4px_0_#b48608] hover:translate-y-1 hover:shadow-none transition-all"><i class="fas fa-edit text-xl"></i></button>
                        <button onclick="window.deleteQuiz('${q.id}')" class="p-4 bg-red-500 text-white rounded-xl shadow-[0_4px_0_#b91c1c] hover:translate-y-1 hover:shadow-none transition-all"><i class="fas fa-trash text-xl"></i></button>
                        <button onclick="window.hostGame('${q.id}')" class="theme-blue text-white px-8 py-4 rounded-xl font-black text-xl theme-blue-shadow hover:translate-y-1 hover:shadow-none transition-all flex items-center gap-2"><i class="fas fa-play"></i> הפעל</button>
                    </div>
                </div>
            `).join('');

            if(quizzes.length === 0) listHtml = `<div class="text-center text-gray-400 font-bold text-2xl py-20">אין לך עדיין חידונים. צור אחד חדש!</div>`;

            return `
            <div class="min-h-screen bg-gray-50 p-6 md:p-12">
                <div class="max-w-5xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-12 bg-white p-8 rounded-[30px] shadow-sm gap-6">
                        <div class="text-right w-full">
                            <h1 class="text-5xl font-black text-purple-900 mb-2">החידונים שלי</h1>
                            <p class="text-gray-400 font-bold text-xl">מערכת הניהול של דביר</p>
                        </div>
                        <button onclick="window.createNewQuiz()" class="theme-green w-full md:w-auto text-white px-10 py-4 rounded-xl font-black text-2xl theme-green-shadow hover:translate-y-1 hover:shadow-none transition-all whitespace-nowrap"><i class="fas fa-plus"></i> צור חידון</button>
                        <button onclick="window.setView('home')" class="bg-gray-200 text-gray-600 px-6 py-4 rounded-xl font-bold hover:bg-gray-300">חזור</button>
                    </div>
                    <div class="grid gap-6">
                        ${listHtml}
                    </div>
                </div>
            </div>`;
        }

        function renderEditor() {
            const qz = window.state.editingQuiz;
            let qsHtml = qz.questions.map((q, idx) => {
                let optsHtml = '';
                if (q.type === 'tf') {
                    optsHtml = `
                        <div class="grid grid-cols-2 gap-4">
                            <div class="flex flex-col gap-2">
                                <div onclick="window.setCorrectAnswer(${idx}, 0)" class="cursor-pointer flex items-center p-4 rounded-xl border-4 ${q.correct === 0 ? 'theme-blue border-blue-600 text-white' : 'border-gray-200 bg-white'} transition-colors">
                                    <div class="w-8 h-8 rounded-full border-4 ${q.correct === 0 ? 'border-white bg-white' : 'border-gray-300'} ml-4"></div>
                                    <span class="text-2xl font-black flex-1 text-center">אמת</span>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">

                const points = myPlayerState?.lastPointsGained || 0;
                
                // Play sound once when entering results
                if(!window._soundPlayedForQuestion || window._soundPlayedForQuestion !== gameState.currentQuestionIndex) {
                    if (myPlayerState?.hasAnswered) playSound(isCorrect ? 'correct' : 'wrong');
                    window._soundPlayedForQuestion = gameState.currentQuestionIndex;
                }

                return `
                <div class="h-screen flex flex-col items-center justify-center text-white text-center p-6 ${isCorrect ? 'theme-green' : 'theme-red'}">
                    <div class="animate-bounce-in">
                        <h2 class="text-7xl font-black mb-8">${isCorrect ? 'נכון!' : 'טעות!'}</h2>
                        <div class="bg-black/20 p-8 rounded-[30px] border-4 border-white/10 shadow-xl inline-block">
                            <div class="text-2xl font-bold opacity-90 mb-2">צברת בשאלה הזו:</div>
                            <div class="text-6xl font-black">+${points}</div>
                        </div>
                        <div class="mt-12 bg-white/20 px-6 py-2 rounded-full inline-block text-2xl font-bold italic">הסתכל על המסך הראשי...</div>
                    </div>
                </div>`;
            }

            if (gameState.status === 'leaderboard' || gameState.status === 'podium') {
                const rank = players.findIndex(p => p.id === user.uid) + 1;
                return `
                <div class="h-screen theme-purple flex flex-col items-center justify-center text-white p-10 text-center relative overflow-hidden">
                    <div class="z-10 animate-slide-up">
                        <h2 class="text-3xl font-bold mb-4 opacity-80">הדירוג שלך:</h2>
                        <div class="text-[150px] font-black leading-none mb-6 text-yellow-400 drop-shadow-2xl">#${rank}</div>
                        <div class="text-4xl font-black opacity-90 mb-10">${nickname}</div>
                        <div class="bg-black/30 px-10 py-5 rounded-full text-3xl font-bold border-2 border-white/20">סך הכל: ${myPlayerState?.score || 0} נק'</div>
                    </div>
                    ${rank <= 3 && gameState.status === 'podium' ? '<div class="absolute inset-0 bg-[url(\'data:image/svg+xml;utf8,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' viewBox=\\\'0 0 100 100\\\'><text y=\\\'1em\\\' font-size=\\\'80\\\'>🎉</text></svg>\')] opacity-10 mix-blend-overlay" style="background-size: 150px;"></div>' : ''}
                </div>`;
            }

            return '';
        }

    </script>
</body>
</html>
