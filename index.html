<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quizmo - The Ultimate Quiz</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- Firebase Imports -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Rubik:wght@400;700;900&display=swap');
        
        :root {
            --kahoot-red: #e21b3c;
            --kahoot-blue: #1368ce;
            --kahoot-yellow: #d89e00;
            --kahoot-green: #26890c;
            --kahoot-purple: #46178f;
        }

        body { 
            font-family: 'Rubik', sans-serif; 
            background: #f2f2f2;
            margin: 0;
            overflow-x: hidden;
        }

        .bg-lobby { 
            background: linear-gradient(135deg, #46178f, #250a4d, #6a2cc9); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .k-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .k-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0);
        }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--kahoot-purple); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen">
        <div class="h-screen flex flex-col items-center justify-center bg-lobby text-white text-center p-6">
            <div class="loader mb-4"></div>
            <h1 class="text-4xl font-black mb-2 animate-pulse">Quizmo</h1>
            <p id="boot-status" class="opacity-70">מכין את סביבת המשחק...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "firebase/firestore";

        // הגדרות ברירת מחדל למניעת קריסה בגיטהאב
        const fallbackConfig = { apiKey: "demo", projectId: "demo" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quizmo_default';
        
        let app, auth, db, currentUser;
        let isDemoMode = false;

        async function initApp() {
            const status = document.getElementById('boot-status');
            try {
                let config;
                // בדיקה אם אנחנו בסביבת פיתוח עם Firebase מוכן
                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                } else {
                    // אנחנו בגיטהאב - ננסה לבדוק אם המשתמש הזין נתונים ידנית
                    config = fallbackConfig;
                    isDemoMode = true;
                }

                if (isDemoMode) {
                    status.innerHTML = "מצב תצוגה בלבד (Demo Mode)<br><span class='text-sm opacity-50'>כדי לשחק עם חברים בגיטהאב, יש לחבר Firebase בקוד.</span>";
                    setTimeout(() => renderHome(), 1500);
                    return;
                }

                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        renderHome();
                    }
                });
            } catch (e) {
                console.warn("Firebase Init bypassed", e);
                renderHome(); // בכל מקרה נציג את הבית ולא שגיאה
            }
        }

        function renderHome() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="h-screen bg-lobby flex flex-col items-center justify-center p-4">
                    <h1 class="text-7xl font-black italic mb-10 drop-shadow-lg text-white">Quizmo!</h1>
                    <div class="w-full max-w-sm space-y-4">
                        <button onclick="alert('במצב גיטהאב ללא שרת, הצטרפות חסומה. יש להגדיר Firebase.')" class="k-btn w-full bg-white text-gray-900 py-5 rounded-md text-2xl font-black">
                            הצטרפות למשחק
                        </button>
                        <button onclick="showAdmin()" class="w-full text-white/70 hover:text-white font-bold text-lg underline">
                            כניסת מנהל (דביר)
                        </button>
                    </div>
                    ${isDemoMode ? '<div class="mt-10 bg-yellow-400 text-black px-4 py-2 rounded-full font-bold text-sm">פועל במצב תצוגה (ללא שרת)</div>' : ''}
                </div>
            `;
        }

        window.showAdmin = () => {
            const pin = prompt("הכנס קוד גישה למנהל (2160):");
            if(pin === '2160') {
                document.getElementById('app').innerHTML = `
                    <div class="p-10 text-center bg-white h-screen">
                        <h2 class="text-3xl font-black mb-6 text-purple-900">ברוך הבא דביר</h2>
                        <p class="mb-6">המשחק מוכן לעבודה! בגיטהאב, כדי לשמור חידונים, עליך להדביק את המפתחות שקיבלת מ-Firebase בקוד המקור.</p>
                        <button onclick="location.reload()" class="bg-gray-200 px-6 py-2 rounded font-bold">חזרה</button>
                    </div>
                `;
            } else {
                alert("קוד שגוי");
            }
        };

        initApp();
    </script>
</body>
</html>
