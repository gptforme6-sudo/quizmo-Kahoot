<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizmo Pro - Dvir Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f2f2f2; margin: 0; padding: 0; overflow-x: hidden; }
        .animate-bounce-short { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .custom-shadow { shadow-[0_6px_0_#ccc]; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, getDocs, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyAQpMXfKu7RJxdoeJl-keBtrUz23ZvnH80",
            authDomain: "quizmo-kahoot.firebaseapp.com",
            projectId: "quizmo-kahoot",
            storageBucket: "quizmo-kahoot.firebasestorage.app",
            messagingSenderId: "738657082184",
            appId: "1:738657082184:web:076d9ccf27706d356bb17d"
        };

        const app = initializeApp(firebaseConfig);
        window.fbAuth = getAuth(app);
        window.fbDb = getFirestore(app);
        window.fbMethods = { 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged, 
            doc, setDoc, getDoc, collection, onSnapshot, getDocs, addDoc, updateDoc, deleteDoc 
        };
        window.__app_id_val = typeof __app_id !== 'undefined' ? __app_id : 'quizmo-default';
        window.__initial_token_val = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const COLORS = [
            { id: 0, name: 'red', bg: 'bg-[#e21b3c]', hover: 'hover:bg-[#c01733]', icon: '▲' },
            { id: 1, name: 'blue', bg: 'bg-[#1368ce]', hover: 'hover:bg-[#105ab3]', icon: '◆' },
            { id: 2, name: 'yellow', bg: 'bg-[#d89e00]', hover: 'hover:bg-[#b88700]', icon: '●' },
            { id: 3, name: 'green', bg: 'bg-[#26890c]', hover: 'hover:bg-[#20750a]', icon: '■' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [pin, setPin] = useState('');
            const [nickname, setNickname] = useState('');
            const [players, setPlayers] = useState([]);
            const [savedQuizzes, setSavedQuizzes] = useState([]);
            const [loginName, setLoginName] = useState('');
            const [loginPass, setLoginPass] = useState('');
            
            // Edit/Create State
            const [editingQuizId, setEditingQuizId] = useState(null);
            const [quizTitle, setQuizTitle] = useState('');
            const [questions, setQuestions] = useState([{ id: Date.now(), text: '', opts: ['', '', '', ''], correct: 0 }]);

            const { fbAuth, fbDb, fbMethods } = window;
            const appId = window.__app_id_val;

            // Auth Logic
            useEffect(() => {
                const initAuth = async () => {
                    if (window.__initial_token_val) {
                        await fbMethods.signInWithCustomToken(fbAuth, window.__initial_token_val);
                    } else {
                        await fbMethods.signInAnonymously(fbAuth);
                    }
                };
                
                if (fbAuth) {
                    initAuth();
                    const unsub = fbMethods.onAuthStateChanged(fbAuth, (u) => setUser(u));
                    return () => unsub();
                }
            }, []);

            // Sync Players in Lobby
            useEffect(() => {
                if (!user || !pin || view !== 'host_lobby') return;
                
                const playersCol = fbMethods.collection(fbDb, 'artifacts', appId, 'public', 'data', 'players');
                const unsub = fbMethods.onSnapshot(playersCol, (s) => {
                    const pList = [];
                    s.forEach(d => { 
                        if (d.data().pin === pin) pList.push({id: d.id, ...d.data()}); 
                    });
                    setPlayers(pList);
                }, (err) => console.error("Snapshot error:", err));
                
                return () => unsub();
            }, [user, pin, view]);

            const fetchQuizzes = async () => {
                const quizzesCol = fbMethods.collection(fbDb, 'artifacts', appId, 'public', 'data', 'quizzes');
                const s = await fbMethods.getDocs(quizzesCol);
                const list = [];
                s.forEach(d => list.push({id: d.id, ...d.data()}));
                setSavedQuizzes(list);
            };

            const handleLogin = async () => {
                if (loginName === 'דביר' && loginPass === '2160') {
                    await fetchQuizzes();
                    setView('dashboard');
                } else {
                    alert("פרטי גישה שגויים");
                }
            };

            const handleSaveQuiz = async () => {
                if (!quizTitle || questions.some(q => !q.text)) return alert("מלא את כל הפרטים");
                const quizzesCol = fbMethods.collection(fbDb, 'artifacts', appId, 'public', 'data', 'quizzes');
                
                const quizData = {
                    title: quizTitle,
                    questions,
                    updatedAt: Date.now()
                };

                if (editingQuizId) {
                    const quizDoc = fbMethods.doc(fbDb, 'artifacts', appId, 'public', 'data', 'quizzes', editingQuizId);
                    await fbMethods.updateDoc(quizDoc, quizData);
                } else {
                    quizData.createdAt = Date.now();
                    await fbMethods.addDoc(quizzesCol, quizData);
                }
                
                setEditingQuizId(null);
                setQuizTitle('');
                setQuestions([{ id: Date.now(), text: '', opts: ['', '', '', ''], correct: 0 }]);
                await fetchQuizzes();
                setView('dashboard');
            };

            const handleEditQuiz = (q) => {
                setEditingQuizId(q.id);
                setQuizTitle(q.title);
                setQuestions(q.questions);
                setView('create');
            };

            const handleDeleteQuiz = async (id) => {
                if (confirm("האם אתה בטוח שברצונך למחוק את החידון?")) {
                    const quizDoc = fbMethods.doc(fbDb, 'artifacts', appId, 'public', 'data', 'quizzes', id);
                    await fbMethods.deleteDoc(quizDoc);
                    await fetchQuizzes();
                }
            };

            const startHosting = async (q) => {
                const newPin = Math.floor(100000 + Math.random() * 899999).toString();
                const gameDoc = fbMethods.doc(fbDb, 'artifacts', appId, 'public', 'data', 'games', newPin);
                await fbMethods.setDoc(gameDoc, { 
                    status: 'lobby', 
                    quiz: q,
                    hostId: user.uid,
                    createdAt: Date.now()
                });
                setPin(newPin);
                setView('host_lobby');
            };

            const handleJoinGame = async () => {
                if (!pin || !nickname) return alert("הכנס קוד וכינוי");
                
                const gameDoc = fbMethods.doc(fbDb, 'artifacts', appId, 'public', 'data', 'games', pin);
                const snap = await fbMethods.getDoc(gameDoc);
                
                if (snap.exists()) {
                    const playerDoc = fbMethods.doc(fbDb, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                    await fbMethods.setDoc(playerDoc, { 
                        name: nickname, 
                        pin: pin, 
                        score: 0,
                        joinedAt: Date.now()
                    });
                    setView('player_wait');
                } else {
                    alert("קוד PIN לא נמצא במערכת");
                }
            };

            // Views
            if (view === 'home') return (
                <div className="h-screen bg-[#46178f] flex flex-col items-center justify-center text-white text-center">
                    <h1 className="text-8xl font-black mb-12 drop-shadow-2xl animate-bounce-short">Quizmo!</h1>
                    <div className="flex flex-col gap-5 w-72">
                        <button onClick={() => setView('join')} className="bg-white text-black py-4 rounded-xl text-2xl font-black shadow-[0_6px_0_#ccc] hover:translate-y-1 hover:shadow-[0_2px_0_#ccc] transition-all">הצטרפות</button>
                        <button onClick={() => setView('login')} className="bg-[#1368ce] text-white py-4 rounded-xl text-2xl font-black shadow-[0_6px_0_#0c4891] hover:translate-y-1 hover:shadow-[0_2px_0_#0c4891] transition-all">ניהול דביר</button>
                    </div>
                </div>
            );

            if (view === 'login') return (
                <div className="h-screen bg-[#46178f] flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl w-full max-w-sm flex flex-col gap-4 text-center shadow-2xl">
                        <h2 className="text-3xl font-black text-gray-800">שלום דביר</h2>
                        <input className="p-4 bg-gray-100 border-2 rounded-xl text-black font-bold outline-none focus:border-purple-500 text-center" placeholder="שם משתמש" onChange={e => setLoginName(e.target.value)} />
                        <input type="password" className="p-4 bg-gray-100 border-2 rounded-xl text-black font-bold outline-none focus:border-purple-500 text-center" placeholder="סיסמה" onChange={e => setLoginPass(e.target.value)} />
                        <button onClick={handleLogin} className="bg-[#46178f] text-white py-4 rounded-xl text-xl font-bold hover:bg-purple-800 transition">כניסה למערכת</button>
                        <button onClick={() => setView('home')} className="text-gray-400 font-bold">ביטול</button>
                    </div>
                </div>
            );

            if (view === 'dashboard') return (
                <div className="min-h-screen p-6 max-w-5xl mx-auto">
                    <div className="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm">
                        <h2 className="text-4xl font-black text-[#46178f]">החידונים שלי</h2>
                        <div className="flex gap-3">
                            <button onClick={() => { setEditingQuizId(null); setQuizTitle(''); setQuestions([{ id: Date.now(), text: '', opts: ['', '', '', ''], correct: 0 }]); setView('create'); }} className="bg-[#26890c] text-white px-8 py-3 rounded-xl font-black text-xl shadow-[0_4px_0_#195c08] hover:translate-y-1 transition-all">+ חדש</button>
                            <button onClick={() => setView('home')} className="bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-black hover:bg-gray-300">יציאה</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-6">
                        {savedQuizzes.length === 0 ? (
                            <div className="bg-white p-12 rounded-3xl text-center text-gray-400 text-2xl font-bold">אין חידונים שמורים. צור אחד חדש!</div>
                        ) : (
                            savedQuizzes.map(q => (
                                <div key={q.id} className="bg-white p-6 rounded-3xl shadow-lg border-2 border-transparent hover:border-purple-500 transition-all flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex flex-col">
                                        <span className="font-black text-2xl text-gray-800">{q.title}</span>
                                        <span className="text-sm text-gray-400 font-bold">{q.questions?.length || 0} שאלות</span>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => handleEditQuiz(q)} className="bg-amber-500 text-white px-4 py-2 rounded-lg font-bold shadow-[0_4px_0_#b48608] hover:translate-y-0.5">עריכה</button>
                                        <button onClick={() => handleDeleteQuiz(q.id)} className="bg-red-500 text-white px-4 py-2 rounded-lg font-bold shadow-[0_4px_0_#b91c1c] hover:translate-y-0.5">מחיקה</button>
                                        <button onClick={() => startHosting(q)} className="bg-[#1368ce] text-white px-8 py-2 rounded-lg font-black text-lg shadow-[0_4px_0_#0c4891] hover:translate-y-0.5">הפעל עכשיו</button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );

            if (view === 'create') return (
                <div className="min-h-screen bg-[#f2f2f2] pb-20">
                    <div className="bg-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center px-10">
                        <input className="text-3xl font-black text-[#46178f] outline-none w-1/2" placeholder="שם החידון..." value={quizTitle} onChange={e => setQuizTitle(e.target.value)} />
                        <div className="flex gap-4">
                            <button onClick={() => setView('dashboard')} className="text-gray-500 font-bold">ביטול</button>
                            <button onClick={handleSaveQuiz} className="bg-[#26890c] text-white px-10 py-3 rounded-xl font-black shadow-[0_4px_0_#195c08]">{editingQuizId ? 'עדכן חידון' : 'שמור חידון'}</button>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto mt-10 px-4">
                        {questions.map((q, qIndex) => (
                            <div key={qIndex} className="bg-white p-8 rounded-3xl shadow-xl mb-10 relative border-t-8 border-[#46178f]">
                                <div className="flex justify-between mb-6">
                                    <span className="bg-purple-100 text-[#46178f] px-4 py-1 rounded-full font-bold">שאלה {qIndex + 1}</span>
                                    {questions.length > 1 && (
                                        <button onClick={() => {
                                            const n = questions.filter((_, i) => i !== qIndex);
                                            setQuestions(n);
                                        }} className="text-red-500 font-bold">מחק שאלה</button>
                                    )}
                                </div>

                                <textarea 
                                    className="w-full p-6 text-2xl font-bold border-2 rounded-2xl mb-8 text-center bg-gray-50 outline-none focus:border-purple-400" 
                                    placeholder="הקלד את השאלה כאן..." 
                                    value={q.text} 
                                    onChange={e => {
                                        const n = [...questions]; n[qIndex].text = e.target.value; setQuestions(n);
                                    }} 
                                />

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {q.opts.map((opt, optIndex) => (
                                        <div key={optIndex} className={`flex items-center p-2 rounded-2xl border-4 transition-all ${q.correct === optIndex ? 'border-green-500 bg-green-50' : 'border-gray-100'}`}>
                                            <div className={`${COLORS[optIndex].bg} w-12 h-12 rounded-lg flex items-center justify-center text-white text-xl ml-3 shadow-sm`}>
                                                {COLORS[optIndex].icon}
                                            </div>
                                            <input 
                                                className="flex-1 p-3 font-bold bg-transparent outline-none text-black" 
                                                placeholder={`תשובה ${optIndex + 1}`}
                                                value={opt}
                                                onChange={e => {
                                                    const n = [...questions]; n[qIndex].opts[optIndex] = e.target.value; setQuestions(n);
                                                }}
                                            />
                                            <button 
                                                onClick={() => {
                                                    const n = [...questions]; n[qIndex].correct = optIndex; setQuestions(n);
                                                }}
                                                className={`w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${q.correct === optIndex ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 text-transparent'}`}
                                            >
                                                ✓
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}

                        <button 
                            onClick={() => setQuestions([...questions, { id: Date.now(), text: '', opts: ['', '', '', ''], correct: 0 }])}
                            className="w-full py-6 border-4 border-dashed border-gray-300 rounded-3xl text-gray-400 text-2xl font-black hover:bg-white hover:border-purple-300 transition-all"
                        >
                            + הוסף שאלה חדשה
                        </button>
                    </div>
                </div>
            );

            if (view === 'host_lobby') return (
                <div className="h-screen bg-[#46178f] flex flex-col">
                    <div className="bg-white p-10 text-center shadow-2xl">
                        <p className="text-2xl font-bold text-gray-500 mb-2">הצטרפו ב-Quizmo עם הקוד:</p>
                        <h1 className="text-9xl font-black tracking-tighter">{pin}</h1>
                    </div>
                    <div className="flex-1 p-10 flex flex-col items-center">
                        <div className="w-full max-w-5xl flex justify-between items-center mb-10">
                            <div className="bg-black/20 text-white px-8 py-3 rounded-full text-2xl font-bold flex items-center gap-3">
                                <span className="animate-pulse text-green-400">●</span> {players.length} שחקנים
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setView('dashboard')} className="bg-white/10 text-white px-6 py-4 rounded-xl font-bold">ביטול</button>
                                <button className="bg-[#1368ce] text-white px-12 py-4 rounded-xl text-3xl font-black shadow-[0_6px_0_#0c4891] hover:translate-y-1">התחל משחק</button>
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-4 justify-center">
                            {players.length === 0 ? (
                                <p className="text-white/40 text-2xl font-bold mt-20">מחכים לשחקנים שיצטרפו...</p>
                            ) : (
                                players.map(p => (
                                    <div key={p.id} className="bg-white text-[#46178f] px-8 py-4 rounded-xl text-3xl font-black shadow-xl animate-bounce-short">
                                        {p.name}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );

            if (view === 'join') return (
                <div className="h-screen bg-[#46178f] flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl w-full max-w-sm flex flex-col gap-4 text-center shadow-2xl">
                        <h1 className="text-4xl font-black mb-4">Quizmo!</h1>
                        <input className="p-4 border-4 border-gray-200 rounded-xl text-center text-3xl font-black text-black outline-none focus:border-purple-500" placeholder="קוד PIN" value={pin} onChange={e => setPin(e.target.value)} />
                        <input className="p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-bold text-black outline-none focus:border-purple-500" placeholder="כינוי" value={nickname} onChange={e => setNickname(e.target.value)} />
                        <button onClick={handleJoinGame} className="bg-black text-white py-4 rounded-xl text-2xl font-black hover:bg-gray-800 transition">הצטרף</button>
                        <button onClick={() => setView('home')} className="text-gray-400 font-bold">ביטול</button>
                    </div>
                </div>
            );

            if (view === 'player_wait') return (
                <div className="h-screen bg-[#26890c] flex flex-col items-center justify-center text-white text-center p-6">
                    <h2 className="text-5xl font-black mb-4">אתה בפנים!</h2>
                    <p className="text-2xl opacity-80">חכה שהמנחה יתחיל את החידון...</p>
                    <div className="mt-12 text-6xl font-black bg-white/20 p-8 rounded-3xl border-4 border-white">{nickname}</div>
                    <button onClick={() => setView('home')} className="mt-20 text-white/50 underline">צא מהמשחק</button>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
